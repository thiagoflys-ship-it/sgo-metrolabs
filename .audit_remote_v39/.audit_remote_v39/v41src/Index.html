  <script>
    // Lógica da Ponte SGO -> OS+
    function executarExportacaoDiretor() {
      const btn = document.getElementById('btnSyncOS');
      if(!confirm("⚠️ AVISO DE DIRETORIA\n\nDeseja exportar a base atual para o sistema OS+?\n\nClientes, TAGs e Usuários serão atualizados no sistema novo.")) return;
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Sincronizando...</span>';

      google.script.run
        .withSuccessHandler(function(res) {
          alert(res.mensagem);
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-rotate"></i><span>Sincronizar com OS+</span>';
        })
        .withFailureHandler(function(err) {
          alert("ERRO CRÍTICO: " + err.message);
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-rotate"></i><span>Tentar Novamente</span>';
        })
        .dispararSincronizacaoTotal(); // Chama a função que criamos no Engine.gs
    }

    // Relógio em tempo real otimizado
    document.addEventListener("DOMContentLoaded", function() {
      const elRelogio = document.getElementById('relogioTopo');
      if (elRelogio) {
        setInterval(function() {
          const agora = new Date();
          const dia = String(agora.getDate()).padStart(2, '0');
          const mes = String(agora.getMonth() + 1).padStart(2, '0');
          const ano = agora.getFullYear();
          const horas = String(agora.getHours()).padStart(2, '0');
          const min = String(agora.getMinutes()).padStart(2, '0');
          const seg = String(agora.getSeconds()).padStart(2, '0');
          elRelogio.innerText = `${dia}/${mes}/${ano}, ${horas}:${min}:${seg}`;
        }, 1000);
      }
    });

  <script>
    window.SGO_QR_STATE = {
      equipamentoId: null,
      processando: false,
      redirecionado: false
    };

    function sgoQrGetEquipamentoId_() {
      try {
        const url = new URL(window.location.href);
        return url.searchParams.get("equipamento") || "";
      } catch (e) {
        try {
          const query = window.location.search || "";
          const params = new URLSearchParams(query);
          return params.get("equipamento") || "";
        } catch (err) {
          return "";
        }
      }
    }

    function sgoQrTemFluxo_() {
      return !!sgoQrGetEquipamentoId_();
    }

    function sgoQrMostrarMensagem_(msg) {
      try { alert(msg); } catch (e) { console.error(msg); }
    }

    function sgoQrExecutarAcesso_(sessionId) {
      const equipamentoId = sgoQrGetEquipamentoId_();
      if (!equipamentoId || !sessionId) return;
      if (window.SGO_QR_STATE.processando || window.SGO_QR_STATE.redirecionado) return;

      window.SGO_QR_STATE.equipamentoId = equipamentoId;
      window.SGO_QR_STATE.processando = true;

      const btn = document.getElementById("btnLogin");
      if(btn) {
        btn.innerText = "Acessando Equipamento...";
        btn.disabled = true;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          window.SGO_QR_STATE.processando = false;

          if (!res || !res.success) {
            sgoQrMostrarMensagem_((res && res.message) ? res.message : "Acesso negado ao equipamento.");
            if(btn) { btn.innerText = "Entrar"; btn.disabled = false; }
            return;
          }

          const redirectUrl = (res.redirectUrl || "").trim();
          if (!redirectUrl) {
            sgoQrMostrarMensagem_("Link do equipamento não encontrado.");
            if(btn) { btn.innerText = "Entrar"; btn.disabled = false; }
            return;
          }

          window.SGO_QR_STATE.redirecionado = true;
          window.location.href = redirectUrl;
        })
        .withFailureHandler(function(err) {
          window.SGO_QR_STATE.processando = false;
          sgoQrMostrarMensagem_("Erro ao acessar via QR: " + (err && err.message ? err.message : err));
          if(btn) { btn.innerText = "Entrar"; btn.disabled = false; }
        })
        .qrcodeAcessar(sessionId, equipamentoId);
    }

    function sgoQrValidarSessaoEExecutar_() {
      const equipamentoId = sgoQrGetEquipamentoId_();
      if (!equipamentoId) return;

      const sessionId = sessionStorage.getItem("SGO_SESSION") || 
                        sessionStorage.getItem("SGO_SESSION_ID") || 
                        sessionStorage.getItem("sessionId") || "";

      if (!sessionId) return; 

      google.script.run
        .withSuccessHandler(function(res) {
          const ok = !!(res && (res.valid || res.success));
          if (!ok) {
            try {
              sessionStorage.removeItem("SGO_SESSION");
              sessionStorage.removeItem("SGO_SESSION_ID");
              sessionStorage.removeItem("sessionId");
            } catch (e) {}
            return;
          }

          sgoQrExecutarAcesso_(sessionId);
        })
        .withFailureHandler(function() {
          try {
            sessionStorage.removeItem("SGO_SESSION");
            sessionStorage.removeItem("SGO_SESSION_ID");
            sessionStorage.removeItem("sessionId");
          } catch (e) {}
        })
        .validarSessao(sessionId);
    }

    function sgoQrPatchLogin_() {
      if (typeof window.fazerLogin !== "function") return;
      if (window.__SGO_QR_LOGIN_PATCHED__) return;

      const loginOriginal = window.fazerLogin;

      window.fazerLogin = function() {
        const retorno = loginOriginal.apply(this, arguments);

        setTimeout(function() {
          if (sgoQrTemFluxo_()) {
            sgoQrValidarSessaoEExecutar_();
          }
        }, 1000); 

        return retorno;
      };

      window.__SGO_QR_LOGIN_PATCHED__ = true;
    }

    function sgoQrBootstrap_() {
      try {
        sgoQrPatchLogin_();

        if (sgoQrTemFluxo_()) {
          sgoQrValidarSessaoEExecutar_();
        }
      } catch (e) {
        console.error("Falha no bootstrap do QR:", e);
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      setTimeout(sgoQrBootstrap_, 300);
    });
  </script>
