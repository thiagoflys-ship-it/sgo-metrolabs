<script>
  let SESSION = null;
  let USER_CONTEXT = null; 
  let MOTORES = {};
  let LOGIN_EM_ANDAMENTO = false;
  let PUBLIC_CONFIG = {};

  let IDLE_SECONDS = 0;
  let IDLE_LIMIT = 300;
  let IDLE_MONITOR = null;
  let IDLE_BEEP_INTERVAL = null;
  let OCIOSO = false;
  let SOM_OCIOSIDADE_ATIVO = true;
  let AUDIO_CTX = null;

  const CLIENTES_STATE = { items: [], editingId: "", loading: false, filtro: "" };
  const UNIDADES_STATE = { items: [], clientes: [], editingId: "", loading: false, filtro: "" };
  const EQUIPAMENTOS_STATE = { items: [], clientes: [], unidades: [], editingId: "", loading: false, filtro: "" };
  const DOCUMENTOS_STATE = { items: [], clientes: [], unidades: [], equipamentos: [], editingId: "", loading: false, filtro: "" };
  const USUARIOS_STATE = { items: [], editingId: "", loading: false, filtro: "" };

  const MENSAGENS_FALLBACK = [
    "Disciplina vence talento todos os dias.",
    "Qualidade não é opção, é padrão.",
    "Você não trabalha com equipamentos, você trabalha com vidas.",
    "Excelência é fazer bem feito mesmo quando ninguém está vendo.",
    "Cada relatório seu sustenta a credibilidade da Metrolabs.",
    "Foco, padrão e consistência — esse é o jogo.",
    "Pequenos detalhes fazem grandes auditorias passarem.",
    "Quem domina o processo domina o resultado.",
    "Seu trabalho impacta diretamente a segurança do paciente.",
    "Alta performance é hábito, não evento."
  ];

  window.onload = function () {
    carregarConfiguracoesIniciais();
    registrarEventosDeAtividade();
    registrarAtalhoEnterLogin();
    tentarAutoLogin_(); 
  };

  function carregarConfiguracoesIniciais() {
    google.script.run
      .withSuccessHandler(function (cfg) {
        try {
          PUBLIC_CONFIG = cfg || {};
          MOTORES = PUBLIC_CONFIG.motores || {};

          const logo = document.getElementById("logo");
          const logoTopo = document.getElementById("logoTopo");

          if (logo && PUBLIC_CONFIG.logo) logo.src = PUBLIC_CONFIG.logo;
          if (logoTopo && PUBLIC_CONFIG.logo) logoTopo.src = PUBLIC_CONFIG.logo;

          const localIdle = localStorage.getItem("SGO_IDLE_LIMIT");
          if (localIdle) {
            IDLE_LIMIT = parseInt(localIdle, 10);
          } else {
            IDLE_LIMIT = Number(PUBLIC_CONFIG.idleSecondsDefault || 300);
          }
          
          if (!isFinite(IDLE_LIMIT) || IDLE_LIMIT < 30) IDLE_LIMIT = 300;

          if (typeof PUBLIC_CONFIG.idleSoundDefault === "boolean") {
            const prefLocal = lerPreferenciaSomOciosidade_();
            SOM_OCIOSIDADE_ATIVO = prefLocal === null ? PUBLIC_CONFIG.idleSoundDefault : prefLocal;
          } else {
            SOM_OCIOSIDADE_ATIVO = lerPreferenciaSomOciosidade_();
          }

          aplicarMensagemMotivacional_();
        } catch (e) {
          console.error("Erro ao aplicar configurações iniciais:", e);
        }
      })
      .withFailureHandler(function (err) {
        console.error("Erro ao carregar configurações públicas:", err);
      })
      .getPublicConfig();
  }

  /* =========================
     SISTEMA DE LOGIN E SESSÃO
  ========================= */

  function tentarAutoLogin_() {
    const sessaoSalva = localStorage.getItem("SGO_SESSION");
    if (!sessaoSalva) return;

    setBotaoLoginEstado_(true);
    LOGIN_EM_ANDAMENTO = true;

    google.script.run
      .withSuccessHandler(function (res) {
        LOGIN_EM_ANDAMENTO = false;
        setBotaoLoginEstado_(false);

        if (res && res.success && res.session) {
          SESSION = res.session.sessionId;
          USER_CONTEXT = res.session;
          
          const loginBox = document.getElementById("login");
          const appBox = document.getElementById("app");
          const userInfo = document.getElementById("userInfo");

          if (loginBox) loginBox.style.display = "none";
          if (appBox) appBox.style.display = "flex";

          if (userInfo) {
            userInfo.innerText = (USER_CONTEXT.nome || "") + " | " + (USER_CONTEXT.perfil || "");
          }

          aplicarRegrasDeAcesso_();
          resetarOciosidade_();
          iniciarMonitorOciosidade_();
          
          // Novo interceptador de QR Code
          verificarRedirecionamentoQR_();
        } else {
          localStorage.removeItem("SGO_SESSION");
        }
      })
      .withFailureHandler(function () {
        LOGIN_EM_ANDAMENTO = false;
        setBotaoLoginEstado_(false);
        localStorage.removeItem("SGO_SESSION");
      })
      .getSessaoAtual(sessaoSalva);
  }

  function fazerLogin() {
    if (LOGIN_EM_ANDAMENTO) return;

    const usuarioEl = document.getElementById("usuario");
    const senhaEl = document.getElementById("senha");

    const usuario = usuarioEl ? String(usuarioEl.value || "").trim() : "";
    const senha = senhaEl ? String(senhaEl.value || "").trim() : "";

    if (!usuario) {
      alert("Informe o usuário.");
      if (usuarioEl) usuarioEl.focus();
      return;
    }

    if (!senha) {
      alert("Informe a senha.");
      if (senhaEl) senhaEl.focus();
      return;
    }

    LOGIN_EM_ANDAMENTO = true;
    setBotaoLoginEstado_(true);

    google.script.run
      .withSuccessHandler(function (res) {
        LOGIN_EM_ANDAMENTO = false;
        setBotaoLoginEstado_(false);

        if (!res || !res.success) {
          alert((res && res.message) ? res.message : "Falha no login.");
          return;
        }

        SESSION = res.sessionId || null;
        USER_CONTEXT = res.user || null;

        if (SESSION) {
          localStorage.setItem("SGO_SESSION", SESSION);
        }

        const loginBox = document.getElementById("login");
        const appBox = document.getElementById("app");
        const userInfo = document.getElementById("userInfo");

        if (loginBox) loginBox.style.display = "none";
        if (appBox) appBox.style.display = "flex";

        if (userInfo && res.user) {
          userInfo.innerText = (res.user.nome || "") + " | " + (USER_CONTEXT.perfil || "");
        }

        aplicarRegrasDeAcesso_();
        resetarOciosidade_();
        iniciarMonitorOciosidade_();
        aplicarMensagemMotivacional_();
        
        // Novo interceptador de QR Code
        verificarRedirecionamentoQR_();
      })
      .withFailureHandler(function (err) {
        LOGIN_EM_ANDAMENTO = false;
        setBotaoLoginEstado_(false);
        console.error("Erro no login:", err);
        alert("Erro ao processar o login. Tente novamente.");
      })
      .login(usuario, senha);
  }

  function verificarRedirecionamentoQR_() {
    // Verifica se a URL do WebApp possui o parâmetro "equipamento"
    if (typeof google !== "undefined" && google.script && google.script.url) {
      google.script.url.getLocation(function(location) {
        if (location.parameters && location.parameters.equipamento && location.parameters.equipamento[0]) {
          const equipId = location.parameters.equipamento[0];
          
          const div = document.getElementById("conteudo");
          if (div) {
            div.innerHTML = '\n              <div style="padding: 40px 20px; text-align: center; max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: var(--shadow); border: 1px solid var(--border);">\n                <h2 style="color: var(--metro-blue); margin-bottom: 10px;">Acessando Prontuário Digital...</h2>\n                <p style="color: var(--muted); font-size: 15px;">Validando credenciais e localizando a pasta segura do equipamento.</p>\n                <div style="margin-top: 20px; padding: 15px; border-radius: 8px; background: var(--info-bg); color: var(--metro-blue); font-weight: 600;">\n                  ⏳ Por favor, aguarde o redirecionamento...\n                </div>\n              </div>\n            ';
          }

          // Dispara a consulta segura no Backend
          google.script.run
            .withSuccessHandler(function(res) {
              if (res && res.success && res.redirectUrl && res.equipamento) {
                // CHAMA A NOVA FUNÇÃO DE RENDERIZAR O DRIVE SEGURO NO MOBILE
                renderProntuarioDigital_(res.redirectUrl, res.equipamento);
              } else {
                alert(res ? res.message : "Erro ao tentar abrir a pasta do equipamento.");
                abrir("dashboard");
              }
            })
            .withFailureHandler(function() {
              alert("Falha na comunicação com o servidor ao processar o QR Code.");
              abrir("dashboard");
            })
            .qrcodeAcessar(SESSION, equipId);
          
        } else {
          // Se não tiver QR Code na URL, abre o dashboard normalmente
          abrir("dashboard");
        }
      });
    } else {
      abrir("dashboard");
    }
  }

  function renderProntuarioDigital_(urlPasta, eqp) {
    const div = document.getElementById("conteudo");
    if (!div) return;

    const titulo = `${escapeHtml_(eqp.TAG)} - ${escapeHtml_(eqp.TIPO)}`;
    const subtitulo = `Prontuário Digital | Modelo: ${escapeHtml_(eqp.MODELO)} | Série: ${escapeHtml_(eqp.SERIE)}`;

    div.innerHTML = '\n      <div class="module-shell">\n        <div class="module-header">\n          <div class="module-header-left">\n            <h2 class="content-title">' +
      (titulo) +
      '</h2>\n            <p class="content-subtitle">' +
      (subtitulo) +
      '</p>\n          </div>\n          <div class="module-header-right">\n             <button class="btn-secondary" onclick="abrir(\'dashboard\')">← Voltar ao Dashboard</button>\n          </div>\n        </div>\n\n        <div style="padding: 40px 20px; text-align: center; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-top: 20px;">\n          <div style="font-size: 50px; margin-bottom: 15px;">📁</div>\n          <h3 style="color: var(--metro-blue); margin-bottom: 10px;">Acesso Liberado</h3>\n          <p style="color: var(--muted); font-size: 15px; margin-bottom: 25px; line-height: 1.5; max-width: 500px; margin-left: auto; margin-right: auto;">\n            O prontuário digital deste equipamento foi localizado com sucesso. Por questões de segurança, os documentos serão abertos em uma nova guia.\n          </p>\n          <button class="btn-primary" style="padding: 12px 24px; font-size: 16px;" onclick="window.open(\'' +
      (urlPasta) +
      '\', \'_blank\')">Abrir Pasta de Documentos ↗</button>\n        </div>\n      </div>\n    ';

    const areaAvisos = document.getElementById("areaAvisos");
    if (areaAvisos) {
      areaAvisos.style.display = "block";
      areaAvisos.innerHTML = "Módulo atual: <strong>Prontuário Digital (QR)</strong>";
    }
  }

  function logout() {
    pararMonitorOciosidade_();
    pararSomOciosidade_();

    const currentSession = SESSION || localStorage.getItem("SGO_SESSION");

    localStorage.removeItem("SGO_SESSION");
    localStorage.removeItem("SGO_SESSION_ID");
    SESSION = null;
    USER_CONTEXT = null;

    if (!currentSession) {
      location.reload();
      return;
    }

    google.script.run
      .withSuccessHandler(function () {
        location.reload();
      })
      .withFailureHandler(function (err) {
        location.reload();
      })
      .logout(currentSession);
  }

  function setBotaoLoginEstado_(bloqueado) {
    const botao = document.getElementById("btnLogin") || document.querySelector("#login button");
    if (!botao) return;

    botao.disabled = !!bloqueado;
    botao.innerText = bloqueado ? "Entrando..." : "Entrar";
  }

  function registrarAtalhoEnterLogin() {
    const usuarioEl = document.getElementById("usuario");
    const senhaEl = document.getElementById("senha");

    [usuarioEl, senhaEl].forEach(function (el) {
      if (!el) return;
      el.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          fazerLogin();
        }
      });
    });
  }

  function aplicarRegrasDeAcesso_() {
    if (!USER_CONTEXT) return;
    const isCliente = (USER_CONTEXT.perfil === "CLIENTE");
    
    const secaoTecnica = document.getElementById("menu-secao-tecnica");
    const btnClientes = document.getElementById("menu-btn-clientes");
    const secaoAdmin = document.getElementById("menu-secao-admin");
    
    if (secaoTecnica) secaoTecnica.style.display = isCliente ? "none" : "block";
    if (btnClientes) btnClientes.style.display = isCliente ? "none" : "block";
    if (secaoAdmin) secaoAdmin.style.display = isCliente ? "none" : "block";
  }

  function abrir(mod) {
    const div = document.getElementById("conteudo");
    if (!div) return;

    limparAlertasTemporarios_();

    if (mod === "dashboard") {
      div.innerHTML = montarDashboardHtml_();
      atualizarBadgeModulo_("dashboard");
      carregarDadosDashboard_(); 
      carregarAlertasDashboard_();
      return;
    }

    if (mod === "autoclave") {
      renderMotorModulo_("Autoclaves", "autoclave");
      atualizarBadgeModulo_("autoclave");
      return;
    }

    if (mod === "lavadora") {
      renderMotorModulo_("Lavadoras", "lavadora");
      atualizarBadgeModulo_("lavadora");
      return;
    }

    if (mod === "relatorio_conformidade") {
      renderMotorModulo_("Carta / Relatório de Conformidade", "relatorio_conformidade");
      atualizarBadgeModulo_("relatorio_conformidade");
      return;
    }

    if (mod === "clientes") {
      renderClientesModulo_();
      atualizarBadgeModulo_("clientes");
      return;
    }

    if (mod === "unidades") {
      renderUnidadesModulo_();
      atualizarBadgeModulo_("unidades");
      carregarClientesAtivosParaUnidades_();
      return;
    }

    if (mod === "equipamentos") {
      renderEquipamentosModulo_();
      atualizarBadgeModulo_("equipamentos");
      carregarClientesParaEquipamentos_();
      return;
    }

    if (mod === "documentos") {
      renderDocumentosModulo_();
      atualizarBadgeModulo_("documentos");
      carregarClientesParaDocumentos_();
      return;
    }

    if (mod === "admin") {
      renderAdminModulo_();
      atualizarBadgeModulo_("admin");
      preencherEstadoPainelAdmin_();
      return;
    }

    div.innerHTML = "<p>Módulo não encontrado.</p>";
  }

  function obterBadgeStatusHtml_(statusString) {
    const status = String(statusString || "").trim().toUpperCase();
    if (status === "ATIVO") return '<span class="badge badge-ativo">ATIVO</span>';
    if (status === "PENDENTE") return '<span class="badge badge-pendente">PENDENTE</span>';
    if (status === "BLOQUEADO") return '<span class="badge badge-bloqueado">BLOQUEADO</span>';
    return '<span class="badge badge-inativo">' +
      (escapeHtml_(status || "INATIVO")) +
      '</span>';
  }

  /* =========================
     DASHBOARD E ALERTAS 
  ========================= */
  function montarDashboardHtml_() {
    const totalMotores = contarMotoresAtivos_();
    const isCliente = USER_CONTEXT && USER_CONTEXT.perfil === "CLIENTE";
    const styleAdminOnly = isCliente ? "display:none;" : "";

    return '\n      <div>\n        <h2 class="content-title">Dashboard</h2>\n        <p class="content-subtitle">Bem-vindo ao METROLABS SGO+.</p>\n\n        <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); margin-bottom: 20px;">\n          <div class="card-kpi" style="border-left: 4px solid var(--metro-green);">\n            <div class="card-kpi-title">TEMPO PRODUTIVO <span style="float:right;">⏱️</span></div>\n            <div class="card-kpi-value" style="font-size: 20px; color: var(--text);">Monitoramento Ativo</div>\n          </div>\n          <div class="card-kpi" style="border-left: 4px solid var(--danger); background: var(--danger-bg);">\n            <div class="card-kpi-title" style="color: var(--danger);">ALERTAS CRÍTICOS <span style="float:right;">🚨</span></div>\n            <div class="card-kpi-value" id="kpiAlertas" style="color: var(--danger);">0</div>\n          </div>\n          <div class="card-kpi" style="border-left: 4px solid var(--info);">\n            <div class="card-kpi-title">PRODUTIVIDADE <span style="float:right;">📈</span></div>\n            <div class="card-kpi-value" style="color: var(--info);">100%</div>\n          </div>\n        </div>\n\n        <h3 style="margin: 0 0 12px; font-size: 16px; color: var(--text);">Resumo Operacional</h3>\n        <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));">\n          <div class="card-kpi" style="' +
      (styleAdminOnly) +
      '">\n            <div class="card-kpi-title">Clientes</div>\n            <div class="card-kpi-value" id="dashCountClientes">...</div>\n          </div>\n          <div class="card-kpi">\n            <div class="card-kpi-title">Unidades</div>\n            <div class="card-kpi-value" id="dashCountUnidades">...</div>\n          </div>\n          <div class="card-kpi">\n            <div class="card-kpi-title">Equipamentos</div>\n            <div class="card-kpi-value" id="dashCountEquipamentos">...</div>\n          </div>\n          <div class="card-kpi">\n            <div class="card-kpi-title">Documentos</div>\n            <div class="card-kpi-value" id="dashCountDocumentos">...</div>\n          </div>\n          <div class="card-kpi" style="' +
      (styleAdminOnly) +
      '">\n            <div class="card-kpi-title">Motores</div>\n            <div class="card-kpi-value">' +
      (totalMotores) +
      '</div>\n          </div>\n        </div>\n\n        <div class="dashboard-alertas-container">\n          <h3 style="margin: 0 0 12px; font-size: 16px; color: var(--text);">Avisos de Vencimento</h3>\n          <div id="dashboardAlertas">Aguarde, carregando alertas do sistema...</div>\n        </div>\n\n        <div style="margin-top:20px;">\n          <h3 style="margin:0 0 8px;">Status da base</h3>\n          <p style="margin:0 0 6px;">Sessão segura ativa.</p>\n          <p style="margin:0;">O sistema garante sigilo total e restrição de visão por cliente.</p>\n        </div>\n      </div>\n    ';
  }

  function carregarDadosDashboard_() {
    if (!SESSION) return;

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) return;
        
        const elCli = document.getElementById("dashCountClientes");
        const elUni = document.getElementById("dashCountUnidades");
        const elEqp = document.getElementById("dashCountEquipamentos");
        const elDoc = document.getElementById("dashCountDocumentos");

        if(elCli) elCli.innerText = res.totais.clientes || "0";
        if(elUni) elUni.innerText = res.totais.unidades || "0";
        if(elEqp) elEqp.innerText = res.totais.equipamentos || "0";
        if(elDoc) elDoc.innerText = res.totais.documentos || "0";
      })
      .obterTotaisDashboard(SESSION);
  }

  function carregarAlertasDashboard_() {
    const container = document.getElementById("dashboardAlertas");
    const kpiAlertas = document.getElementById("kpiAlertas");
    if (!container || !SESSION) return;

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success || !res.items || res.items.length === 0) {
          container.innerHTML = '<div style="padding:12px; border-radius:8px; background:var(--success-bg); color:var(--success); border:1px solid #a6f4c5; font-weight:700; font-size:13px;">✅ Tudo certo! Nenhum documento vencido ou próximo do vencimento nos próximos 30 dias.</div>';
          if(kpiAlertas) kpiAlertas.innerText = "0";
          return;
        }

        let criticos = 0;
        const html = res.items.map(a => {
          const isCritico = a.tipo === "CRÍTICO";
          if (isCritico) criticos++;
          const bg = isCritico ? "var(--danger-bg)" : "var(--warning-bg)";
          const color = isCritico ? "var(--danger)" : "var(--warning)";
          const border = isCritico ? "#fecaca" : "#fef0c7";
          const icone = isCritico ? "🚨" : "⚠️";
          return '<div style="padding:12px; border-radius:8px; background:' +
            (bg) +
            '; color:' +
            (color) +
            '; border:1px solid ' +
            (border) +
            '; margin-bottom:10px; font-weight:700; font-size:13px;">' +
            (icone) +
            ' ' +
            (escapeHtml_(a.mensagem)) +
            '</div>';
        }).join("");

        container.innerHTML = html;
        if(kpiAlertas) kpiAlertas.innerText = criticos;
      })
      .withFailureHandler(function(err) {
        container.innerHTML = '<div style="padding:12px; border-radius:8px; background:var(--danger-bg); color:var(--danger); border:1px solid #fecaca; font-weight:700; font-size:13px;">Falha ao carregar o sistema de alertas.</div>';
      })
      .alertasObterDashboard(SESSION);
  }

  function contarMotoresAtivos_() {
    let total = 0;
    if (MOTORES.AUTOCLAVE_TEMPLATE) total++;
    if (MOTORES.AUTOCLAVE_RELATORIO) total++;
    if (MOTORES.LAVADORA_TEMPLATE) total++;
    if (MOTORES.LAVADORA_RELATORIO) total++;
    if (MOTORES.RELATORIO_CONFORMIDADE) total++;
    return total;
  }

  function atualizarBadgeModulo_(mod) {
    const areaAvisos = document.getElementById("areaAvisos");
    if (!areaAvisos) return;

    const nomes = {
      dashboard: "Dashboard",
      autoclave: "Autoclave",
      lavadora: "Lavadoras",
      relatorio_conformidade: "Carta / Relatório de Conformidade",
      clientes: "Clientes",
      unidades: "Unidades",
      equipamentos: "Equipamentos",
      documentos: "Documentos",
      admin: "Painel Admin"
    };

    areaAvisos.style.display = "block";
    areaAvisos.innerHTML = "Módulo atual: <strong>" + (nomes[mod] || mod) + "</strong>";
  }

  function limparAlertasTemporarios_() {
    const barra = document.getElementById("barraAlertas");
    if (!barra) return;

    if (!OCIOSO) {
      barra.style.display = "none";
      barra.innerHTML = "";
    }
  }

  /* =========================
     OCIOSIDADE E ENGAJAMENTO
  ========================= */
  function registrarEventosDeAtividade() {
    const eventos = ["mousemove", "mousedown", "keydown", "scroll", "touchstart", "click"];
    eventos.forEach(function (evt) {
      document.addEventListener(evt, tratarAtividadeUsuario_, { passive: true });
    });
  }

  function tratarAtividadeUsuario_() {
    resetarOciosidade_();
  }

  function resetarOciosidade_() {
    IDLE_SECONDS = 0;
    if (OCIOSO) {
      OCIOSO = false;
      pararSomOciosidade_();
      const barra = document.getElementById("barraAlertas");
      if (barra) {
        barra.style.display = "none";
        barra.innerHTML = "";
      }
    }
  }

  function iniciarMonitorOciosidade_() {
    pararMonitorOciosidade_();
    IDLE_MONITOR = setInterval(function () {
      IDLE_SECONDS++;
      if (!OCIOSO && IDLE_SECONDS >= IDLE_LIMIT) {
        OCIOSO = true;
        exibirAlertaOciosidade_();
        if (SOM_OCIOSIDADE_ATIVO) iniciarSomOciosidade_();
      }
    }, 1000);
  }

  function pararMonitorOciosidade_() {
    if (IDLE_MONITOR) {
      clearInterval(IDLE_MONITOR);
      IDLE_MONITOR = null;
    }
  }

  function exibirAlertaOciosidade_() {
    const barra = document.getElementById("barraAlertas");
    if (!barra) return;
    barra.style.display = "block";
    barra.innerHTML = "Atenção: operador em ociosidade. Nenhuma atividade detectada nos últimos " + IDLE_LIMIT + " segundos.";
  }

  function iniciarSomOciosidade_() {
    if (IDLE_BEEP_INTERVAL) return;
    IDLE_BEEP_INTERVAL = setInterval(function () {
      tocarBeep_();
    }, 2500);
    tocarBeep_();
  }

  function pararSomOciosidade_() {

  function tocarBeep_() {
    try {
      if (!SOM_OCIOSIDADE_ATIVO) return;

      const AudioContextRef = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextRef) return;

      if (!AUDIO_CTX) AUDIO_CTX = new AudioContextRef();
      if (AUDIO_CTX.state === "suspended") AUDIO_CTX.resume();

      const osc = AUDIO_CTX.createOscillator();
      const gain = AUDIO_CTX.createGain();

      osc.type = "sine";
      osc.frequency.value = 880;

      gain.gain.setValueAtTime(0.0001, AUDIO_CTX.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.08, AUDIO_CTX.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, AUDIO_CTX.currentTime + 0.22);

      osc.connect(gain);
      gain.connect(AUDIO_CTX.destination);

      osc.start();
      osc.stop(AUDIO_CTX.currentTime + 0.22);
    } catch (e) {
      console.error("Falha ao tocar beep de ociosidade:", e);
    }
  }

    const mensagens = Array.isArray(PUBLIC_CONFIG.mensagensMotivacionais) && PUBLIC_CONFIG.mensagensMotivacionais.length
      ? PUBLIC_CONFIG.mensagensMotivacionais
      : MENSAGENS_FALLBACK;

    const el = document.getElementById("mensagemMotivacional");
    if (!el || !mensagens.length) return;

    const idx = sortearIndiceMensagemSemRepetir_(mensagens.length);
    const mensagem = mensagens[idx] || mensagens[0];

    el.innerText = mensagem;

    try { localStorage.setItem("SGO_MSG_MOTIVACIONAL_IDX", String(idx)); } 
    catch (e) { console.error("Falha ao persistir mensagem motivacional:", e); }
  }

  function sortearIndiceMensagemSemRepetir_(total) {
    if (total <= 1) return 0;
    let anterior = -1;
    try {
      const raw = localStorage.getItem("SGO_MSG_MOTIVACIONAL_IDX");
      if (raw !== null) anterior = Number(raw);
    } catch (e) { anterior = -1; }

    let novo = anterior;
    let tentativas = 0;

    while (novo === anterior && tentativas < 20) {
      novo = Math.floor(Math.random() * total);
      tentativas++;
    }

    if (novo < 0 || novo >= total) novo = 0;
    return novo;
  }

  /* =========================
     INTEGRAÇÃO BRASIL API (CNPJ)
  ========================= */
  function buscarCnpjAutomacao_(inputEl, modulo) {
    const valorDigitado = inputEl.value;
    inputEl.value = formatarCnpjFront_(valorDigitado); 

    const cnpjLimpo = String(valorDigitado).replace(/\D/g, "");
    if (cnpjLimpo.length !== 14) return;

    const btnSalvar = modulo === 'cliente' 
      ? document.querySelector("#clientesFormTitulo").parentElement.querySelector(".btn-primary") 
      : document.querySelector("#unidadesFormTitulo").parentElement.querySelector(".btn-primary");

    if (btnSalvar) { 
      btnSalvar.disabled = true; 
      btnSalvar.innerText = "Buscando Receita..."; 
    }

    fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpjLimpo}`)
      .then(res => {
        if (!res.ok) throw new Error("CNPJ não encontrado na Receita Federal");
        return res.json();
      })
      .then(data => {
        const razao = data.razao_social || "";
        const fantasia = data.nome_fantasia || razao;
        const telefone = data.ddd_telefone_1 || "";
        
        const logradouro = data.logradouro || "";
        const numero = data.numero || "";
        const bairro = data.bairro || "";
        
        let endCompleto = "";
        if (logradouro) {
          endCompleto = logradouro;
          if (numero) endCompleto += `, ${numero}`;
          if (bairro) endCompleto += ` - ${bairro}`;
        }

        const cidade = data.municipio || "";
        const uf = data.uf || "";

        if (modulo === 'cliente') {
          setValue_("cli_razao_social", razao);
          setValue_("cli_nome_fantasia", fantasia);
          setValue_("cli_telefone", telefone);
          setValue_("cli_endereco", endCompleto);
        } else if (modulo === 'unidade') {
          setValue_("uni_nome_unidade", fantasia);
          setValue_("uni_endereco", endCompleto);
          setValue_("uni_cidade", cidade);
          setValue_("uni_uf", uf);
          setValue_("uni_telefone", telefone);
        }
      })
      .catch(err => {
        console.warn("Autopreenchimento falhou:", err);
        alert("Não foi possível buscar os dados na Receita para este CNPJ (pode ser lentidão na base do governo ou CNPJ inválido). Por favor, preencha manualmente.");
      })
      .finally(() => {
        if (btnSalvar) { 
          btnSalvar.disabled = false; 
          btnSalvar.innerText = "Salvar"; 
        }
      });
  }

    if (!payload.NOME) return alert("O Nome Completo é obrigatório.");
    if (!payload.PERFIL) return alert("Selecione o perfil de acesso.");
    if (payload.PERFIL === "CLIENTE" && !payload.CLIENTE_ID) return alert("Para perfil CLIENTE, é obrigatório vincular a empresa.");

      google.script.run

          if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao atualizar.");

          usuariosNovo_();
          if (USUARIOS_STATE.filtro) usuariosPesquisar_();
        })
        .usuariosAtualizar(SESSION, USUARIOS_STATE.editingId, payload);
      return;
    }

    if (!payload.SENHA) return alert("A senha é obrigatória para um NOVO usuário.");

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao criar.");

        '</td>\n          <td>' +
        (escapeHtml_(item.UNIDADE_NOME)) +
        '</td>\n          <td>' +
        (escapeHtml_(item.EQUIPAMENTO_NOME || "Geral da Unidade")) +
        '</td>\n          <td>' +
        (escapeHtml_(item.TIPO_DOCUMENTO)) +
        '</td>\n          <td>' +
        (escapeHtml_(item.NOME_ARQUIVO)) +
        '</td>\n          <td><strong>' +
        (vencimentoHtml) +
        '</strong></td>\n          <td>' +
        (linkHtml) +
        '</td>\n          <td>' +
        (obterBadgeStatusHtml_(status)) +
        '</td>\n          ' +
        (acoesHtml) +
        '\n        </tr>\n      ';
    }).join("");
  }

  function documentosLimparFormulario_() {
    setSelectValueSafe_("doc_cliente_id", "");
    setSelectValueSafe_("doc_unidade_id", "");
    setSelectValueSafe_("doc_equipamento_id", "");
    setValue_("doc_tipo_documento", "");
    setValue_("doc_nome_arquivo", "");
    setValue_("doc_arquivo", "");
    setValue_("doc_arquivo_base64", "");
    setValue_("doc_arquivo_mime", "");
    setValue_("doc_arquivo_nome", "");
    setValue_("doc_data_vencimento", "");
    setValue_("doc_status", "ATIVO");

    const elInput = document.getElementById("doc_arquivo");
    if(elInput) elInput.value = ""; // Garante que o input file limpe visualmente

    const preview = document.getElementById("doc_arquivo_preview");
    if (preview) preview.innerText = "";

    const selectUnidade = document.getElementById("doc_unidade_id");
    if (selectUnidade) selectUnidade.innerHTML = '<option value="">Selecione um cliente primeiro</option>';
    
    const selectEquip = document.getElementById("doc_equipamento_id");
    if (selectEquip) selectEquip.innerHTML = '<option value="">Selecione uma unidade primeiro</option>';
  }

  function documentosNovo_() {
    DOCUMENTOS_STATE.editingId = "";
    documentosLimparFormulario_();
    document.getElementById("documentosFormTitulo").innerText = "Novo documento";
  }

  function processarArquivoDocumento_() {
    const el = document.getElementById("doc_arquivo");
    const file = el.files[0];
    const preview = document.getElementById("doc_arquivo_preview");

    if (!file) {
      setValue_("doc_arquivo_base64", "");
      setValue_("doc_arquivo_mime", "");
      setValue_("doc_arquivo_nome", "");
      preview.innerText = "";
      return;
    }

    if (file.size > 5 * 1024 * 1024) { 
      alert("O arquivo selecionado é muito grande. O limite máximo é de 5MB.");
      el.value = "";
      return;
    }

    preview.innerText = "Lendo arquivo: " + file.name + "...";

    const reader = new FileReader();
    reader.onload = function(e) {
      setValue_("doc_arquivo_base64", e.target.result);
      setValue_("doc_arquivo_mime", file.type);
      setValue_("doc_arquivo_nome", file.name);
      preview.innerText = "Arquivo pronto para envio: " + file.name;
    };
    reader.onerror = function() {
      alert("Erro ao tentar ler o arquivo.");
      el.value = "";
      preview.innerText = "";
    };
    reader.readAsDataURL(file);
  }

  function formatarDataFront_(dataString) {
    if (!dataString) return "--";
    const partes = dataString.split("-");
    if (partes.length === 3) {
      // Ajuste para não bugar com data no formato ISO completo vindo do banco
      const dia = partes[2].substring(0, 2);
      return dia + "/" + partes[1] + "/" + partes[0];
    }
    return escapeHtml_(dataString);
  }

  function carregarClientesParaDocumentos_() {
    if (!SESSION) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return;
        DOCUMENTOS_STATE.clientes = Array.isArray(res.items) ? res.items : [];
        preencherComboClientesDocumentos_();
      })
      .equipamentosListarClientesAtivos(SESSION); 
  }

  function preencherComboClientesDocumentos_() {
    const select = document.getElementById("doc_cliente_id");
    if (!select) return;
    const options = ['<option value="">Selecione um cliente</option>'];
    (DOCUMENTOS_STATE.clientes || []).forEach(function (item) {
      options.push('<option value="' + escapeHtml_(item.ID) + '">' + escapeHtml_(item.NOME) + '</option>');
    });
    select.innerHTML = options.join("");
  }

  function aoMudarClienteDocumentos_() {
    const clienteId = getValue_("doc_cliente_id");
    if (!clienteId) {
      DOCUMENTOS_STATE.unidades = [];
      DOCUMENTOS_STATE.equipamentos = [];
      preencherComboUnidadesDocumentos_();
      preencherComboEquipamentosDocumentos_();
      return;
    }
    carregarUnidadesParaDocumentos_(clienteId);
  }

  function carregarUnidadesParaDocumentos_(clienteId, unidadeSelecionadaId, equipamentoSelecionadoId) {
    if (!SESSION || !clienteId) return;
    const selectUnidade = document.getElementById("doc_unidade_id");
    if (selectUnidade) selectUnidade.innerHTML = '<option value="">Carregando unidades...</option>';

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return;
        DOCUMENTOS_STATE.unidades = Array.isArray(res.items) ? res.items : [];
        preencherComboUnidadesDocumentos_();
        
        if (unidadeSelecionadaId) {
          setSelectValueSafe_("doc_unidade_id", unidadeSelecionadaId);
          carregarEquipamentosParaDocumentos_(unidadeSelecionadaId, equipamentoSelecionadoId);
        } else {
          DOCUMENTOS_STATE.equipamentos = [];
          preencherComboEquipamentosDocumentos_();
        }
      })
      .equipamentosListarUnidadesAtivasPorCliente(SESSION, clienteId);
  }

  function preencherComboUnidadesDocumentos_() {
    const select = document.getElementById("doc_unidade_id");
    if (!select) return;
    if (!DOCUMENTOS_STATE.unidades || DOCUMENTOS_STATE.unidades.length === 0) {
      select.innerHTML = '<option value="">Nenhuma unidade ativa encontrada</option>';
      return;
    }
    const options = ['<option value="">Selecione a unidade</option>'];
    (DOCUMENTOS_STATE.unidades || []).forEach(function (item) {
      options.push('<option value="' + escapeHtml_(item.ID) + '">' + escapeHtml_(item.NOME_UNIDADE) + '</option>');
    });
    select.innerHTML = options.join("");
  }

  function aoMudarUnidadeDocumentos_() {
    const unidadeId = getValue_("doc_unidade_id");
    if (!unidadeId) {
      DOCUMENTOS_STATE.equipamentos = [];
      preencherComboEquipamentosDocumentos_();
      return;
    }
    carregarEquipamentosParaDocumentos_(unidadeId);
  }

  function carregarEquipamentosParaDocumentos_(unidadeId, equipamentoSelecionadoId) {
    if (!SESSION || !unidadeId) return;
    const selectEquip = document.getElementById("doc_equipamento_id");
    if (selectEquip) selectEquip.innerHTML = '<option value="">Carregando equipamentos...</option>';

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return;
        DOCUMENTOS_STATE.equipamentos = Array.isArray(res.items) ? res.items : [];
        preencherComboEquipamentosDocumentos_();
        if (equipamentoSelecionadoId) setSelectValueSafe_("doc_equipamento_id", equipamentoSelecionadoId);
      })
      .documentosListarEquipamentosAtivosPorUnidade(SESSION, unidadeId);
  }

  function preencherComboEquipamentosDocumentos_() {
    const select = document.getElementById("doc_equipamento_id");
    if (!select) return;
    if (!DOCUMENTOS_STATE.equipamentos || DOCUMENTOS_STATE.equipamentos.length === 0) {
      select.innerHTML = '<option value="">Nenhum equipamento ativo (opcional)</option>';
      return;
    }
    const options = ['<option value="">Geral da Unidade (Opcional)</option>'];
    (DOCUMENTOS_STATE.equipamentos || []).forEach(function (item) {
      options.push('<option value="' + escapeHtml_(item.ID) + '">' + escapeHtml_(item.NOME_EQUIPAMENTO) + '</option>');
    });
    select.innerHTML = options.join("");
  }

  function documentosLerFormulario_() {
    return {
      CLIENTE_ID: getValue_("doc_cliente_id"),
      UNIDADE_ID: getValue_("doc_unidade_id"),
      EQUIPAMENTO_ID: getValue_("doc_equipamento_id"),
      TIPO_DOCUMENTO: getValue_("doc_tipo_documento"),
      NOME_ARQUIVO: getValue_("doc_nome_arquivo"),
      ARQUIVO_BASE64: getValue_("doc_arquivo_base64"),
      ARQUIVO_MIME: getValue_("doc_arquivo_mime"),
      ARQUIVO_NOME: getValue_("doc_arquivo_nome"),
      DATA_VENCIMENTO: getValue_("doc_data_vencimento")
    };
  }

  function documentosSalvar_() {
    if (!SESSION) return;
    const payload = documentosLerFormulario_();

    if (!payload.CLIENTE_ID) return alert("Selecione o cliente.");
    if (!payload.UNIDADE_ID) return alert("Selecione a unidade.");
    if (!payload.TIPO_DOCUMENTO) return alert("Informe a categoria do documento.");
    if (!payload.NOME_ARQUIVO) return alert("Informe a referência do arquivo.");
    if (!DOCUMENTOS_STATE.editingId && !payload.ARQUIVO_BASE64) return alert("Selecione um arquivo para o upload.");

    const btn = document.querySelector("#documentosFormTitulo").parentElement.querySelector(".btn-primary");
    if (btn) { btn.disabled = true; btn.innerText = "Salvando/Enviando..."; }

    if (DOCUMENTOS_STATE.editingId) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (btn) { btn.disabled = false; btn.innerText = "Salvar"; }
          if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao atualizar.");
          alert(res.message || "Atualizado com sucesso.");
          documentosNovo_();
          if (DOCUMENTOS_STATE.filtro) documentosPesquisar_();
        })
        .withFailureHandler(function() {
          if (btn) { btn.disabled = false; btn.innerText = "Salvar"; }
          alert("Erro de conexão ao salvar.");
        })
        .documentosAtualizar(SESSION, DOCUMENTOS_STATE.editingId, payload);
      return;
    }

    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) { btn.disabled = false; btn.innerText = "Salvar"; }
        if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao criar.");
        alert(res.message || "Criado com sucesso.");
        documentosNovo_();
      })
      .withFailureHandler(function() {
        if (btn) { btn.disabled = false; btn.innerText = "Salvar"; }
        alert("Erro de conexão ao enviar documento.");
      })
      .documentosCriar(SESSION, payload);
  }

  function documentosEditar_(id) {
    if (!SESSION) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success || !res.item) return alert("Documento não encontrado.");
        
        const item = res.item;
        DOCUMENTOS_STATE.editingId = String(item.ID || "");

        setSelectValueSafe_("doc_cliente_id", item.CLIENTE_ID || "");
        carregarUnidadesParaDocumentos_(item.CLIENTE_ID, item.UNIDADE_ID, item.EQUIPAMENTO_ID);

        setValue_("doc_tipo_documento", item.TIPO_DOCUMENTO || "");
        setValue_("doc_nome_arquivo", item.NOME_ARQUIVO || "");
        
        // Trata data que vem no formato "yyyy-MM-ddThh:mm:ss" do backend para preencher o input type="date"
        let dt = item.DATA_VENCIMENTO || "";
        if (dt.includes("T")) dt = dt.split("T")[0];
        setValue_("doc_data_vencimento", dt);
        
        setValue_("doc_arquivo", "");
        setValue_("doc_arquivo_base64", "");
        setValue_("doc_arquivo_mime", "");
        setValue_("doc_arquivo_nome", "");
        setValue_("doc_status", item.STATUS || "ATIVO");

        const preview = document.getElementById("doc_arquivo_preview");
        if (preview) {
           if (item.LINK_ARQUIVO) {
             preview.innerHTML = 'Arquivo atual: <a href="' +
               (escapeHtml_(item.LINK_ARQUIVO)) +
               '" target="_blank">Visualizar no Drive</a> <br><span style="color:var(--muted); font-weight:normal;">(Selecione um novo arquivo apenas se quiser substituir o atual)</span>';
           } else {
             preview.innerText = "";
           }
        }

        document.getElementById("documentosFormTitulo").innerText = "Editar documento";
      })
      .documentosObter(SESSION, id);
  }

  function documentosInativar_(id) {
    if (!SESSION || !confirm("Inativar este documento?")) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao inativar.");
        if (DOCUMENTOS_STATE.filtro) documentosPesquisar_();
      })
      .documentosInativar(SESSION, id);
  }

  function documentosReativar_(id) {
    if (!SESSION || !confirm("Reativar este documento?")) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao reativar.");
        if (DOCUMENTOS_STATE.filtro) documentosPesquisar_();
      })
      .documentosReativar(SESSION, id);
  }

  function documentosExcluir_(id) {
    if (!SESSION || !confirm("Excluir definitivamente este documento?")) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.success) return alert((res && res.message) ? res.message : "Erro ao excluir.");
        if (DOCUMENTOS_STATE.editingId === id) documentosNovo_();
        if (DOCUMENTOS_STATE.filtro) documentosPesquisar_();
      })
      .documentosExcluir(SESSION, id);
  }

  function formatarCnpjFront_(valor) {
    const v = String(valor || "").replace(/\D/g, "");
    if (v.length !== 14) return escapeHtml_(valor || "");
    return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, "$1.$2.$3/$4-$5");
  }

  function getValue_(id) {
    const el = document.getElementById(id);
    return el ? String(el.value || "").trim() : "";
  }

  function setValue_(id, value) {
    const el = document.getElementById(id);
    if (el) el.value = value == null ? "" : String(value);
  }

  function setSelectValueSafe_(id, valor) {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = valor || "";
  }

  function focusIfExists_(id) {
    const el = document.getElementById(id);
    if (el) el.focus();
  }

  function escapeHtml_(texto) {
    return String(texto || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
