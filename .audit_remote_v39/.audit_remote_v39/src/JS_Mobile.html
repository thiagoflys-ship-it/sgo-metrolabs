<script>
/* ================================================================
 * JS_Mobile.html — SGO+ Campo
 * Interface mobile própria para operação em campo
 * Dependência: escapeHtml_() definida em JS_Core.html
 * ================================================================ */

var MOBILE_TELA_ATUAL = "home";

/* ---- Estado: Nova OS ---- */
var MOBILE_OS_OPCOES       = null;
var MOBILE_OS_QUESTIONARIO = null;
var MOBILE_OS_PREFILL      = null;

/* ---- Estado: Minhas OS ---- */
var MOBILE_MINHAS_OS_DADOS  = [];
var MOBILE_MINHAS_OS_FILTRO = "todas";

/* ---- Detecção ---- */

function isMobile_() {
  if (window.innerWidth <= 900) return true;
  try {
    return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent || "");
  } catch(e) { return false; }
}

function mobileDeveAtivar_() {
  try { return isMobile_(); } catch(e) { return false; }
}

/* ---- Entry point ---- */

function renderMobileCampo_() {
  var topbar  = document.querySelector(".topbar");
  var sidebar = document.querySelector(".sidebar");
  if (topbar)  topbar.style.display  = "none";
  if (sidebar) sidebar.style.display = "none";

  var div = document.getElementById("conteudo");
  if (!div) return;

  div.innerHTML =
    '<div class="mobile-shell" id="mobileCampoShell">' +
      '<div class="mobile-top">' +
        '<div class="mobile-top-brand">' +
          '<span class="mobile-top-title">SGO+ Campo</span>' +
          '<span class="mobile-top-sub">Operação em campo</span>' +
        '</div>' +
        '<button class="mobile-top-exit" type="button" onclick="mobileModoGestaoCompleto_()">&#8921; Gestão</button>' +
      '</div>' +
      '<div id="mobilePaneContainer" class="mobile-pane-container"></div>' +
      '<nav class="mobile-bottom-nav" id="mobileBottomNav">' +
        '<button class="mobile-nav-btn" id="mobileNavInicio" type="button" onclick="mobileAbrirTela_(\'home\')">' +
          '<i class="fas fa-house mobile-nav-icon"></i>' +
          '<span class="mobile-nav-label">Início</span>' +
        '</button>' +
        '<button class="mobile-nav-btn" id="mobileNavOS" type="button" onclick="mobileAbrirTela_(\'minhas_os\')">' +
          '<i class="fas fa-clipboard-list mobile-nav-icon"></i>' +
          '<span class="mobile-nav-label">Minhas OS</span>' +
        '</button>' +
        '<button class="mobile-nav-btn" id="mobileNavFrota" type="button" onclick="mobileAbrirTela_(\'frota\')">' +
          '<i class="fas fa-car-side mobile-nav-icon"></i>' +
          '<span class="mobile-nav-label">Frota</span>' +
        '</button>' +
        '<button class="mobile-nav-btn" id="mobileNavQR" type="button" onclick="mobileAbrirTela_(\'qr\')">' +
          '<i class="fas fa-qrcode mobile-nav-icon"></i>' +
          '<span class="mobile-nav-label">QR</span>' +
        '</button>' +
        '<button class="mobile-nav-btn" id="mobileNavMenu" type="button" onclick="mobileAbrirTela_(\'menu\')">' +
          '<i class="fas fa-bars mobile-nav-icon"></i>' +
          '<span class="mobile-nav-label">Menu</span>' +
        '</button>' +
      '</nav>' +
    '</div>';

  mobileAbrirTela_("home");
}

/* ---- Navegação interna ---- */

function mobileAbrirTela_(nome) {
  MOBILE_TELA_ATUAL = nome;

  var container = document.getElementById("mobilePaneContainer");
  if (!container) return;

  // Atualiza bottom nav
  var navMap = {
    home:     "mobileNavInicio",
    minhas_os:"mobileNavOS",
    frota:    "mobileNavFrota",
    qr:       "mobileNavQR",
    menu:     "mobileNavMenu"
  };
  Object.keys(navMap).forEach(function(k) {
    var btn = document.getElementById(navMap[k]);
    if (btn) btn.classList.toggle("mobile-nav-ativo", k === nome);
  });

  // Renderiza pane
  switch (nome) {
    case "home":
      container.innerHTML = mobileHtmlHome_();
      break;
    case "minhas_os":
      MOBILE_MINHAS_OS_DADOS  = [];
      MOBILE_MINHAS_OS_FILTRO = "todas";
      container.innerHTML = mobileHtmlMinhasOS_();
      mobileCarregarMinhasOS_();
      break;
    case "frota":
      container.innerHTML = mobileHtmlPlaceholder_(
        "Frota",
        "fas fa-car-side",
        "Em breve: retirada, devolucao e abastecimento de veiculos sera implementada no Bloco 5-E."
      );
      break;
    case "qr":
      container.innerHTML = mobileHtmlPlaceholder_(
        "Ler QR",
        "fas fa-qrcode",
        "Em breve: leitura de QR Code de equipamentos sera implementada no Bloco 5-F."
      );
      break;
    case "menu":
      container.innerHTML = mobileHtmlMenu_();
      break;
    case "cliente":
      container.innerHTML = mobileHtmlClienteForm_();
      break;
    case "unidade":
      container.innerHTML = mobileHtmlUnidadeForm_();
      mobileCarregarClientesSelect_("mUnidadeClienteId");
      break;
    case "equipamento":
      MOBILE_EQUIP_FOTOS = { plaqueta: null, equipamento: null };
      container.innerHTML = mobileHtmlEquipamentoForm_();
      mobileCarregarClientesEquip_("mEquipClienteId");
      break;
    case "nova_os":
      MOBILE_OS_OPCOES       = null;
      MOBILE_OS_QUESTIONARIO = null;
      container.innerHTML = mobileHtmlNovaOS_();
      mobileCarregarOpcoesOS_();
      break;
    case "documentos":
      container.innerHTML = mobileHtmlPlaceholder_(
        "Documentos",
        "fas fa-folder-open",
        "Em breve: acesso a documentos tecnicos sera implementado no Bloco 5-F."
      );
      break;
    default:
      container.innerHTML = mobileHtmlPlaceholder_(nome, "fas fa-clock", "Em desenvolvimento.");
  }

  container.scrollTop = 0;
}

function mobileVoltar_() {
  mobileAbrirTela_("home");
}

/* ---- Pane: Home ---- */

function mobileHtmlHome_() {
  var nome = "Tecnico";
  if (USER_CONTEXT) {
    var n = USER_CONTEXT.nome || USER_CONTEXT.usuario || "";
    if (n) nome = n.split(" ")[0];
  }

  var cards = [
    { tela: "cliente",     icone: "fas fa-building",       label: "+ Cliente",  cor: "#dbeafe" },
    { tela: "unidade",     icone: "fas fa-location-dot",   label: "+ Unidade",  cor: "#dcfce7" },
    { tela: "equipamento", icone: "fas fa-microscope",     label: "+ Equip.",   cor: "#fef3c7" },
    { tela: "nova_os",     icone: "fas fa-plus-circle",    label: "Nova OS",    cor: "#ede9fe" },
    { tela: "minhas_os",   icone: "fas fa-clipboard-list", label: "Minhas OS",  cor: "#e0f2fe" },
    { tela: "frota",       icone: "fas fa-car-side",       label: "Frota",      cor: "#d1fae5" },
    { tela: "qr",          icone: "fas fa-qrcode",         label: "Ler QR",     cor: "#e0e7ff" },
    { tela: "documentos",  icone: "fas fa-folder-open",    label: "Documentos", cor: "#fce7f3" }
  ];

  return '<div class="mobile-home">' +
    '<p class="mobile-saudacao">Ola, ' + escapeHtml_(nome) + '!</p>' +
    '<p class="mobile-saudacao-sub">Selecione uma acao</p>' +
    '<div class="mobile-grid">' +
    cards.map(function(c) {
      return '<button class="mobile-card" type="button" ' +
        'style="background:' + c.cor + ';" ' +
        'onclick="mobileAbrirTela_(\'' + c.tela + '\')">' +
        '<i class="' + c.icone + ' mobile-card-icon"></i>' +
        '<span class="mobile-card-label">' + escapeHtml_(c.label) + '</span>' +
        '</button>';
    }).join("") +
    '</div></div>';
}

/* ---- Pane: Minhas OS ---- */

function mobileHtmlMinhasOS_() {
  var filtros = [
    { id: "todas",       label: "Todas"       },
    { id: "hoje",        label: "Hoje"        },
    { id: "abertas",     label: "Abertas"     },
    { id: "em_execucao", label: "Em execucao" },
    { id: "concluidas",  label: "Concluidas"  }
  ];
  return '<div class="mobile-pane" style="padding-bottom:0;">' +
    '<button class="mobile-back" type="button" onclick="mobileVoltar_()">' +
    '<i class="fas fa-arrow-left"></i> Voltar</button>' +
    '<h2 class="mobile-pane-title" style="padding:0 0 4px;">Minhas OS</h2>' +
    '<div class="mobile-os-filtros" id="mOSFiltros">' +
    filtros.map(function(f, i) {
      return '<button class="mobile-os-filtro-btn' + (f.id === "todas" ? " mobile-os-filtro-ativo" : "") + '" ' +
        'type="button" onclick="mobileOSFiltrar_(\'' + f.id + '\')">' + f.label + '</button>';
    }).join("") +
    '</div>' +
    '<div id="mOSListaWrap" style="padding-top:4px;">' +
      '<div style="text-align:center;padding:48px 0;">' +
        '<i class="fas fa-spinner fa-spin" style="font-size:28px;color:var(--metro-green);"></i>' +
        '<div style="margin-top:12px;color:var(--muted);font-size:13px;">Carregando...</div>' +
      '</div>' +
    '</div></div>';
}

function mobileCarregarMinhasOS_() {
  google.script.run
    .withSuccessHandler(function(res) {
      console.log("[mobile] osListar:", res && res.total, "itens");
      if (!res || !res.success) {
        mobileOSRenderErroLista_((res && res.message) || "Erro ao carregar OS.");
        return;
      }
      MOBILE_MINHAS_OS_DADOS = res.items || [];
      mobileOSRenderCards_(MOBILE_MINHAS_OS_FILTRO);
    })
    .withFailureHandler(function(err) {
      console.error("[mobile] osListar failure:", err);
      mobileOSRenderErroLista_("Erro ao carregar: " + (err.message || String(err)));
    })
    .osListar(SESSION);
}

function mobileOSRenderErroLista_(msg) {
  var wrap = document.getElementById("mOSListaWrap");
  if (!wrap) return;
  wrap.innerHTML =
    '<div class="mobile-placeholder-box" style="background:#fef2f2;border-color:#fca5a5;margin:16px;">' +
    '<i class="fas fa-circle-exclamation" style="font-size:32px;color:#ef4444;display:block;margin-bottom:10px;"></i>' +
    '<div style="font-size:13px;color:#b91c1c;">' + escapeHtml_(msg) + '</div>' +
    '<button class="mobile-btn-secondary" type="button" onclick="mobileCarregarMinhasOS_()" style="margin-top:14px;">Tentar novamente</button>' +
    '</div>';
}

function mobileOSFiltrar_(filtro) {
  MOBILE_MINHAS_OS_FILTRO = filtro;
  var btns = document.querySelectorAll(".mobile-os-filtro-btn");
  var ids  = ["todas","hoje","abertas","em_execucao","concluidas"];
  btns.forEach(function(b, i) {
    b.classList.toggle("mobile-os-filtro-ativo", ids[i] === filtro);
  });
  mobileOSRenderCards_(filtro);
}

function mobileOSRenderCards_(filtro) {
  var wrap = document.getElementById("mOSListaWrap");
  if (!wrap) return;

  var itens = MOBILE_MINHAS_OS_DADOS;
  var hoje  = new Date().toISOString().substring(0, 10);

  if (filtro === "hoje") {
    itens = itens.filter(function(o) {
      return (o.DATA_AGENDADA && String(o.DATA_AGENDADA).substring(0,10) === hoje) ||
             (o.DATA_ABERTURA && String(o.DATA_ABERTURA).substring(0,10) === hoje);
    });
  } else if (filtro === "abertas") {
    itens = itens.filter(function(o) {
      var s = String(o.STATUS || "").toUpperCase();
      return s === "ABERTA" || s === "AGENDADA";
    });
  } else if (filtro === "em_execucao") {
    itens = itens.filter(function(o) {
      return String(o.STATUS || "").toUpperCase() === "EM_EXECUCAO";
    });
  } else if (filtro === "concluidas") {
    itens = itens.filter(function(o) {
      var s = String(o.STATUS || "").toUpperCase();
      return ["CONCLUIDA","CONCLUIDA_TECNICAMENTE","APROVADA","FATURADA"].indexOf(s) >= 0;
    });
  }

  if (!itens.length) {
    wrap.innerHTML =
      '<div class="mobile-placeholder-box" style="background:#f0f9ff;border-color:#bae6fd;margin:16px;">' +
      '<i class="fas fa-clipboard-list" style="font-size:36px;color:#0ea5e9;display:block;margin-bottom:10px;"></i>' +
      '<div style="font-size:13px;color:#0369a1;">Nenhuma OS encontrada para este filtro.</div>' +
      '</div>';
    return;
  }

  wrap.innerHTML = '<div class="mobile-os-lista">' +
    itens.map(function(o) { return mobileOSRenderCard_(o); }).join("") +
  '</div>';
}

function mobileOSBadgeStatus_(status) {
  var s = String(status || "").toUpperCase();
  var cor = "#6b7280", bg = "#f3f4f6";
  if (s === "ABERTA")                          { cor = "#1d4ed8"; bg = "#dbeafe"; }
  else if (s === "AGENDADA")                   { cor = "#7c3aed"; bg = "#ede9fe"; }
  else if (s === "EM_EXECUCAO")                { cor = "#059669"; bg = "#d1fae5"; }
  else if (s === "CONCLUIDA" || s === "CONCLUIDA_TECNICAMENTE") { cor = "#065f46"; bg = "#d1fae5"; }
  else if (s === "APROVADA")                   { cor = "#065f46"; bg = "#bbf7d0"; }
  else if (s === "CANCELADA")                  { cor = "#991b1b"; bg = "#fee2e2"; }
  return '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;' +
    'background:' + bg + ';color:' + cor + ';">' + escapeHtml_(s.replace(/_/g," ")) + '</span>';
}

function mobileOSBadgePrioridade_(prioridade) {
  var p = String(prioridade || "").toUpperCase();
  var cor = "#6b7280", bg = "#f3f4f6";
  if (p === "URGENTE")     { cor = "#991b1b"; bg = "#fee2e2"; }
  else if (p === "ALTA")   { cor = "#c2410c"; bg = "#ffedd5"; }
  else if (p === "NORMAL") { cor = "#1d4ed8"; bg = "#dbeafe"; }
  return '<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;' +
    'background:' + bg + ';color:' + cor + ';">' + escapeHtml_(p || "NORMAL") + '</span>';
}

function mobileOSRenderCard_(o) {
  var osId    = String(o.ID || "");
  var numero  = escapeHtml_(o.NUMERO_OS || o.ID || "OS");
  var cliente = escapeHtml_(o.CLIENTE_NOME || o.CLIENTE_ID || "");
  var unidade = escapeHtml_(o.UNIDADE_NOME || o.UNIDADE_ID || "");
  var equip   = escapeHtml_([o.EQUIPAMENTO_TAG, o.EQUIPAMENTO_TIPO].filter(Boolean).join(" / ") || o.EQUIPAMENTO_ID || "");
  var tipo    = escapeHtml_(String(o.TIPO_OS || "").replace(/_/g," "));
  var dataAgd = o.DATA_AGENDADA ? String(o.DATA_AGENDADA).substring(0,16).replace("T"," ") : "";
  var temQuest = !!(o.QUESTIONARIO_MODELO_ID);

  return '<div class="mobile-os-card">' +
    '<div class="mobile-os-card-header">' +
      '<span class="mobile-os-numero">' + numero + '</span>' +
      '<div style="display:flex;gap:5px;flex-wrap:wrap;">' +
        mobileOSBadgeStatus_(o.STATUS) + mobileOSBadgePrioridade_(o.PRIORIDADE) +
      '</div>' +
    '</div>' +
    '<div class="mobile-os-card-body">' +
      (cliente  ? '<div class="mobile-os-row"><i class="fas fa-building"></i>' + cliente + '</div>'  : '') +
      (unidade  ? '<div class="mobile-os-row"><i class="fas fa-location-dot"></i>' + unidade + '</div>' : '') +
      (equip    ? '<div class="mobile-os-row"><i class="fas fa-microscope"></i>' + equip + '</div>'  : '') +
      (tipo     ? '<div class="mobile-os-row"><i class="fas fa-tag"></i>' + tipo + '</div>'          : '') +
      (dataAgd  ? '<div class="mobile-os-row"><i class="fas fa-calendar"></i>' + escapeHtml_(dataAgd) + '</div>' : '') +
      (temQuest ? '<div class="mobile-os-row" style="color:#15803d;"><i class="fas fa-list-check" style="color:#16a34a;"></i>Questionario vinculado</div>' : '') +
    '</div>' +
    '<div class="mobile-os-card-footer">' +
      '<button class="mobile-btn-secondary" type="button" style="flex:1;" ' +
        'onclick="mobileOSExecutar_(\'' + osId + '\')">' +
        '<i class="fas fa-eye" style="margin-right:6px;"></i>Abrir' +
      '</button>' +
      '<button class="mobile-btn-primary" type="button" style="flex:1;" ' +
        'onclick="mobileOSExecutar_(\'' + osId + '\')">' +
        '<i class="fas fa-play" style="margin-right:6px;"></i>Executar' +
      '</button>' +
    '</div>' +
  '</div>';
}

function mobileOSExecutar_(osId) {
  console.log("[OS_EXEC] mobileOSExecutar_", osId);
  var dlg = document.getElementById("mOSDialogPos");
  if (dlg) dlg.remove();

  if (!osId) {
    mobileToast_("ID da OS nao localizado. Atualize a lista e tente novamente.", "erro");
    return;
  }

  if (typeof window.renderOSExecucaoModulo_ !== "function") {
    mobileToast_("Erro interno: modulo de execucao nao carregado. Recarregue a pagina.", "erro");
    console.error("[OS_EXEC] window.renderOSExecucaoModulo_ nao definida. bare=" + typeof renderOSExecucaoModulo_ + " window=" + typeof window.renderOSExecucaoModulo_);
    return;
  }

  window.renderOSExecucaoModulo_(osId);

  // Patch the back button to return to SGO+ Campo instead of desktop
  setTimeout(function() {
    var btns = document.querySelectorAll(".module-header .btn-secondary");
    btns.forEach(function(b) {
      if ((b.getAttribute("onclick") || "").indexOf("abrir") >= 0 ||
          b.textContent.indexOf("Voltar") >= 0) {
        b.setAttribute("onclick", "renderMobileCampo_()");
        b.innerHTML = "&#8592; SGO+ Campo";
      }
    });
  }, 80);
}

/* ---- Pane: Nova OS ---- */

function mobileHtmlNovaOS_() {
  return '<div class="mobile-pane">' +
    '<button class="mobile-back" type="button" onclick="mobileVoltar_()">' +
    '<i class="fas fa-arrow-left"></i> Voltar</button>' +
    '<h2 class="mobile-pane-title">Nova OS</h2>' +
    '<p class="mobile-pane-sub">Criacao rapida de Ordem de Servico</p>' +
    '<div id="mNovaOSFormWrap">' +
      '<div style="text-align:center;padding:48px 0;">' +
        '<i class="fas fa-spinner fa-spin" style="font-size:28px;color:var(--metro-green);"></i>' +
        '<div style="margin-top:12px;color:var(--muted);font-size:13px;">Carregando opcoes...</div>' +
      '</div>' +
    '</div></div>';
}

function mobileCarregarOpcoesOS_() {
  google.script.run
    .withSuccessHandler(function(res) {
      console.log("[mobile] osListarOpcoes ok:", res && res.success);
      if (!res || !res.success) {
        mobileNovaOSRenderErro_((res && res.message) || "Erro ao carregar opcoes.");
        return;
      }
      MOBILE_OS_OPCOES = res;
      mobileNovaOSRenderForm_();
    })
    .withFailureHandler(function(err) {
      console.error("[mobile] osListarOpcoes failure:", err);
      mobileNovaOSRenderErro_("Erro ao carregar: " + (err.message || String(err)));
    })
    .osListarOpcoes(SESSION);
}

function mobileNovaOSRenderErro_(msg) {
  var wrap = document.getElementById("mNovaOSFormWrap");
  if (!wrap) return;
  wrap.innerHTML =
    '<div class="mobile-placeholder-box" style="background:#fef2f2;border-color:#fca5a5;">' +
    '<i class="fas fa-circle-exclamation" style="font-size:32px;color:#ef4444;display:block;margin-bottom:10px;"></i>' +
    '<div style="font-size:13px;color:#b91c1c;">' + escapeHtml_(msg) + '</div>' +
    '<button class="mobile-btn-secondary" type="button" onclick="mobileCarregarOpcoesOS_()" style="margin-top:14px;">Tentar novamente</button>' +
    '</div>';
}

function mobileNovaOSRenderForm_() {
  var wrap = document.getElementById("mNovaOSFormWrap");
  if (!wrap || !MOBILE_OS_OPCOES) return;

  var clientes = MOBILE_OS_OPCOES.clientes || [];
  var tipos    = MOBILE_OS_OPCOES.tipos    || [];
  var priors   = MOBILE_OS_OPCOES.prioridades || [];
  var tecnicos = MOBILE_OS_OPCOES.tecnicos || [];

  var optClientes = '<option value="">Selecione o cliente...</option>' +
    clientes.map(function(c) {
      return '<option value="' + escapeHtml_(String(c.ID)) + '">' + escapeHtml_(c.NOME || String(c.ID)) + '</option>';
    }).join("");

  var optTipos = '<option value="">Selecione o tipo...</option>' +
    tipos.map(function(t) {
      return '<option value="' + escapeHtml_(String(t)) + '">' + escapeHtml_(String(t).replace(/_/g," ")) + '</option>';
    }).join("");

  var optPriors = priors.map(function(p) {
    var sel = (String(p).toUpperCase() === "NORMAL") ? " selected" : "";
    return '<option value="' + escapeHtml_(String(p)) + '"' + sel + '>' + escapeHtml_(String(p)) + '</option>';
  }).join("");
  if (!optPriors) optPriors = '<option value="NORMAL" selected>NORMAL</option>';

  var optTecnicos = '<option value="">Sem tecnico (opcional)</option>' +
    tecnicos.map(function(t) {
      return '<option value="' + escapeHtml_(String(t.ID)) + '">' + escapeHtml_(t.NOME || String(t.ID)) + '</option>';
    }).join("");

  wrap.innerHTML =
    '<div class="mobile-form">' +

    '<div class="mobile-field-group">' +
    '<label class="mobile-label">Cliente <span style="color:#ef4444;">*</span></label>' +
    '<select id="mOSClienteId" class="mobile-input mobile-select" onchange="mobileOSOnClienteChange_(this.value)">' +
    optClientes + '</select>' +
    '</div>' +

    '<div class="mobile-field-group">' +
    '<label class="mobile-label">Unidade <span style="color:#ef4444;">*</span></label>' +
    '<select id="mOSUnidadeId" class="mobile-input mobile-select" onchange="mobileOSOnUnidadeChange_(this.value)">' +
    '<option value="">Selecione o cliente primeiro</option>' +
    '</select>' +
    '</div>' +

    '<div class="mobile-field-group">' +
    '<label class="mobile-label">Equipamento <span style="color:#ef4444;">*</span></label>' +
    '<select id="mOSEquipId" class="mobile-input mobile-select" onchange="mobileOSOnEquipChange_(this.value)">' +
    '<option value="">Selecione a unidade primeiro</option>' +
    '</select>' +
    '</div>' +

    '<div class="mobile-field-group">' +
    '<label class="mobile-label">Tipo de Equipamento</label>' +
    '<input id="mOSTipoEquip" class="mobile-input" type="text" readonly ' +
    'placeholder="Preenchido ao selecionar equipamento" style="background:#f9fafb;color:var(--muted);">' +
    '</div>' +

    '<div class="mobile-field-group">' +
    '<label class="mobile-label">Tipo OS <span style="color:#ef4444;">*</span></label>' +
    '<select id="mOSTipoOS" class="mobile-input mobile-select" onchange="mobileOSOnTipoOSChange_(this.value)">' +
    optTipos + '</select>' +
    '</div>' +

    '<div class="mobile-field-group">' +

function mobileOSOnClienteChange_(clienteId) {
  var selUni = document.getElementById("mOSUnidadeId");
  var selEqp = document.getElementById("mOSEquipId");
  if (!selUni || !MOBILE_OS_OPCOES) return;

  if (!clienteId) {
    selUni.innerHTML = '<option value="">Selecione o cliente primeiro</option>';
    if (selEqp) selEqp.innerHTML = '<option value="">Selecione a unidade primeiro</option>';
    mobileOSLimparQuestionario_();
    return;
  }

  var unidades = (MOBILE_OS_OPCOES.unidades || []).filter(function(u) {
    return String(u.CLIENTE_ID) === String(clienteId);
  });

  selUni.innerHTML = unidades.length
    ? '<option value="">Selecione a unidade...</option>' + unidades.map(function(u) {
        return '<option value="' + escapeHtml_(String(u.ID)) + '">' + escapeHtml_(u.NOME || String(u.ID)) + '</option>';
      }).join("")
    : '<option value="">Nenhuma unidade para este cliente</option>';

  if (selEqp) selEqp.innerHTML = '<option value="">Selecione a unidade primeiro</option>';

  var tipoInput = document.getElementById("mOSTipoEquip");
  if (tipoInput) tipoInput.value = "";
  mobileOSLimparQuestionario_();
}

function mobileOSOnUnidadeChange_(unidadeId) {
  var selEqp = document.getElementById("mOSEquipId");
  if (!selEqp || !MOBILE_OS_OPCOES) return;

  if (!unidadeId) {
    selEqp.innerHTML = '<option value="">Selecione a unidade primeiro</option>';
    var tipoInput = document.getElementById("mOSTipoEquip");
    if (tipoInput) tipoInput.value = "";
    mobileOSLimparQuestionario_();
    return;
  }

  var equips = (MOBILE_OS_OPCOES.equipamentos || []).filter(function(e) {
    return String(e.UNIDADE_ID) === String(unidadeId);
  });

  selEqp.innerHTML = equips.length
    ? '<option value="">Selecione o equipamento...</option>' + equips.map(function(e) {
        var label = e.LABEL || [e.TAG, e.TIPO, e.MODELO].filter(Boolean).join(" - ") || String(e.ID);
        return '<option value="' + escapeHtml_(String(e.ID)) + '" data-tipo="' + escapeHtml_(e.TIPO || "") + '">' +
          escapeHtml_(label) + '</option>';
      }).join("")
    : '<option value="">Nenhum equipamento para esta unidade</option>';

  var tipoInput = document.getElementById("mOSTipoEquip");
  if (tipoInput) tipoInput.value = "";
  mobileOSLimparQuestionario_();
}

function mobileOSOnEquipChange_(equipId) {
  var tipoInput = document.getElementById("mOSTipoEquip");
  if (!equipId || !MOBILE_OS_OPCOES) {
    if (tipoInput) tipoInput.value = "";
    mobileOSLimparQuestionario_();
    return;
  }

  var equip = (MOBILE_OS_OPCOES.equipamentos || []).find(function(e) {
    return String(e.ID) === String(equipId);
  });

  var tipo = equip ? (equip.TIPO || "") : "";
  if (tipoInput) tipoInput.value = tipo;

  mobileOSCheckQuestionario_();
}

function mobileOSOnTipoOSChange_(tipoOS) {
  mobileOSCheckQuestionario_();
}

function mobileOSCheckQuestionario_() {
  var tipoOSEl    = document.getElementById("mOSTipoOS");
  var tipoEquipEl = document.getElementById("mOSTipoEquip");
  if (!tipoOSEl || !tipoEquipEl) return;

  var tipoOS    = (tipoOSEl.value    || "").trim();
  var tipoEquip = (tipoEquipEl.value || "").trim();

  if (!tipoOS || !tipoEquip) { mobileOSLimparQuestionario_(); return; }

  var card = document.getElementById("mOSQuestionarioCard");
  if (card) {
    card.style.display = "";
    card.innerHTML =
      '<div style="padding:10px 14px;border-radius:10px;background:#f0fdf4;border:1px solid #86efac;">' +
      '<i class="fas fa-spinner fa-spin" style="color:#16a34a;margin-right:8px;"></i>' +
      '<span style="font-size:13px;color:#15803d;">Buscando questionario sugerido...</span></div>';
  }

  MOBILE_OS_QUESTIONARIO = null;

  google.script.run
    .withSuccessHandler(function(res) {
      console.log("[mobile] checklistModeloPorTipoOSTipoEquipamento:", res && res.success, res && res.item && res.item.NOME);
      if (res && res.success && res.item && res.item.ID) {
        var m = res.item;
        MOBILE_OS_QUESTIONARIO = {
          id:    m.ID   || "",
          nome:  m.NOME || "",
          total: m.TOTAL_PERGUNTAS || m.TOTAL_ITENS ||
                 (m.perguntas ? m.perguntas.length : 0) ||
                 (m.itens     ? m.itens.length     : 0) || ""
        };
        mobileOSMostrarCardQuestionario_(true);
      } else {
        MOBILE_OS_QUESTIONARIO = null;
        mobileOSMostrarCardQuestionario_(false);
      }
    })
    .withFailureHandler(function(err) {
      console.error("[mobile] checklistModeloPorTipoOSTipoEquipamento failure:", err);
      MOBILE_OS_QUESTIONARIO = null;
      mobileOSMostrarCardQuestionario_(false);
    })
    .checklistModeloPorTipoOSTipoEquipamento(SESSION, tipoOS, tipoEquip);
}

function mobileOSMostrarCardQuestionario_(encontrado) {
  var card = document.getElementById("mOSQuestionarioCard");
  if (!card) return;
  card.style.display = "";

  if (encontrado && MOBILE_OS_QUESTIONARIO) {
    var q = MOBILE_OS_QUESTIONARIO;
    card.innerHTML =
      '<div style="padding:12px 16px;border-radius:10px;background:#f0fdf4;border:1px solid #86efac;">' +
      '<div style="font-weight:700;font-size:13px;color:#166534;margin-bottom:4px;">' +
      '<i class="fas fa-circle-check" style="margin-right:6px;"></i>Questionario sugerido: ' + escapeHtml_(q.nome) + '</div>' +
      (q.total ? '<div style="font-size:12px;color:#15803d;">Perguntas: ' + escapeHtml_(String(q.total)) + '</div>' : '') +
      '</div>';
  } else {
    card.innerHTML =
      '<div style="padding:12px 16px;border-radius:10px;background:#fefce8;border:1px solid #fde047;">' +
      '<div style="font-weight:700;font-size:13px;color:#854d0e;margin-bottom:4px;">' +
      '<i class="fas fa-triangle-exclamation" style="margin-right:6px;"></i>Nenhum questionario configurado</div>' +

function mobileOSLimparQuestionario_() {
  MOBILE_OS_QUESTIONARIO = null;
  var card = document.getElementById("mOSQuestionarioCard");
  if (card) card.style.display = "none";
}

function mobileOSAplicarPrefill_() {
  var pf = MOBILE_OS_PREFILL;
  if (!pf) return;

  var selCliente = document.getElementById("mOSClienteId");
  if (selCliente && pf.clienteId) {
    selCliente.value = String(pf.clienteId);
    mobileOSOnClienteChange_(String(pf.clienteId));
  }

  setTimeout(function() {
    var selUnidade = document.getElementById("mOSUnidadeId");
    if (selUnidade && pf.unidadeId) {
      selUnidade.value = String(pf.unidadeId);
      mobileOSOnUnidadeChange_(String(pf.unidadeId));
    }
    setTimeout(function() {
      var selEquip = document.getElementById("mOSEquipId");
      if (selEquip && pf.equipamentoId) {
        selEquip.value = String(pf.equipamentoId);
        mobileOSOnEquipChange_(String(pf.equipamentoId));
      }
      MOBILE_OS_PREFILL = null;
    }, 60);
  }, 60);
}

function mobileSalvarNovaOS_() {
  var clienteId  = ((document.getElementById("mOSClienteId")    || {}).value || "").trim();
  var unidadeId  = ((document.getElementById("mOSUnidadeId")    || {}).value || "").trim();
  var equipId    = ((document.getElementById("mOSEquipId")      || {}).value || "").trim();
  var tipoOS     = ((document.getElementById("mOSTipoOS")       || {}).value || "").trim();
  var prioridade = ((document.getElementById("mOSPrioridade")   || {}).value || "").trim();
  var relato     = ((document.getElementById("mOSRelatoCliente") || {}).value || "").trim();

  if (!clienteId)  { mobileToast_("Selecione o cliente.", "erro"); return; }
  if (!unidadeId)  { mobileToast_("Selecione a unidade.", "erro"); return; }
  if (!equipId)    { mobileToast_("Selecione o equipamento.", "erro"); return; }
  if (!tipoOS)     { mobileToast_("Selecione o tipo de OS.", "erro"); return; }
  if (!prioridade) { mobileToast_("Selecione a prioridade.", "erro"); return; }
  if (!relato)     { mobileToast_("Informe o relato do cliente.", "erro"); return; }

  var btn = document.getElementById("mOSSalvarBtn");
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Criando OS...'; }

  var orientacao = ((document.getElementById("mOSOrientacao")   || {}).value || "").trim();
  var tecnicoId  = ((document.getElementById("mOSTecnicoId")    || {}).value || "").trim();
  var dataAgend  = ((document.getElementById("mOSDataAgendada") || {}).value || "").trim();

  var payload = {
    CLIENTE_ID:         clienteId,
    UNIDADE_ID:         unidadeId,
    EQUIPAMENTO_ID:     equipId,
    TIPO_OS:            tipoOS,
    PRIORIDADE:         prioridade,
    RELATO_CLIENTE:     relato,
    ORIENTACAO_TECNICA: orientacao
  };

  if (tecnicoId) payload.TECNICO_ID    = tecnicoId;
  if (dataAgend) payload.DATA_AGENDADA = dataAgend;
  if (MOBILE_OS_QUESTIONARIO && MOBILE_OS_QUESTIONARIO.id) {
    payload.QUESTIONARIO_MODELO_ID = MOBILE_OS_QUESTIONARIO.id;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      console.log("[mobile] osCriar response:", JSON.stringify(res).substring(0, 200));
      if (!res || !res.success) {
        mobileToast_((res && res.message) || "Falha ao criar OS.", "erro");
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:8px;"></i>Criar OS'; }
        return;
      }
      var osId    = (res.item && (res.item.ID || res.item.id)) || res.id || "";
      var numOS   = (res.item && res.item.NUMERO_OS) || "";
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:8px;"></i>Criar OS'; }
      mobileOSDialogPosCriar_(osId, numOS);
    })
    .withFailureHandler(function(err) {
      console.error("[mobile] osCriar failure:", err);
      mobileToast_("Erro ao criar OS: " + (err.message || String(err)), "erro");
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:8px;"></i>Criar OS'; }
    })
    .osCriar(SESSION, payload);
}

  var el = document.createElement("div");
  el.id = "mobileToastEl";
  el.className = "mobile-toast mobile-toast-" + (tipo || "ok");
  el.textContent = msg;

  var shell = document.getElementById("mobileCampoShell");

  setTimeout(function() { el.classList.add("mobile-toast-show"); }, 10);

function mobileBuscarCnpj_() {
  var cnpj = ((document.getElementById("mClienteCnpj") || {}).value || "").replace(/\D/g, "");
  if (cnpj.length !== 14) {
    mobileToast_("Digite um CNPJ valido (14 digitos).", "aviso");
    return;
  }

  var buscarBtn = document.querySelector('[onclick="mobileBuscarCnpj_()"]');
  if (buscarBtn) { buscarBtn.disabled = true; buscarBtn.textContent = "..."; }
  mobileToast_("Buscando na Receita Federal...", "ok");

  fetch("https://brasilapi.com.br/api/cnpj/v1/" + cnpj)
    .then(function(res) {
      if (!res.ok) throw new Error("CNPJ nao encontrado (HTTP " + res.status + ")");
      return res.json();
    })
    .then(function(data) {
      var rsEl = document.getElementById("mClienteRazaoSocial");
      var nfEl = document.getElementById("mClienteNomeFantasia");
      var tfEl = document.getElementById("mClienteTelefone");
      if (rsEl) rsEl.value = data.razao_social || "";
      if (nfEl) nfEl.value = data.nome_fantasia || data.razao_social || "";
      if (tfEl) tfEl.value = data.ddd_telefone_1 || "";
      mobileToast_("Dados preenchidos pela Receita!", "ok");
    })
    .catch(function(err) {
      console.warn("[mobile] BrasilAPI CNPJ:", err);
      mobileToast_("CNPJ nao encontrado na Receita. Preencha manualmente.", "aviso");
    })
    .finally(function() {
      if (buscarBtn) { buscarBtn.disabled = false; buscarBtn.textContent = "Buscar"; }
    });
}

function mobileBuscarCnpjUnidade_() {
  var cnpj = ((document.getElementById("mUnidadeCnpj") || {}).value || "").replace(/\D/g, "");
  if (cnpj.length !== 14) {
    mobileToast_("Digite um CNPJ valido (14 digitos).", "aviso");
    return;
  }

  var btn = document.getElementById("mUnidadeCnpjBtn");
  if (btn) { btn.disabled = true; btn.textContent = "..."; }
  mobileToast_("Buscando na Receita Federal...", "ok");

  fetch("https://brasilapi.com.br/api/cnpj/v1/" + cnpj)
    .then(function(res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(function(data) {
      var nomeEl  = document.getElementById("mUnidadeNome");
      var endEl   = document.getElementById("mUnidadeEndereco");
      var cidEl   = document.getElementById("mUnidadeCidade");
      var ufEl    = document.getElementById("mUnidadeUF");
      var telEl   = document.getElementById("mUnidadeWhatsapp");

      var fantasia = data.nome_fantasia || data.razao_social || "";
      var logr     = data.logradouro || "";
      var num      = data.numero     || "";
      var bairro   = data.bairro     || "";

function mobileCapturaGPS_() {
  var btn    = document.getElementById("mUnidadeGpsBtn");
  var status = document.getElementById("mUnidadeGpsStatus");

  if (!navigator.geolocation) {
    if (status) { status.textContent = "GPS nao disponivel neste dispositivo."; status.className = "mobile-gps-status mobile-gps-erro"; }
    return;
  }

  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Obtendo localizacao...'; }
  if (status) { status.textContent = ""; status.className = "mobile-gps-status"; }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      MOBILE_GPS_LAT = pos.coords.latitude;
      MOBILE_GPS_LNG = pos.coords.longitude;
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-circle-check" style="margin-right:8px;color:#16a34a;"></i>Localizacao capturada'; }
      if (status) {
        status.textContent = "Lat: " + MOBILE_GPS_LAT.toFixed(6) + " | Lng: " + MOBILE_GPS_LNG.toFixed(6);
        status.className = "mobile-gps-status mobile-gps-ok";
      }
    },
    function(err) {
      MOBILE_GPS_LAT = null;
      MOBILE_GPS_LNG = null;
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-location-dot" style="margin-right:8px;"></i>Usar localizacao atual'; }
      if (status) {
        var msg = err.code === 1 ? "Permissao negada." : err.code === 2 ? "Posicao indisponivel." : "Tempo esgotado.";
        status.textContent = msg;
        status.className = "mobile-gps-status mobile-gps-erro";
      }
    },
    { timeout: 15000, maximumAge: 60000, enableHighAccuracy: true }
  );
}

function mobileEquipFotoSelecionar_(slot, inputEl) {
  var file = inputEl && inputEl.files && inputEl.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl  = e.target.result;
    var sepIdx   = dataUrl.indexOf(",");
    var base64   = dataUrl.substring(sepIdx + 1);
    MOBILE_EQUIP_FOTOS[slot] = { base64: base64, mime: file.type || "image/jpeg", nome: file.name };

    var thumbWrap = document.getElementById(slot === "plaqueta" ? "mEquipThumbPlaqueta" : "mEquipThumbEquip");
    var thumbImg  = document.getElementById(slot === "plaqueta" ? "mEquipImgPlaqueta"   : "mEquipImgEquip");
    var btn       = document.getElementById(slot === "plaqueta" ? "mEquipBtnPlaqueta"   : "mEquipBtnEquip");

    if (thumbImg)  thumbImg.src      = dataUrl;
    if (thumbWrap) thumbWrap.style.display = "";

  };
  reader.readAsDataURL(file);
}

function mobileEquipUploadFotos_(equipId, onConcluido) {
  var slots   = ["plaqueta", "equipamento"];
  var tipos   = { plaqueta: "PLAQUETA", equipamento: "EQUIPAMENTO" };
  var idx     = 0;
  var erros   = [];

  function proximoSlot() {
    if (idx >= slots.length) {
      if (erros.length) mobileToast_("Equipamento salvo. Falha em " + erros.length + " foto(s).", "aviso");
      else              mobileToast_("Equipamento cadastrado com sucesso!", "ok");
      onConcluido();
      return;
    }
    var slot = slots[idx++];
    var foto = MOBILE_EQUIP_FOTOS[slot];
    if (!foto || !foto.base64) { proximoSlot(); return; }

    if (!equipId) { proximoSlot(); return; }

    google.script.run
      .withSuccessHandler(function(res) {
        console.log("[mobile] equipamentoFotoUploadBase64 (" + slot + "):", JSON.stringify(res));
        if (!res || !res.success) erros.push(slot);
        proximoSlot();
      })
      .withFailureHandler(function(err) {
        console.error("[mobile] foto upload failure (" + slot + "):", err);
        erros.push(slot);
        proximoSlot();
      })
      .equipamentoFotoUploadBase64(SESSION, equipId, {
        BASE64_DATA: foto.base64,
        MIME_TYPE:   foto.mime,
        TIPO_FOTO:   tipos[slot],
        NOME_ARQUIVO: "equip_" + tipos[slot].toLowerCase() + "_" + (equipId || "novo") + "." + (foto.mime.includes("png") ? "png" : "jpg")
      });
  }

  proximoSlot();
}

  dlg.className = "mobile-equip-dialog";
  dlg.innerHTML =
    '<div class="mobile-equip-dialog-box">' +
      '<i class="fas fa-circle-check" style="font-size:44px;color:#16a34a;display:block;margin-bottom:12px;"></i>' +
      '<div class="mobile-equip-dialog-title">Equipamento cadastrado!</div>' +
      '<div class="mobile-equip-dialog-sub">Deseja criar uma OS para este equipamento?</div>' +
      '<div class="mobile-equip-dialog-btns">' +
        '<button class="mobile-btn-primary" type="button" style="margin-bottom:10px;" ' +
          'onclick="mobileEquipCriarOS_(\'' + escapeHtml_(equipId) + '\')">' +
          '<i class="fas fa-plus-circle" style="margin-right:8px;"></i>Criar OS' +
        '</button>' +
        '<button class="mobile-menu-action" type="button" ' +
          'onclick="document.getElementById(\'mEquipDialogPos\').remove(); mobileAbrirTela_(\'home\')">' +
          'Fechar' +
        '</button>' +
      '</div>' +
    '</div>';

  shell.appendChild(dlg);
}

function mobileEquipCriarOS_(equipId) {
  var dlg = document.getElementById("mEquipDialogPos");
  if (dlg) dlg.remove();
  // MOBILE_OS_PREFILL foi preenchido em mobileSalvarEquipamento_ antes de chamar esta função
  mobileAbrirTela_("nova_os");
}

/* ---- Modo Gestão Completo ---- */

function mobileModoGestaoCompleto_() {
  var topbar  = document.querySelector(".topbar");
  var sidebar = document.querySelector(".sidebar");
  if (topbar)  topbar.style.display  = "";
  if (sidebar) sidebar.style.display = "";
  var div = document.getElementById("conteudo");
  if (div) div.innerHTML = "";
  abrir("dashboard");
}
</script>
