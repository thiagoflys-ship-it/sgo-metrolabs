<!-- FIN_FLASH_V2: componente isolado — V2.10 Pente Fino Funcional. -->
<script>
// ══ UTILITÁRIOS ═══════════════════════════════════════════════════════════════

function ffv2St_() {
  if (!window.__ffv2) window.__ffv2 = {
    perfil: null, ctx: null, abaC: 'registrar', abaF: 'dashboard',
    dados: {}, acoes: false, carregado: {}, portalCarregado: false,
    dashboardLeve: null, dashboardTs: null
  };
  return window.__ffv2;
}

function finFlashV2Escape_(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function finFlashV2FmtMoeda_(v) {
  return 'R$ ' + Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function finFlashV2Tabela_(cols, rows, msg) { return ffv2Tabela_(cols, rows, msg); }
function finFlashV2AuditarEstrutura_() { return {ok:true}; }

function ffv2Badge_(status) {
  var m = {
    'PENDENTE':'#ef4444','CONCILIADO':'#22c55e','AGUARDANDO':'#f59e0b',
    'AGUARDANDO_CORRECAO':'#f59e0b','REPROVADO':'#ef4444','ENVIADO_SIMULADO':'#3b82f6',
    'IMPORTADO':'#6366f1','PREPARADO':'#f97316','ATIVO':'#22c55e','ATIVA':'#22c55e',
    'BLOQUEADO':'#ef4444','INATIVO':'#94a3b8','VIRTUAL':'#8b5cf6','FISICO':'#0ea5e9',
    'ALTO':'#ef4444','MÉDIO':'#f59e0b','BAIXO':'#22c55e','GERADO':'#22c55e'
  };
  var cor = m[String(status||'').toUpperCase()] || '#94a3b8';
  return '<span style="background:'+cor+'20;color:'+cor+';border:1px solid '+cor+'50;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;">'+finFlashV2Escape_(status||'—')+'</span>';
}

function ffv2Tabela_(cols, rows, emptyMsg) {
  if (!rows || !rows.length) return '<p style="color:#94a3b8;font-size:12px;padding:16px 0;">'+(emptyMsg||'Nenhum registro.')+'</p>';
  var h = '<div style="overflow-x:auto;border:1px solid #e2e8f0;border-radius:8px;margin-top:8px;"><table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr style="background:#f8fafc;">';
  cols.forEach(function(c){ h += '<th style="padding:8px 10px;text-align:left;font-weight:700;color:#475569;border-bottom:1px solid #e2e8f0;white-space:nowrap;">'+finFlashV2Escape_(c)+'</th>'; });
  h += '</tr></thead><tbody>';
  rows.forEach(function(row, i) {
    h += '<tr style="background:'+(i%2===0?'#fff':'#f8fafc')+';border-bottom:1px solid #f1f5f9;">';
    cols.forEach(function(c) { h += '<td style="padding:7px 10px;color:#334155;">'+( row['_html_'+c] || finFlashV2Escape_(row[c]||'—') )+'</td>'; });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function ffv2Skel_(n) {
  var h = '';
  for (var i=0; i<(n||3); i++) h += '<div style="background:#f1f5f9;border-radius:8px;height:64px;animation:ffv2sk 1.4s ease-in-out infinite;margin-bottom:8px;"></div>';
  return h;
}

function ffv2KpiCard_(titulo, valor, cor) {
  cor = cor||'#3b82f6';
  return '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;min-width:120px;">'+
    '<p style="margin:0 0 4px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;">'+finFlashV2Escape_(titulo)+'</p>'+
    '<p style="margin:0;font-size:18px;font-weight:800;color:'+cor+';">'+finFlashV2Escape_(String(valor))+'</p>'+
    '</div>';
}

function ffv2Modal_(titulo, html) {
  var el = document.getElementById('ffv2-modal');
  if (!el) { el = document.createElement('div'); el.id='ffv2-modal'; document.body.appendChild(el); }
  el.innerHTML = '<div style="position:fixed;inset:0;background:#0008;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;" onclick="if(event.target===this)ffv2FecharModal_()">'+
    '<div style="background:#fff;border-radius:12px;width:100%;max-width:900px;max-height:90vh;overflow:auto;box-shadow:0 24px 80px #0004;">'+
    '<div style="position:sticky;top:0;background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;">'+
    '<h3 style="margin:0;font-size:15px;font-weight:700;color:#1e293b;">'+finFlashV2Escape_(titulo)+'</h3>'+
    '<div style="display:flex;gap:8px;">'+
    '<button onclick="window.print()" style="background:#2563eb;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;">&#128438; Imprimir</button>'+
    '<button onclick="ffv2FecharModal_()" style="background:#f1f5f9;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;color:#475569;">&#x2715; Fechar</button></div></div>'+
    '<div style="padding:18px;">'+html+'</div></div></div>';
}
function ffv2FecharModal_() {
  var el=document.getElementById('ffv2-modal'); if(el) el.innerHTML='';
}

// ══ CSS ═══════════════════════════════════════════════════════════════════════

function ffv2Css_() {
  return '<style>'+
    '.fin-flash-v2-dev-shell{padding:0!important;max-width:none!important;width:100%!important;}'+
    '.ffv2-wrap{width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1e293b;box-sizing:border-box;}'+
    '.ffv2-hdr{background:linear-gradient(135deg,#0f2d52 0%,#1e4a8a 100%);color:#fff;padding:16px 20px;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}'+
    '.ffv2-hdr h2{margin:0;font-size:17px;font-weight:800;}'+
    '.ffv2-hdr-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}'+
    '.ffv2-badge-p{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid;}'+
    '.ffv2-kpi-row{display:flex;gap:10px;padding:14px 16px;overflow-x:auto;background:#f8fafc;border-bottom:1px solid #e2e8f0;}'+
    '.ffv2-nav{display:flex;overflow-x:auto;background:#f1f5f9;border-bottom:2px solid #e2e8f0;padding:0 8px;}'+
    '.ffv2-nav button{background:none;border:none;padding:10px 14px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}'+
    '.ffv2-nav button.ativa{color:#2563eb;border-bottom-color:#2563eb;background:#fff;}'+
    '.ffv2-nav button:hover:not(.ativa){background:#e2e8f0;color:#334155;}'+
    '.ffv2-pane{padding:16px;background:#fff;min-height:200px;}'+
    '.ffv2-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:12px;}'+
    '.ffv2-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}'+
    '@media(max-width:600px){.ffv2-row2{grid-template-columns:1fr;}}'+
    '.ffv2-lbl{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;display:block;margin-bottom:4px;}'+
    '.ffv2-inp{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;box-sizing:border-box;background:#fff;}'+
    '.ffv2-inp:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px #2563eb30;}'+
    '.ffv2-btn{padding:9px 18px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}'+
    '.ffv2-btn:hover{opacity:.85;}'+
    '.ffv2-btn-p{background:#2563eb;color:#fff;}'+
    '.ffv2-btn-g{background:#16a34a;color:#fff;}'+
    '.ffv2-btn-r{background:#dc2626;color:#fff;}'+
    '.ffv2-btn-o{background:#ea580c;color:#fff;}'+
    '.ffv2-btn-s{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}'+
    '.ffv2-sep{height:1px;background:#f1f5f9;margin:14px 0;}'+
    '.ffv2-msg{padding:10px 14px;border-radius:8px;font-size:12px;margin:8px 0;}'+
    '.ffv2-msg-ok{background:#f0fdf4;color:#166534;border:1px solid #86efac;}'+
    '.ffv2-msg-er{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;}'+
    '.ffv2-msg-av{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}'+
    '.ffv2-msg-in{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;}'+
    '.ffv2-dev-bar{background:#dc2626;color:#fff;padding:4px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}'+
    '.ffv2-section-title{font-size:13px;font-weight:700;color:#334155;margin:0 0 10px;}'+
    '.ffv2-filtro-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end;}'+
    '.ffv2-filtro-bar label{font-size:11px;font-weight:700;color:#64748b;}'+
    '.ffv2-filtro-bar input,.ffv2-filtro-bar select{padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;}'+
    '.ffv2-a4-preview{background:#f8fafc;border:2px dashed #e2e8f0;border-radius:10px;padding:20px;margin-top:12px;}'+
    '@keyframes ffv2sk{0%,100%{opacity:1}50%{opacity:.4}}'+
    '.ffv2-sit-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:4px;}'+
    '.ffv2-sit-card h4{margin:0;font-size:13px;font-weight:700;color:#1e293b;}'+
    '.ffv2-sit-card .ffv2-sit-meta{font-size:11px;color:#64748b;}'+
    '.ffv2-colaboradores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:10px;}'+
    '@media print{body>*:not(#ffv2-modal){display:none!important;}.ffv2-wrap{display:none!important;}#ffv2-modal>div{position:static!important;background:transparent!important;padding:0!important;}#ffv2-modal>div>div{box-shadow:none!important;max-height:none!important;max-width:none!important;border-radius:0!important;}#ffv2-modal>div>div>div:first-child{display:none!important;}}'+
    '</style>';
}

// ══ ENTRY POINTS ══════════════════════════════════════════════════════════════

function finFlashV2Html_() {
  // Abas financeiro renderizadas IMEDIATAMENTE — sem esperar backend.
  // Isso garante que as abas apareçam independente do estado do servidor.
  var abasF = [
    {id:'dashboard',     label:'Dashboard'},
    {id:'colaboradores', label:'Colaboradores e Cartões'},
    {id:'importar',      label:'Importar Extrato Flash'},
    {id:'conferencia',   label:'Conferência de Gastos'},
    {id:'extrato_cpf',   label:'Extrato por Colaborador'},
    {id:'pendencias',    label:'Pendências'},
    {id:'alertas',       label:'Alertas e Cobranças'},
    {id:'documentos',    label:'Documentos e Relatórios'},
    {id:'termos',        label:'Termos de Uso'},
    {id:'auditoria',     label:'Auditoria'},
    {id:'manual',        label:'Manual de Uso'}
  ];
  var navH = '<div class="ffv2-nav">';
  abasF.forEach(function(a) {
    navH += '<button onclick="ffv2NavF_(\''+a.id+'\')" id="ffv2-nf-'+a.id+'" class="'+(a.id==='dashboard'?'ativa':'')+'">'+a.label+'</button>';
  });
  navH += '</div>';
  // Fallback de 8 segundos: se o portal ainda não carregou, mostra erro.
  setTimeout(function(){ ffv2TimeoutFallback_(); }, 8000);
  return ffv2Css_() +
    '<div id="ffv2-wrap" class="ffv2-wrap">' +
      '<div class="ffv2-dev-bar">&#9888; DEV EXCLUSIVO — V2.13 Validação Operacional Bruna &nbsp;' +
        '<button onclick="ffv2DevParaC_()" class="ffv2-btn ffv2-btn-s" style="font-size:10px;padding:2px 8px;">[DEV] Colaborador</button>' +
        '<button onclick="ffv2DevParaF_()" class="ffv2-btn ffv2-btn-s" style="font-size:10px;padding:2px 8px;">[DEV] Financeiro</button>' +
      '</div>' +
      '<div id="ffv2-hdr-box"><div class="ffv2-hdr"><h2>&#9654; Carregando FIN Flash V2&hellip;</h2><p style="margin:2px 0 0;font-size:11px;opacity:.7;">Verificando perfil&hellip;</p></div></div>' +
      '<div id="ffv2-kpi-box" style="display:none;"></div>' +
      '<div id="ffv2-nav-box">' + navH + '</div>' +
      '<div id="ffv2-pane" class="ffv2-pane"><div class="ffv2-msg ffv2-msg-in" style="margin-top:8px;">Carregando dados&hellip;</div></div>' +
    '</div>';
}

function ffv2TimeoutFallback_() {
  if (ffv2St_().portalCarregado) return;
  var pane = document.getElementById('ffv2-pane');
  if (!pane) return;
  pane.innerHTML =
    '<div class="ffv2-msg ffv2-msg-er">&#9888; Não foi possível carregar os dados do FIN Flash V2 no DEV.<br>' +
    '<small style="color:#64748b;display:block;margin-top:4px;">O servidor demorou demais para responder ou há um erro de permissão.</small></div>' +
    '<button onclick="finFlashV2CarregarDesktop_()" class="ffv2-btn ffv2-btn-p" style="margin-top:10px;">&#8635; Tentar novamente</button>';
}

function ffv2ErroRender_(msg) {
  ffv2St_().portalCarregado = true;
  var hdrBox = document.getElementById('ffv2-hdr-box');
  if (hdrBox) hdrBox.innerHTML =
    '<div class="ffv2-hdr" style="background:linear-gradient(135deg,#7f1d1d 0%,#991b1b 100%);">' +
    '<div><h2>&#9888; Erro ao carregar FIN Flash V2</h2>' +
    '<p style="margin:2px 0 0;font-size:11px;opacity:.7;">DEV — verifique permissões e ambiente</p></div></div>';
  var pane = document.getElementById('ffv2-pane');
  if (pane) pane.innerHTML =
    '<div class="ffv2-msg ffv2-msg-er">Não foi possível carregar os dados do FIN Flash V2 no DEV.<br>' +
    '<code style="font-size:10px;color:#64748b;word-break:break-all;display:block;margin-top:4px;">' +
    finFlashV2Escape_(msg||'Erro desconhecido') + '</code></div>' +
    '<button onclick="finFlashV2CarregarDesktop_()" class="ffv2-btn ffv2-btn-p" style="margin-top:10px;">&#8635; Tentar novamente</button>';
}

function finFlashV2CarregarDesktop_() {
  ffv2St_().portalCarregado = false;
  google.script.run
    .withSuccessHandler(function(ctx) {
      try { ffv2RotearPortal_(ctx); }
      catch(ex) { ffv2ErroRender_(ex.message || String(ex)); }
    })
    .withFailureHandler(function(e) {
      ffv2ErroRender_(e.message || String(e));
    })
    .FIN_FLASH_V2_OBTER_CONTEXTO_USUARIO_DEV();
}

function ffv2RotearPortal_(ctx) {
  ffv2St_().ctx = ctx;
  ffv2St_().portalCarregado = true;
  try {
    if (!ctx || !ctx.ok) {
      ffv2St_().perfil = 'FINANCEIRO';
      ffv2RenderPortalF_({perfil:'FINANCEIRO', email:'', ok:true});
      return;
    }
    ffv2St_().perfil = ctx.perfil;
    if (ctx.perfil === 'COLABORADOR') ffv2RenderPortalC_(ctx);
    else ffv2RenderPortalF_(ctx);
  } catch(ex) {
    ffv2ErroRender_(ex.message || String(ex));
  }
}

function ffv2DevParaC_() {
  ffv2St_().carregado = {};
  ffv2St_().portalCarregado = true;
  ffv2RenderPortalC_({perfil:'COLABORADOR', ok:true, email:'dev@teste.local', nomeColaborador:'Colaborador DEV', cpf:'00000000000', isColaborador:true, isFinanceiro:false});
}
function ffv2DevParaF_() {
  // Restaura nav financeiro (pode ter sido trocado por portal colaborador)
  ffv2St_().carregado = {};
  ffv2St_().portalCarregado = true;
  var abasF = [
    {id:'dashboard',label:'Dashboard'},{id:'colaboradores',label:'Colaboradores e Cartões'},
    {id:'importar',label:'Importar Extrato Flash'},{id:'conferencia',label:'Conferência de Gastos'},
    {id:'extrato_cpf',label:'Extrato por Colaborador'},{id:'pendencias',label:'Pendências'},
    {id:'alertas',label:'Alertas e Cobranças'},{id:'documentos',label:'Documentos e Relatórios'},
    {id:'termos',label:'Termos de Uso'},{id:'auditoria',label:'Auditoria'},{id:'manual',label:'Manual de Uso'}
  ];
  var navH = '<div class="ffv2-nav">';
  abasF.forEach(function(a){ navH += '<button onclick="ffv2NavF_(\''+a.id+'\')" id="ffv2-nf-'+a.id+'" class="">'+a.label+'</button>'; });
  navH += '</div>';
  document.getElementById('ffv2-nav-box').innerHTML = navH;
  ffv2RenderPortalF_({perfil:'FINANCEIRO', ok:true, email:'dev@teste.local', isColaborador:false, isFinanceiro:true});
}

// ══ PORTAL COLABORADOR (5 abas) ═══════════════════════════════════════════════

function ffv2RenderPortalC_(ctx) {
  try {
    ffv2St_().perfil = 'COLABORADOR';
    var abas = [
      {id:'registrar',   label:'Registrar Gasto'},
      {id:'pendencias',  label:'Minhas Pendências'},
      {id:'comprovantes',label:'Meus Comprovantes'},
      {id:'termo',       label:'Termo de Uso'},
      {id:'manual',      label:'Manual Rápido'}
    ];
    var hdrBox = document.getElementById('ffv2-hdr-box');
    if (hdrBox) hdrBox.innerHTML =
      '<div class="ffv2-hdr">' +
        '<div><h2>&#129718; Presta&#231;&#227;o de Contas &#8212; Cart&#227;o Flash</h2>' +
          '<p style="margin:2px 0 0;font-size:11px;opacity:.7;">Ol&#225;, '+finFlashV2Escape_(ctx.nomeColaborador||ctx.email||'Colaborador')+'</p></div>' +
        '<span class="ffv2-badge-p" style="background:#bbf7d0;color:#166534;border-color:#86efac;">&#9679; Colaborador</span>' +
      '</div>';
    var kpiBox = document.getElementById('ffv2-kpi-box');
    if (kpiBox) kpiBox.style.display = 'none';
    ffv2RenderNavC_(abas, ffv2St_().abaC || 'registrar');
    ffv2NavC_(ffv2St_().abaC || 'registrar');
  } catch(ex) {
    ffv2ErroRender_(ex.message || String(ex));
  }
}

function ffv2RenderNavC_(abas, abaAtiva) {
  var h = '<div class="ffv2-nav">';
  abas.forEach(function(a) {
    h += '<button onclick="ffv2NavC_(\''+a.id+'\')" id="ffv2-nc-'+a.id+'" class="'+(a.id===abaAtiva?'ativa':'')+'">'+a.label+'</button>';
  });
  h += '</div>';
  document.getElementById('ffv2-nav-box').innerHTML = h;
}

function ffv2NavC_(aba) {
  ffv2St_().abaC = aba;
  ['registrar','pendencias','comprovantes','termo','manual'].forEach(function(a) {
    var el = document.getElementById('ffv2-nc-'+a);
    if (el) el.className = a===aba?'ativa':'';
  });
  var pane = document.getElementById('ffv2-pane');
  if (ffv2St_().carregado['c_'+aba]) { pane.innerHTML = ffv2St_().carregado['c_'+aba]; return; }
  pane.innerHTML = ffv2Skel_(2);
  ffv2LoadC_(aba);
}

function ffv2LoadC_(aba) {
  if (aba === 'registrar') {
    var h = '<div class="ffv2-card">' +
      '<p class="ffv2-section-title">&#128276; Registrar Gasto — Cartão Flash</p>' +
      '<div class="ffv2-row2">' +
        '<div><label class="ffv2-lbl">Valor (R$)</label><input id="ffv2c-valor" class="ffv2-inp" type="number" step="0.01" min="0" placeholder="0,00"></div>' +
        '<div><label class="ffv2-lbl">Data do Gasto</label><input id="ffv2c-data" class="ffv2-inp" type="date"></div>' +
        '<div><label class="ffv2-lbl">Categoria</label><select id="ffv2c-cat" class="ffv2-inp">' +
          '<option value="ALIMENTACAO">Alimentação</option><option value="TRANSPORTE">Transporte</option>' +
          '<option value="HOSPEDAGEM">Hospedagem</option><option value="MATERIAL">Material</option>' +
          '<option value="OUTROS">Outros</option></select></div>' +
        '<div><label class="ffv2-lbl">Comprovante (obrigatório)</label><input id="ffv2c-comp" class="ffv2-inp" type="file" accept="image/*,application/pdf"></div>' +
      '</div>' +
      '<div><label class="ffv2-lbl">Justificativa</label><textarea id="ffv2c-just" class="ffv2-inp" rows="3" placeholder="Descreva o motivo do gasto..."></textarea></div>' +
      '<div style="margin-top:12px;"><button onclick="ffv2EnviarPrestacao_()" class="ffv2-btn ffv2-btn-g">&#128228; Enviar Prestação</button></div>' +
      '<div id="ffv2c-res" style="margin-top:8px;"></div>' +
    '</div>';
    document.getElementById('ffv2-pane').innerHTML = h;
    ffv2St_().carregado['c_registrar'] = h;

  } else if (aba === 'pendencias') {
    document.getElementById('ffv2-pane').innerHTML = ffv2Skel_(2);
    var cpfPend = (ffv2St_().ctx||{}).cpf||'';
    google.script.run
      .withSuccessHandler(function(r) {
        var itens = r.itens||[];
        var rows = itens.map(function(p){
          return {Data:p.criadoEm||'',Valor:finFlashV2FmtMoeda_(p.VALOR||p.valor),Tipo:p.tipo||'',Severidade:p.SEVERIDADE||p.severidade||'',Status:p.status,
            '_html_Status':ffv2Badge_(p.status),'_html_Severidade':ffv2Badge_(p.SEVERIDADE||p.severidade)};
        });
        var alerta = rows.length
          ? '<div class="ffv2-msg ffv2-msg-er">&#9888; Você possui <strong>'+rows.length+'</strong> pendência(s) em aberto. Regularize enviando o comprovante ou justificativa.</div>'
          : '<div class="ffv2-msg ffv2-msg-ok">&#10003; Nenhuma pendência em aberto!</div>';
        var h = '<p class="ffv2-section-title">&#9888; Minhas Pendências</p>'+alerta+

function ffv2RenderPortalF_(ctx) {
  try {
    ffv2St_().perfil = 'FINANCEIRO';
    var hdrBox = document.getElementById('ffv2-hdr-box');
    if (hdrBox) hdrBox.innerHTML =
      '<div class="ffv2-hdr">' +
        '<div><h2>&#128188; Painel Financeiro &#8212; Cart&#227;o Flash</h2>' +
          '<p style="margin:2px 0 0;font-size:11px;opacity:.7;">&#193;rea restrita &#8212; perfil Financeiro</p></div>' +
        '<span class="ffv2-badge-p" style="background:#bfdbfe;color:#1e40af;border-color:#93c5fd;">&#9679; Financeiro</span>' +
      '</div>';
    var kpiBox = document.getElementById('ffv2-kpi-box');
    if (kpiBox) {
      kpiBox.style.display = 'block';
      kpiBox.innerHTML = '<div class="ffv2-kpi-row" id="ffv2-kpis">'+ffv2Skel_(1)+'</div>';
    }
    // CHAMADA ÚNICA: lê 3 abas (CONTAS, PENDENCIAS, CARTOES) e entrega KPIs + cards.
    // Substitui as duas chamadas pesadas anteriores (7 abas + 5 abas) por uma leve.
    var t0 = Date.now();
    google.script.run
      .withSuccessHandler(function(r) {
        window.__ffv2PerfDash = Date.now() - t0;
        var kpiEl = document.getElementById('ffv2-kpis');
        if (kpiEl) {
          var d = r.dados || {};
          kpiEl.innerHTML =
            ffv2KpiCard_('Pendências', d.totalPendencias||0, '#ef4444') +
            ffv2KpiCard_('Colaboradores', d.totalColaboradores||0, '#22c55e') +
            ffv2KpiCard_('Cartões Ativos', d.totalCartoes||0, '#3b82f6') +
            ffv2KpiCard_('Alertas Críticos', d.alertasCriticos||0, '#f59e0b');
        }
        ffv2St_().dashboardLeve = r;
        ffv2St_().dashboardTs   = Date.now();
        ffv2NavF_(ffv2St_().abaF || 'dashboard');
      })
      .withFailureHandler(function(e) {
        var kpiEl = document.getElementById('ffv2-kpis');
        if (kpiEl) kpiEl.innerHTML = '<span style="font-size:11px;color:#ef4444;">Erro ao carregar KPIs</span>';
        ffv2NavF_(ffv2St_().abaF || 'dashboard');
      })
      .FIN_FLASH_V2_OBTER_DASHBOARD_LEVE_DEV();
  } catch(ex) {
    ffv2ErroRender_(ex.message || String(ex));
  }
}

function ffv2CarregarKpis_() {
  // Mantido por compatibilidade — use FIN_FLASH_V2_OBTER_DASHBOARD_LEVE_DEV via ffv2RenderPortalF_.
  var kpiEl = document.getElementById('ffv2-kpis');
  if (!kpiEl) return;
  google.script.run
    .withSuccessHandler(function(r) {
      var d = r.dados||{};
      kpiEl.innerHTML =
        ffv2KpiCard_('Pendências', d.totalPendencias||0, '#ef4444') +
        ffv2KpiCard_('Colaboradores', d.totalColaboradores||0, '#22c55e') +
        ffv2KpiCard_('Cartões Ativos', d.totalCartoes||0, '#3b82f6') +
        ffv2KpiCard_('Alertas Críticos', d.alertasCriticos||0, '#f59e0b');
    })
    .withFailureHandler(function(){ kpiEl.innerHTML='<span style="font-size:11px;color:#ef4444;">Erro ao carregar KPIs</span>'; })
    .FIN_FLASH_V2_OBTER_DASHBOARD_LEVE_DEV();
}

function ffv2NavF_(aba) {
  ffv2St_().abaF = aba;
  var todas = ['dashboard','colaboradores','importar','conferencia','extrato_cpf','pendencias','alertas','documentos','termos','auditoria','manual'];
  todas.forEach(function(a) {
    var el = document.getElementById('ffv2-nf-'+a);
    if (el) el.className = a===aba?'ativa':'';
  });
  var pane = document.getElementById('ffv2-pane');
  if (ffv2St_().carregado['f_'+aba]) { pane.innerHTML = ffv2St_().carregado['f_'+aba]; return; }
  pane.innerHTML = ffv2Skel_(3);
  ffv2LoadF_(aba);
}

function ffv2LoadF_(aba) {
  if (aba === 'dashboard')     ffv2LoadDashboard_();
  else if (aba === 'colaboradores') ffv2LoadColaboradores_();
  else if (aba === 'importar') ffv2LoadImportar_();
  else if (aba === 'conferencia') ffv2LoadConferencia_();
  else if (aba === 'extrato_cpf') ffv2LoadExtratoCpf_();
  else if (aba === 'pendencias') ffv2LoadPendenciasF_();
  else if (aba === 'alertas')  ffv2LoadAlertas_();
  else if (aba === 'documentos') ffv2LoadDocumentos_();
  else if (aba === 'termos')   ffv2LoadTermos_();
  else if (aba === 'auditoria') ffv2LoadAuditoria_();
  else if (aba === 'manual')   ffv2FetchManual_('FINANCEIRO');
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

function ffv2LoadDashboard_() {
  var st = ffv2St_();
  // Usa dados já carregados durante ffv2RenderPortalF_ (cache 3 min).
  if (st.dashboardLeve && st.dashboardTs && (Date.now() - st.dashboardTs < 180000)) {
    ffv2RenderDashboardCards_(st.dashboardLeve);
    return;
  }
  // Recarrega se cache expirado ou ausente.
  var pane = document.getElementById('ffv2-pane');
  if (pane) pane.innerHTML = ffv2Skel_(3);
  google.script.run
    .withSuccessHandler(function(r) {
      ffv2St_().dashboardLeve = r;
      ffv2St_().dashboardTs   = Date.now();
      ffv2RenderDashboardCards_(r);
    })
    .withFailureHandler(function(e) {
      if (pane) pane.innerHTML = '<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message)+'</div>';
    })
    .FIN_FLASH_V2_OBTER_DASHBOARD_LEVE_DEV();
}

    cardsH;
  var pane = document.getElementById('ffv2-pane');

function ffv2AtualizarDashboard_() {
  var st = ffv2St_();

function ffv2LoadImportarColaboradores_() {
  var el = document.getElementById('ffv2i-colab-sel');

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.ok || !r.colaboradores || !r.colaboradores.length) {
        el.innerHTML = '<div class="ffv2-msg ffv2-msg-er">Nenhum colaborador ativo cadastrado. Cadastre na aba Colaboradores antes de importar.</div>';
        return;
      }
      var opts = '<option value="">-- Selecione o colaborador --</option>';
      r.colaboradores.forEach(function(c) {
        var cartStr = (c.cartoes||[]).map(function(k){ return k.tipo+' Final '+k.final; }).join(', ');
        opts += '<option value="'+finFlashV2Escape_(c.cpf)+'">'+finFlashV2Escape_(c.nome)+
          ' ('+finFlashV2Escape_(c.cpf)+')'+(cartStr?' — '+finFlashV2Escape_(cartStr):'')+'</option>';
      });
      el.innerHTML = '<select id="ffv2i-colabCpf" class="ffv2-inp" style="margin-bottom:6px;" onchange="ffv2OnColabSelecionado_(this)">'+opts+'</select>'+
        '<div id="ffv2i-colab-info" style="font-size:11px;color:#475569;min-height:16px;"></div>';
    })
    .withFailureHandler(function(e) {

      if (el2) el2.innerHTML = '<div class="ffv2-msg ffv2-msg-er">Erro ao carregar colaboradores: '+finFlashV2Escape_(e.message||String(e))+'</div>';

function ffv2OnColabSelecionado_(sel) {
  var info = document.getElementById('ffv2i-colab-info');
  if (!info) return;
  if (!sel || !sel.value) { info.textContent = ''; return; }
  var opt = sel.options[sel.selectedIndex];
  info.innerHTML = '&#10003; Selecionado: <strong>'+finFlashV2Escape_(opt.text)+'</strong>';
}

function ffv2ArquivoExtratoSelecionado_() {
  var inp = document.getElementById('ffv2i-arquivo');
  var info = document.getElementById('ffv2i-arquivo-info');
  if (!inp || !inp.files || !inp.files[0]) { if (info) info.style.display = 'none'; return; }
  var f = inp.files[0];
  var kb = f.size > 1048576 ? (f.size/1048576).toFixed(2)+' MB' : (f.size/1024).toFixed(1)+' KB';
  if (info) {
    info.style.display = 'block';
    info.innerHTML = '&#10003; <strong>'+finFlashV2Escape_(f.name)+'</strong> &nbsp;|&nbsp; '+finFlashV2Escape_(kb);
  }
}

function ffv2LimparArquivoExtrato_() {

}

function ffv2PreviaExtrato_() {
  var ini = (document.getElementById('ffv2i-ini')||{}).value||'';
  var fim = (document.getElementById('ffv2i-fim')||{}).value||'';
  var cpfColaborador = (document.getElementById('ffv2i-colabCpf')||{}).value||'';
  var inp = document.getElementById('ffv2i-arquivo');
  var prevEl = document.getElementById('ffv2i-preview');

  if (!cpfColaborador) {
    if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">&#9888; Selecione o colaborador na Etapa 0 antes de pré-visualizar.</div>';
    return;
  }
  if (!ini || !fim) {
    if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">&#9888; Preencha o período início e fim antes de pré-visualizar.</div>';
    return;
  }
  if (!inp || !inp.files || !inp.files[0]) {
    if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">&#9888; Selecione o arquivo do extrato Flash antes de pré-visualizar.</div>';
    return;
  }
  if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-in">Lendo arquivo e enviando para validação...</div>';
  var f = inp.files[0];
  finFlashV2ArquivoParaBase64_(f, function(b64) {
    if (!b64) {
      if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">Erro ao ler o arquivo. Tente novamente.</div>';
      return;
    }
    var payload = { periodoInicio:ini, periodoFim:fim, cpfColaborador:cpfColaborador, arquivo:{ nome:f.name, tamanho:f.size, base64:b64 } };
    google.script.run
      .withSuccessHandler(function(r) {
        if (!r.ok) {
          if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">'+(r.bloqueios||[]).join('<br>')+'</div>';
          return;
        }
        var p = r.preview || {};
        window.__ffv2Extrato = { chavePrevia:r.chavePrevia, nome:f.name, ini:ini, fim:fim, linhasReais:p.linhasReais||[] };
        var colunas = (p.colunasIdentificadas||[]).join(', ');
        var statusObj = p.status || {};
        var statusLinhas = Object.keys(statusObj).map(function(k){ return k+': '+statusObj[k]; }).join(' | ');
        var pessoasStr = (p.pessoasNomes||[]).join(', ');
        var cartoesStr = (p.cartoes||[]).map(function(c){ return 'Final '+c; }).join(', ');
        var h = '<div class="ffv2-card" style="background:#f0fdf4;border:1px solid #86efac;">' +
          '<div class="ffv2-msg ffv2-msg-ok" style="margin-bottom:10px;font-size:11px;">&#9989; Prévia calculada diretamente do arquivo enviado.</div>' +
          '<p class="ffv2-section-title" style="color:#166534;">&#128202; Prévia do Arquivo &mdash; Etapa 3</p>' +
          '<div class="ffv2-row2">' +
            '<div><span class="ffv2-lbl">Arquivo</span>'+finFlashV2Escape_(p.nomeArquivo||f.name)+'</div>' +
            '<div><span class="ffv2-lbl">Período</span>'+finFlashV2Escape_(ini)+' a '+finFlashV2Escape_(fim)+'</div>' +
            '<div><span class="ffv2-lbl">Total de linhas</span>'+finFlashV2Escape_(String(p.totalLinhas||0))+'</div>' +
            '<div><span class="ffv2-lbl">Gastos identificados</span>'+finFlashV2Escape_(String(p.totalGastos||0))+'</div>' +
            '<div><span class="ffv2-lbl">Recargas</span>'+finFlashV2Escape_(String(p.totalRecargas||0))+'</div>' +
            '<div><span class="ffv2-lbl">Valor total gasto</span>'+finFlashV2FmtMoeda_(p.valorTotalGasto||0)+'</div>' +
            '<div><span class="ffv2-lbl">Valor total recarregado</span>'+finFlashV2FmtMoeda_(p.valorTotalRecarregado||0)+'</div>' +
            '<div><span class="ffv2-lbl">Colaboradores</span>'+finFlashV2Escape_(String(p.colaboradoresEncontrados||0))+
              (pessoasStr ? ' <span style="font-size:10px;color:#475569;">('+finFlashV2Escape_(pessoasStr)+')</span>' : '')+'</div>' +
            '<div><span class="ffv2-lbl">Cartões</span>'+finFlashV2Escape_(String(p.cartoesEncontrados||0))+
              (cartoesStr ? ' <span style="font-size:10px;color:#475569;">('+finFlashV2Escape_(cartoesStr)+')</span>' : '')+'</div>' +
            '<div><span class="ffv2-lbl">Linhas inválidas</span>'+finFlashV2Escape_(String(p.linhasInvalidas||0))+'</div>' +
          '</div>' +
          (colunas ? '<p style="font-size:11px;color:#475569;margin:8px 0 2px;">Colunas identificadas: <strong>'+finFlashV2Escape_(colunas)+'</strong></p>' : '') +
          (statusLinhas ? '<p style="font-size:11px;color:#475569;margin:2px 0 8px;">Status encontrados: <strong>'+finFlashV2Escape_(statusLinhas)+'</strong></p>' : '') +
          '<div class="ffv2-msg ffv2-msg-av" style="margin-top:8px;">'+finFlashV2Escape_(p.aviso||'Prévia validada. Confirme para importar.')+'</div>' +
          '<input type="hidden" id="ffv2i-chave" value="'+finFlashV2Escape_(r.chavePrevia||'')+'">'+
          '<div style="margin-top:12px;">' +
            '<p class="ffv2-section-title">&#10003; Etapa 4 &mdash; Confirmar importação</p>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
              '<button onclick="ffv2ConfirmarImportacao_()" class="ffv2-btn ffv2-btn-g">&#10003; Confirmar Importação</button>' +
              '<button onclick="ffv2LimparArquivoExtrato_();document.getElementById(\'ffv2i-preview\').innerHTML=\'\';" class="ffv2-btn ffv2-btn-s">Cancelar</button>' +
            '</div>' +
          '</div>' +
          '<div id="ffv2i-conf-res" style="margin-top:8px;"></div>' +
        '</div>';
        if (prevEl) prevEl.innerHTML = h;
      })
      .withFailureHandler(function(e) {
        if (prevEl) prevEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message||String(e))+'</div>';
      })
      .FIN_FLASH_V2_PREVISUALIZAR_ARQUIVO_EXTRATO_FLASH_DEV(payload);
  });
}

function ffv2ConfirmarImportacao_() {
  var ini            = (document.getElementById('ffv2i-ini')||{}).value||'';
  var fim            = (document.getElementById('ffv2i-fim')||{}).value||'';
  var chave          = (document.getElementById('ffv2i-chave')||{}).value||'';

  var resEl = document.getElementById('ffv2i-conf-res');

  if (!chave) {
    if (resEl) resEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">Pré-visualize o arquivo antes de confirmar a importação.</div>';
    return;
  }
  var extData = window.__ffv2Extrato || {};
  var linhasReais = extData.linhasReais || [];
  if (!linhasReais.length) {
    if (resEl) resEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">&#9888; Pré-visualize o arquivo antes de confirmar. Linhas reais não encontradas.</div>';
    return;
  }
  if (resEl) resEl.innerHTML = '<div class="ffv2-msg ffv2-msg-in">Importando lote ('+linhasReais.length+' linhas)...</div>';

  google.script.run
    .withSuccessHandler(function(r) {
      if (r.ok) {
        var loteIdSafe = finFlashV2Escape_(r.loteId||'');
        if (resEl) resEl.innerHTML =
          '<div class="ffv2-msg ffv2-msg-ok">&#10003; Importado! Lote: '+loteIdSafe+' &mdash; '+finFlashV2Escape_(String(r.totalImportado))+' linha(s).</div>' +

            '<div id="ffv2i-conc-res" style="margin-top:8px;"></div>' +
          '</div>';
        window.__ffv2Extrato = null;
        ffv2CarregarLotes_();
      } else {
        if (resEl) resEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">'+(r.bloqueios||[]).join('<br>')+'</div>';
      }
    })
    .withFailureHandler(function(e) {
      if (resEl) resEl.innerHTML = '<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message||String(e))+'</div>';
    })
    .FIN_FLASH_V2_CONFIRMAR_IMPORTACAO_EXTRATO_FLASH_DEV({periodoInicio:ini, periodoFim:fim, chavePrevia:chave, cpfColaborador:cpfColaborador, linhas:linhasReais});
}

function ffv2FiltrarConferencia_() {
  var filtros = {
    cpf:    (document.getElementById('ffv2g-cpf')||{}).value||'',
    status: (document.getElementById('ffv2g-status')||{}).value||'',
    periodoInicio: (document.getElementById('ffv2g-ini')||{}).value||'',
    periodoFim:    (document.getElementById('ffv2g-fim')||{}).value||'',
    limite: 100
  };
  if(!filtros.cpf) delete filtros.cpf; if(!filtros.status) delete filtros.status;
  if(!filtros.periodoInicio) delete filtros.periodoInicio; if(!filtros.periodoFim) delete filtros.periodoFim;
  var el = document.getElementById('ffv2g-res'); if(el) el.innerHTML=ffv2Skel_(2);
  google.script.run
    .withSuccessHandler(function(r) {
      var porId = {};
      (r.itens||[]).forEach(function(it){ porId[it.conciliacaoId] = it; });
      ffv2St_().dados.conferenciaPorId = porId;
      var rows = (r.itens||[]).map(function(it){
        var acoes = (it.acoesLinha||[]).map(function(a){
          if (a==='CONCILIAR_MANUALMENTE') return '<button class="ffv2-btn ffv2-btn-g" style="font-size:10px;padding:4px 8px;" onclick="ffv2AbrirAcaoLinha_(\''+it.conciliacaoId+'\',\'manual\')">Conciliar</button>';
          if (a==='REPROVAR_COMPROVANTE')  return '<button class="ffv2-btn ffv2-btn-r" style="font-size:10px;padding:4px 8px;" onclick="ffv2AbrirAcaoLinha_(\''+it.conciliacaoId+'\',\'reprovar\')">Reprovar</button>';
          if (a==='SOLICITAR_CORRECAO')    return '<button class="ffv2-btn ffv2-btn-o" style="font-size:10px;padding:4px 8px;" onclick="ffv2AbrirAcaoLinha_(\''+it.conciliacaoId+'\',\'correcao\')">Correção</button>';
          if (a==='VER_COMPROVANTE')       return '<button class="ffv2-btn ffv2-btn-s" style="font-size:10px;padding:4px 8px;" onclick="ffv2VerComprovanteLinha_(\''+it.conciliacaoId+'\')">Comprovante</button>';
          return '';
        }).join(' ');
        return {
          Data: it.data||'—', Colaborador: it.colaboradorNome||it.cpfExibicao||'—', CPF: it.cpfExibicao||'—',
          'Cartão': it.finalCartao ? ('final '+it.finalCartao) : '—',
          Estabelecimento: it.estabelecimento||'—',
          Valor: finFlashV2FmtMoeda_(it.valor),
          'Conciliação': it.statusConciliacao, 'Prestação': it.statusPrestacao||'—', 'Pendência': it.statusPendencia||'—',
          Comprovante: it.comprovanteId ? 'Sim' : 'Não',
          'Ações': '',
          '_html_Conciliação': ffv2Badge_(it.statusConciliacao),
          '_html_Prestação': it.statusPrestacao ? ffv2Badge_(it.statusPrestacao) : '—',
          '_html_Pendência': it.statusPendencia ? ffv2Badge_(it.statusPendencia) : '—',
          '_html_Ações': acoes || '<span style="color:#94a3b8;font-size:10px;">—</span>'
        };
      });
      var h = '<p style="font-size:11px;color:#64748b;margin-bottom:6px;">'+r.total+' registro(s) encontrado(s)</p>'+
        ffv2Tabela_(['Data','Colaborador','CPF','Cartão','Estabelecimento','Valor','Conciliação','Prestação','Pendência','Comprovante','Ações'],rows,'Nenhum gasto encontrado com esses filtros.');
      var el=document.getElementById('ffv2g-res'); if(el) el.innerHTML=h;
    })
    .withFailureHandler(function(e){var el=document.getElementById('ffv2g-res');if(el)el.innerHTML='<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message)+'</div>';})
    .FIN_FLASH_V2_LISTAR_CONFERENCIA_GASTOS_LINHA_A_LINHA_DEV(filtros);
}

function ffv2AbrirAcaoLinha_(conciliacaoId, tipo) {
  var item = (ffv2St_().dados.conferenciaPorId||{})[conciliacaoId];
  if (!item) return;
  var labels = { manual:'Conciliar Manualmente', reprovar:'Reprovar Comprovante', correcao:'Solicitar Correção' };
  var html = '<p style="font-size:12px;color:#64748b;margin:0 0 10px;">Conciliação: '+finFlashV2Escape_(conciliacaoId)+' — '+finFlashV2Escape_(item.colaboradorNome||item.cpfExibicao||'')+'</p>'+

    '<textarea id="ffv2gl-mot" class="ffv2-inp" rows="3" placeholder="Descreva o motivo..."></textarea>'+
    '<div style="margin-top:10px;"><button class="ffv2-btn ffv2-btn-p" onclick="ffv2ConfirmarAcaoLinha_(\''+conciliacaoId+'\',\''+tipo+'\')">Confirmar</button></div>'+
    '<div id="ffv2gl-res" style="margin-top:8px;"></div>';

function ffv2ConfirmarAcaoLinha_(conciliacaoId, tipo) {
  var mot = (document.getElementById('ffv2gl-mot')||{}).value||'';
  var resEl = document.getElementById('ffv2gl-res');
  if (!mot) { if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-er">Preencha o motivo.</div>'; return; }
  var fn = tipo==='manual'?'FIN_FLASH_V2_CONCILIAR_MANUALMENTE_DEV':
           tipo==='reprovar'?'FIN_FLASH_V2_REPROVAR_COMPROVANTE_DEV':'FIN_FLASH_V2_SOLICITAR_CORRECAO_COMPROVANTE_DEV';
  if (resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-in">Processando...</div>';
  google.script.run
    .withSuccessHandler(function(r){
      if (resEl) resEl.innerHTML = r.ok
        ? '<div class="ffv2-msg ffv2-msg-ok">&#10003; Ação executada com sucesso.</div>'
        : '<div class="ffv2-msg ffv2-msg-er">'+(r.bloqueios||[]).join('<br>')+'</div>';
      if (r.ok) { ffv2FecharModal_(); ffv2FiltrarConferencia_(); }
    })
    .withFailureHandler(function(e){ if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message)+'</div>'; })
    [fn]({conciliacaoId: conciliacaoId, motivo: mot});
}

function ffv2VerComprovanteLinha_(conciliacaoId) {
  var item = (ffv2St_().dados.conferenciaPorId||{})[conciliacaoId];
  if (!item) return;

function ffv2FetchManual_(perfil) {
  google.script.run
    .withSuccessHandler(function(r) {
      var h = '';
      if (r.ok && r.manual) {
        var sec = perfil==='COLABORADOR' ? r.manual.colaborador : r.manual.financeiro;
        if (sec) {
          Object.keys(sec).forEach(function(k) {
            var s = sec[k]; if (!s) return;
            h += '<div class="ffv2-card" style="margin-bottom:10px;"><p class="ffv2-section-title">'+finFlashV2Escape_(s.titulo||k)+'</p>';
            if (s.descricao) h += '<p style="font-size:12px;color:#475569;margin:0 0 6px;">'+finFlashV2Escape_(s.descricao)+'</p>';
            if (s.passos && s.passos.length) {
              h += '<ol style="font-size:12px;color:#334155;margin:0;padding-left:18px;">';
              s.passos.forEach(function(p){ h += '<li>'+finFlashV2Escape_(p)+'</li>'; });
              h += '</ol>';
            }
            if (s.dicas && s.dicas.length) {
              h += '<p class="ffv2-lbl" style="margin-top:8px;">Dicas</p><ul style="font-size:12px;color:#475569;margin:0;padding-left:18px;">';
              s.dicas.forEach(function(d){ h += '<li>'+finFlashV2Escape_(d)+'</li>'; });
              h += '</ul>';
            }
            h += '</div>';
          });
        }
        if (r.manual.status) {
          h += '<div class="ffv2-card"><p class="ffv2-section-title">Status — Guia Rápido</p>';
          var st = r.manual.status;
          Object.keys(st).forEach(function(k){ h+='<p style="font-size:12px;margin:4px 0;">'+ffv2Badge_(k)+' — <span style="color:#475569;">'+finFlashV2Escape_(st[k])+'</span></p>'; });
          h += '</div>';
        }
      } else {
        h = '<div class="ffv2-msg ffv2-msg-av">Manual não disponível no momento.</div>';
      }
      document.getElementById('ffv2-pane').innerHTML = '<p class="ffv2-section-title">&#128216; Manual de Uso — '+perfil+'</p>'+h;
    })
    .withFailureHandler(function(e){document.getElementById('ffv2-pane').innerHTML='<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message)+'</div>';})
    .FIN_FLASH_V2_OBTER_MANUAL_USO_DEV();
}

function finFlashV2ArquivoParaBase64_(file, cb) {
  var reader = new FileReader();
  reader.onload = function(ev) { cb(ev.target.result.split(',')[1]||''); };
  reader.onerror = function() { cb(''); };
  reader.readAsDataURL(file);
}

function ffv2EnviarPrestacao_() {
  var valor = parseFloat((document.getElementById('ffv2c-valor')||{}).value||'0');
  var data  = (document.getElementById('ffv2c-data')||{}).value||'';
  var cat   = (document.getElementById('ffv2c-cat')||{}).value||'';
  var just  = (document.getElementById('ffv2c-just')||{}).value||'';
  var compEl= document.getElementById('ffv2c-comp');
  var resEl = document.getElementById('ffv2c-res');
  if (!valor || valor<=0) { if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-er">Informe o valor do gasto.</div>'; return; }
  if (!data)  { if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-er">Informe a data do gasto.</div>'; return; }
  if (!compEl || !compEl.files || !compEl.files[0]) { if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-er">Comprovante é obrigatório.</div>'; return; }
  if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-in">Enviando...</div>';
  finFlashV2ArquivoParaBase64_(compEl.files[0], function(b64) {
    var payload = {
      valor:valor, dataGasto:data, categoria:cat, justificativa:just,
      comprovante: { nome:compEl.files[0].name, tipo:compEl.files[0].type, base64:b64 }
    };
    google.script.run
      .withSuccessHandler(function(r) {
        if(resEl) resEl.innerHTML = r.ok
          ? '<div class="ffv2-msg ffv2-msg-ok">&#10003; Prestação enviada! ID: '+finFlashV2Escape_(r.prestacaoId||'')+'</div>'
          : '<div class="ffv2-msg ffv2-msg-er">'+(r.bloqueios||[]).join('<br>')+'</div>';
        if(r.ok) { delete ffv2St_().carregado['c_comprovantes']; delete ffv2St_().carregado['c_pendencias']; }
      })
      .withFailureHandler(function(e){ if(resEl) resEl.innerHTML='<div class="ffv2-msg ffv2-msg-er">'+finFlashV2Escape_(e.message)+'</div>'; })
      .FIN_FLASH_V2_REGISTRAR_PRESTACAO_MOBILE_DEV(payload);
  });
}
