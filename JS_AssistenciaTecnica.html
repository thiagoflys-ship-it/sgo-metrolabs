          astRenderKpis_();
          astAtualizarFiltrosLista_();
          astSetContextStatus_("Painel atualizado.");
          astPesquisar_();

        .withFailureHandler(function(err) {

          astErroTabela_(err, 7);
        })

      DATA_INICIO: astVal_("astFiltroInicio"),

    };
    AST_STATE.filtros = filtros;
    AST_STATE.carregandoLista = true;
    astSetListaLoading_("Buscando entradas...");
    try {
      astEnviarListagemBackend_(filtros, function(res) {
        AST_STATE.carregandoLista = false;
        if (!astOk_(res)) return astErroTabela_(res, 7);
        AST_STATE.entradas = astNormalizarListaAtendimentos_(res);
        astRenderEntradas_();
      }, function(err) {
        AST_STATE.carregandoLista = false;
        astErroTabela_(err, 7);
      });
    } catch (err) {
      AST_STATE.carregandoLista = false;
      astErroTabela_(err, 7);
      console.error("Falha ao chamar listagem de Assistencia Tecnica.", err);
    }

  function astEnviarListagemBackend_(filtros, ok, fail) {
    const runner = google.script.run.withSuccessHandler(ok).withFailureHandler(fail);
    if (AST_STATE.usarEntradaV2 === true) {
      if (runner.astV2ListarAtendimentos) return runner.astV2ListarAtendimentos(SESSION, filtros);
      if (runner.listarAtendimentosV2) return runner.listarAtendimentosV2(SESSION, filtros);
      if (typeof fail === "function") {
        fail({ message: "Listagem V2 ativa, mas função backend de listagem V2 não está disponível." });
      }
      return null;
    }
    return runner.astListarEntradas(SESSION, filtros);
  }

  function astNormalizarListaAtendimentos_(res) {
    if (!res) return [];
    if (Array.isArray(res.items)) return res.items;
    if (Array.isArray(res.atendimentos)) return res.atendimentos;
    if (res.data && Array.isArray(res.data.items)) return res.data.items;
    if (Array.isArray(res.data)) return res.data;
    return [];
  }

  function astSalvarEntrada_() {
    const provisorio = astChecked_("astNovoProvisorio");
    const semAcessorios = astChecked_("astNovoSemAcessorios");
    const acessorios = astLerAcessorios_();
    if (!semAcessorios && !acessorios.length) acessorios.push({ DESCRICAO: "Sem acessórios declarados", QUANTIDADE: "0", ESTADO: "Não aplicável", OBSERVACAO: "Entrada registrada sem acessórios." });
    const payload = {
      CLIENTE_ID: astVal_("astNovoCliente"),
      CLIENTE_NOME: astTextoSelect_("astNovoCliente"),
      UNIDADE_ID: astVal_("astNovoUnidade"),
      UNIDADE_NOME: astTextoSelect_("astNovoUnidade"),
      EQUIPAMENTO_ID: astVal_("astNovoEquipamento"),
      EQUIPAMENTO_NOME: astTextoSelect_("astNovoEquipamento"),
      CADASTRO_PROVISORIO: provisorio ? "S" : "N",
      EQUIPAMENTO_PROVISORIO: provisorio ? astVal_("astNovoEquipProv") : "",
      CLIENTE_PROVISORIO: provisorio ? astVal_("astNovoClienteProv") : "",
      UNIDADE_PROVISORIA: provisorio ? astVal_("astNovoUnidadeProv") : "",
      NUMERO_SERIE_INFORMADO: astVal_("astNovoSerie"),
      PROBLEMA_RELATADO: astVal_("astNovoProblema"),
      CONDICAO_FISICA: astVal_("astNovoCondicao"),
      PRIORIDADE: astVal_("astNovoPrioridade") || "NORMAL",
      PRAZO_PROMETIDO: astVal_("astNovoPrazo"),
      TECNICO_ID: astVal_("astNovoTecnico"),
      OBSERVACOES: astVal_("astNovoObs"),
      ACESSORIOS_CONFERIDOS: "S",
      SEM_ACESSORIOS: semAcessorios ? "S" : "N",
      ACESSORIOS: semAcessorios ? [] : acessorios,
      RECEBIDO_POR_NOME: astVal_("astNovoRecebidoPor"),
      RECEBIDO_POR_DOC: astVal_("astNovoRecebidoDoc"),
      ASSINATURA_RECEBIMENTO_BASE64: astVal_("astNovoAssinatura")
    };
    AST_STATE.entradaV2PayloadPreview = astPayloadEntradaV2_(payload);
    if (!payload.TECNICO_ID) return astToast_("Informe o técnico responsável.");
    if (!payload.PROBLEMA_RELATADO || !payload.CONDICAO_FISICA) return astToast_("Informe relato do problema e estado físico.");
    astSetEntradaSalvando_(true);
    astEnviarEntradaBackend_(payload, AST_STATE.entradaV2PayloadPreview, function(res) {
        astSetEntradaSalvando_(false);
        if (!astOk_(res)) return astToast_(res && res.message || "Não foi possível salvar a entrada.");
        const entrada = res.item || res.entrada || res.atendimento || res.data || {};
        if (AST_STATE.usarEntradaV2 === true) {
          astToast_("Entrada V2 registrada.");
          astCarregarTudo_();
          return;
        }
        astUploadEntradaFotos_(entrada.ID || res.id, "astNovoFoto", function() {
          astToast_("Entrada registrada.");
          astAbrirDetalhe_(entrada.ID || res.id);
        });
      }, function(err) {
        astSetEntradaSalvando_(false);
        astFalhaToast_(err && err.message ? err : ((err && err.message) || err || "Falha ao salvar entrada."));
      });
  }

  function astEnviarEntradaBackend_(payloadLegado, payloadV2, ok, fail) {
    const runner = google.script.run.withSuccessHandler(ok).withFailureHandler(fail);
    if (AST_STATE.usarEntradaV2 === true) {
      if (runner.astV2CriarEntrada) return runner.astV2CriarEntrada(SESSION, payloadV2);
      if (runner.criarEntradaV2) return runner.criarEntradaV2(SESSION, payloadV2);
      if (typeof fail === "function") {
        fail({ message: "Entrada V2 está ativa, mas a função backend criarEntradaV2 não está disponível." });
      }
      return null;
    }
    return runner.astCriarEntrada(SESSION, payloadLegado);
  }

  function astSetEntradaSalvando_(salvando) {
    const btn = document.getElementById("astSalvarEntradaBtn");
    const status = document.getElementById("astEntradaSaveStatus");
    if (btn) {
      btn.disabled = !!salvando;
      btn.textContent = salvando ? "Salvando..." : "Salvar Entrada V2";
    }
    if (status) status.textContent = salvando ? "Registrando entrada e preparando rastreabilidade..." : "Pronto para salvar Entrada V2.";
    astSetContextStatus_(salvando ? "Registrando entrada..." : "");
  }

      UNIDADE_ID: p.UNIDADE_ID,

      TECNICO_ID: p.TECNICO_ID,

      SEM_ACESSORIOS: p.SEM_ACESSORIOS,
      ACESSORIOS: p.ACESSORIOS || [],
      FOTOS_INICIAIS: astEvidenciasEntradaPreview_("astNovoFoto"),
      RECEBIDO_POR_NOME: p.RECEBIDO_POR_NOME,

    };

  function astEvidenciasEntradaPreview_(inputId) {
    const temporarias = Array.isArray(AST_STATE.evidenciasEntrada) ? AST_STATE.evidenciasEntrada : [];
    const input = document.getElementById(inputId);
    const files = input && input.files ? Array.prototype.slice.call(input.files) : [];
    const doInput = files.map(function(file) {
      return {
        NOME_ARQUIVO: file.name || "",
        MIME_TYPE: file.type || "",
        TAMANHO_BYTES: file.size || 0,
        ORIGEM: "INPUT_FILE",
        STATUS: "PENDENTE_UPLOAD"
      };
    });
    return temporarias.concat(doInput);
  }

  function astAtualizarEvidenciasEntradaPreview_() {
    const box = document.getElementById("astEvidenciasEntradaPreview");
    if (!box) return;
    const evidencias = astEvidenciasEntradaPreview_("astNovoFoto");
    const assinatura = astVal_("astNovoAssinatura");
    if (!evidencias.length && !assinatura) {
      box.innerHTML = "Nenhuma evidência selecionada.";
      return;
    }
    const totalBytes = evidencias.reduce(function(soma, item) { return soma + (Number(item.TAMANHO_BYTES) || 0); }, 0);
    const nomes = evidencias.slice(0, 4).map(function(item) { return astEsc_(item.NOME_ARQUIVO || "Evidência sem nome"); }).join(", ");
    box.innerHTML = [
      "<b>Evidencias:</b> ",
      String(evidencias.length),
      " arquivo(s)",
      totalBytes ? " / " + Math.round(totalBytes / 1024) + " KB" : "",
      nomes ? "<br><b>Arquivos:</b> " + nomes : "",
      assinatura ? "<br><b>Assinatura:</b> informada" : "<br><b>Assinatura:</b> opcional não informada"
    ].join("");
  }

  function astAbrirDetalhe_(id, opcoes) {
    if (!id) return;
    opcoes = opcoes || {};
    const manterTela = !!opcoes.preservar && AST_STATE.selecionada === id && AST_STATE.detalhe;
    AST_STATE.selecionada = id;
    if (!manterTela) astSetArea_(astDetalheSkeletonHtml_());
    else astSetContextStatus_("Atualizando detalhe em segundo plano...");
    var runner = google.script.run
      .withSuccessHandler(function(res) {
        if (!astOk_(res)) return astErroArea_(res, "Atendimento não localizado.");
        AST_STATE.detalhe = res;
        AST_STATE.tab = AST_STATE.tab || "entrada";
        astRenderDetalhe_();
        astSetContextStatus_("Detalhe atualizado.");
      })
      .withFailureHandler(astFalhaArea_);
    if (AST_STATE.usarEntradaV2 === true) {
      if (runner.astV2ObterAtendimento) return runner.astV2ObterAtendimento(SESSION, id);
      if (runner.obterAtendimentoV2) return runner.obterAtendimentoV2(SESSION, id);
      astErroArea_(null, "Detalhe V2 ativo, mas obterAtendimentoV2 não está disponível no backend. Verifique o deploy.");
      return;
    }
    runner.astObterEntrada(SESSION, id);
  }

  function astEsteiraDetalheV2Html_(e) {
    var status = astStatusNorm_(e.STATUS || "");
    var etapas = [
      { label: "Entrada",    s: ["ENTRADA_REGISTRADA"] },
      { label: "Avaliação",  s: ["AGUARDANDO_DIAGNOSTICO", "EM_BANCADA"] },
      { label: "Diagnóstico",s: ["DIAGNOSTICO_EM_ANDAMENTO", "DIAGNOSTICO_CONCLUIDO"] },
      { label: "Orçamento",  s: ["AGUARDANDO_ORCAMENTO", "ORCAMENTO_ENVIADO", "AGUARDANDO_APROVACAO_CLIENTE", "ORCAMENTO_APROVADO", "ORCAMENTO_RECUSADO", "AGUARDANDO_PECA"] },
      { label: "Execução",   s: ["LIBERADO_PARA_EXECUCAO", "EXECUCAO_EM_ANDAMENTO", "EXECUCAO_CONCLUIDA"] },
      { label: "Calibração", s: ["AGUARDANDO_CALIBRACAO"] },
      { label: "Conclusão",  s: ["CONCLUIDO_TECNICAMENTE"] },
      { label: "Entrega",    s: ["AGUARDANDO_ENTREGA", "ENTREGUE"] }
    ];
    var currentIdx = -1;
    var i;
    for (i = 0; i < etapas.length; i++) {
      if (etapas[i].s.indexOf(status) >= 0) { currentIdx = i; break; }
    }
    var steps = [];
    for (i = 0; i < etapas.length; i++) {
      var done   = currentIdx > i;
      var active = currentIdx === i;
      var bg    = done ? "#dcfce7" : (active ? "#dbeafe" : "#fff");
      var bdr   = done ? "#86efac" : (active ? "#93c5fd" : "#dbe3ee");
      var clr   = done ? "#15803d" : (active ? "#1d4ed8" : "#64748b");
      var idxBg = done ? "#dcfce7" : (active ? "#dbeafe" : "#e0f2fe");
      steps.push([
        '<div class="ast-v2-step" style="background:', bg, ';border-color:', bdr, ';">',
          '<span class="ast-v2-step-index" style="background:', idxBg, ';color:', clr, ';">',
            (done ? '&#10003;' : String(i + 1)),
          '</span>',
          '<span class="ast-v2-step-label" style="color:', clr, ';">', astEsc_(etapas[i].label), '</span>',
        '</div>'
      ].join(""));
    }
    return [
      '<div class="ast-v2-det-section" style="padding:12px;">',
        '<div class="ast-v2-rail">', steps.join(""), '</div>',
      '</div>'
    ].join("");
  }

  function astV2UltimoDiagnostico_(res) {
    var hist = res.historico || res.movimentos ||
      (res.data && (res.data.historico || res.data.movimentos)) || [];
    if (!Array.isArray(hist) || !hist.length) return null;
    var ultimo = null;
    for (var i = 0; i < hist.length; i++) {
      if ((hist[i].TIPO || "").toUpperCase() === "DIAGNOSTICO") ultimo = hist[i];
    }
    if (!ultimo) return null;
    var obs = ultimo.OBSERVACAO || "";
    var dados = null;
    if (obs) {
      try { dados = JSON.parse(obs); } catch (e_) { dados = { _texto: obs }; }
    }
    if (!dados) dados = { _texto: ultimo.DESCRICAO || "" };
    return { entrada: ultimo, dados: dados };
  }

      rows.push('<div class="ast-v2-det-field" style="grid-column:1/-1;"><span>Diagnóstico</span><b style="font-weight:400;">' + astEsc_(d._texto) + '</b></div>');
    } else {
      if (d.defeito)       rows.push('<div class="ast-v2-det-field"><span>Defeito confirmado</span><b>' + astEsc_(d.defeito) + '</b></div>');
      if (d.causa)         rows.push('<div class="ast-v2-det-field"><span>Causa provavel</span><b>' + astEsc_(d.causa) + '</b></div>');
      if (d.recomendacao)  rows.push('<div class="ast-v2-det-field" style="grid-column:1/-1;"><span>Recomendação técnica</span><b style="font-weight:400;">' + astEsc_(d.recomendacao) + '</b></div>');
      var flags = [];
      if (d.necessita_peca        === "S") flags.push("Peça");
      if (d.necessita_terceiro    === "S") flags.push("Terceiro");
      if (d.necessita_laboratorio === "S") flags.push("Laboratório");
      if (d.risco_critico         === "S") flags.push("RISCO CRITICO");
      if (flags.length) rows.push('<div class="ast-v2-det-field" style="grid-column:1/-1;"><span>Flags</span><b style="color:#dc2626;">' + astEsc_(flags.join(" | ")) + '</b></div>');
      if (d.observacoes)   rows.push('<div class="ast-v2-det-field" style="grid-column:1/-1;"><span>Observações (diagnóstico)</span><b style="font-weight:400;">' + astEsc_(d.observacoes) + '</b></div>');
    }
    if (!rows.length) {
      rows.push('<div style="grid-column:1/-1;"><span style="color:#94a3b8;font-size:12px;">Diagnóstico registrado sem campos detalhados.</span></div>');
    }
    return [
      '<div style="margin-top:14px;">',
        '<div style="font-size:10px;font-weight:900;text-transform:uppercase;color:#64748b;letter-spacing:.04em;margin-bottom:6px;">Diagnóstico Técnico' + dataTag + '</div>',

      '</div>'
    ].join("");
  }

  function astTimelineV2Html_(historico) {
    if (!Array.isArray(historico) || !historico.length) {
      return [
        '<div class="ast-v2-det-section">',
          '<h4>Histórico / Timeline</h4>',
          '<div class="ast-v2-tl-empty">Nenhuma movimentacao registrada ainda.</div>',
        '</div>'
      ].join("");
    }
    var itens = [];
    for (var i = 0; i < historico.length; i++) {
      var h = historico[i];
      var isLast = i === historico.length - 1;
      var acaoLabel = (h.STATUS_NOVO || h.ACAO || h.TIPO || "Registro").replace(/_/g, " ");
      var descricao = h.DESCRICAO || h.OBSERVACAO || "";
      var autor = h.EXECUTADO_POR || h.CRIADO_POR || "";
      var data = astData_(h.CRIADO_EM || h.EXECUTADO_EM || "");
      itens.push([
        '<div class="ast-v2-tl-item">',
          '<div class="ast-v2-tl-spine">',
            '<div class="ast-v2-tl-dot"></div>',
            (!isLast ? '<div class="ast-v2-tl-line"></div>' : ''),
          '</div>',
          '<div class="ast-v2-tl-body">',
            '<div class="ast-v2-tl-head">',
              '<span class="ast-v2-tl-acao">' + astEsc_(acaoLabel) + '</span>',
              (data && data !== "--" ? '<span class="ast-v2-tl-date">' + astEsc_(data) + '</span>' : ''),
              (autor ? '<span class="ast-v2-tl-user">por ' + astEsc_(autor) + '</span>' : ''),
            '</div>',
            (descricao ? '<div class="ast-v2-tl-desc">' + astEsc_(descricao) + '</div>' : ''),
          '</div>',
        '</div>'
      ].join(""));
    }
    return [
      '<div class="ast-v2-det-section">',
        '<h4>Histórico / Timeline</h4>',
        '<div class="ast-v2-tl">', itens.join(""), '</div>',
      '</div>'
    ].join("");
  }

  function astV2ConfirmarDiagnostico_(id) {
    var defeito  = document.getElementById("astV2DiagDefeito");
    var causa    = document.getElementById("astV2DiagCausa");
    var rec      = document.getElementById("astV2DiagRec");
    var peca     = document.getElementById("astV2DiagPeca");
    var terceiro = document.getElementById("astV2DiagTerceiro");
    var lab      = document.getElementById("astV2DiagLab");
    var risco    = document.getElementById("astV2DiagRisco");
    var status   = document.getElementById("astV2DiagStatus");
    var proxima  = document.getElementById("astV2DiagProxima");
    var obs      = document.getElementById("astV2DiagObs");
    var defVal = defeito ? defeito.value.trim() : "";
    var cauVal = causa   ? causa.value.trim()   : "";
    if (!defVal && !cauVal) return astToast_("Informe ao menos o defeito confirmado ou a causa provável.");
    var payload = {
      DEFEITO_CONFIRMADO:    defVal,
      CAUSA_PROVAVEL:        cauVal,
      RECOMENDACAO_TECNICA:  rec      ? rec.value.trim()      : "",
      NECESSITA_PECA:        peca     ? peca.value            : "N",
      NECESSITA_TERCEIRO:    terceiro ? terceiro.value        : "N",
      NECESSITA_LABORATORIO: lab      ? lab.value             : "N",
      RISCO_CRITICO:         risco    ? risco.value           : "N",
      STATUS_APOS_DIAGNOSTICO: status ? status.value          : "",
      PROXIMA_ACAO:          proxima  ? proxima.value.trim()  : "",
      OBSERVACOES:           obs      ? obs.value.trim()      : ""
    };
    astSetContextStatus_("Salvando diagnóstico...");
    google.script.run
      .withSuccessHandler(function(res) {

  function astV2ConfirmarSolicitacaoPeca_(id) {
    var nomeEl       = document.getElementById("astV2PecaNome");
    var descEl       = document.getElementById("astV2PecaDesc");
    var qtdEl        = document.getElementById("astV2PecaQtd");
    var urgenciaEl   = document.getElementById("astV2PecaUrgencia");
    var justEl       = document.getElementById("astV2PecaJustificativa");
    var fornecedorEl = document.getElementById("astV2PecaFornecedor");
    var valorEl      = document.getElementById("astV2PecaValor");
    var obsEl        = document.getElementById("astV2PecaObs");
    var nomeVal = nomeEl ? nomeEl.value.trim() : "";
    if (!nomeVal) return astToast_("Informe o nome da peça.");
    var valorNum = valorEl && valorEl.value ? parseFloat(valorEl.value) : 0;
    var payload = {
      TITULO:                nomeVal,
      DESCRICAO_PECA:        nomeVal,
      DESCRICAO:             descEl       ? descEl.value.trim()       : "",
      QUANTIDADE:            qtdEl        ? parseInt(qtdEl.value, 10) || 1 : 1,
      URGENCIA:              urgenciaEl   ? urgenciaEl.value          : "NORMAL",
      JUSTIFICATIVA_TECNICA: justEl       ? justEl.value.trim()       : "",
      FORNECEDOR_NOME:       fornecedorEl ? fornecedorEl.value.trim() : "",
      VALOR_ESTIMADO:        isNaN(valorNum) ? 0 : valorNum,
      OBSERVACOES:           obsEl        ? obsEl.value.trim()        : ""
    };

    google.script.run
      .withSuccessHandler(function(res) {
        if (!astOk_(res)) return astToast_((res && res.message) || "Não foi possível registrar solicitação de peça.");

  function astGerarPdfGerencial_(tipo) {
    const filtros = astFiltrosGerenciais_();
    const ok = function(res) { astAbrirDoc_(res); };
    const fail = astFalhaToast_;
    if (tipo === "prontuario") {
      if (!filtros.ENTRADA_ID) return astToast_("Informe o ID da entrada para gerar o prontuário.");
      return google.script.run.withSuccessHandler(ok).withFailureHandler(fail).astGerarProntuarioEquipamento(SESSION, filtros.ENTRADA_ID);
    }
    if (tipo === "cliente") return google.script.run.withSuccessHandler(ok).withFailureHandler(fail).astGerarRelatorioCliente(SESSION, filtros);
    if (tipo === "executivo") return google.script.run.withSuccessHandler(ok).withFailureHandler(fail).astGerarRelatorioExecutivo(SESSION, filtros);
    if (tipo === "produtividade") return google.script.run.withSuccessHandler(ok).withFailureHandler(fail).astGerarRelatorioProdutividadeTecnicos(SESSION, filtros);
    if (tipo === "atrasados") return google.script.run.withSuccessHandler(ok).withFailureHandler(fail).astGerarRelatorioAtrasados(SESSION, filtros);
    if (tipo === "conformidade") return google.script.run.withSuccessHandler(ok).withFailureHandler(fail).astGerarRelatorioConformidadeDocumental(SESSION, filtros);
  }

      const file = files[index++];
