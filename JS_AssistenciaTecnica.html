<script>
  const AST_STATE = {
    clientes: [],
    unidades: [],
    equipamentos: [],
    tecnicos: [],
    fornecedores: [],
    entradas: [],
    dashboard: {},
    dashboardGerencial: {},
    acessorios: []
  };

  function renderAssistenciaTecnicaModulo_() {
    const div = document.getElementById("conteudo");
    if (!div) return;
    div.innerHTML = `
      <div class="module-shell ast-shell">
        <div class="module-header">
          <div class="module-header-left">
            <h2 class="content-title">Assistencia Tecnica</h2>
            <p class="content-subtitle">Entrada, rastreabilidade, laboratorio, terceiros e documentos tecnicos.</p>
          </div>
          <div class="module-header-right" style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn-primary" type="button" onclick="astAbrirEntrada_()">Dar Entrada em Equipamento</button>
            <button class="btn-secondary" type="button" onclick="astCarregarTudo_()">Atualizar</button>
          </div>
        </div>

        <style>
          .ast-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
          .ast-kpi{border:1px solid var(--border);background:#fff;border-radius:8px;padding:12px;min-height:76px}
          .ast-kpi small{display:block;font-size:10px;text-transform:uppercase;color:#64748b;font-weight:800}
          .ast-kpi strong{display:block;font-size:24px;color:#0f172a;margin-top:5px}
          .ast-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
          .ast-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
          .ast-form-grid .full{grid-column:1/-1}
          .ast-accessory-row{display:grid;grid-template-columns:2fr .7fr 1fr 1.8fr auto;gap:8px;align-items:end;margin-bottom:8px}
          .ast-flag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800}
          .ast-flag.VERDE{background:#dcfce7;color:#166534}
          .ast-flag.AMARELO{background:#fef3c7;color:#92400e}
          .ast-flag.VERMELHO{background:#fee2e2;color:#991b1b}
          .ast-flag.AZUL_CINZA{background:#e2e8f0;color:#334155}
          .ast-detail{display:grid;grid-template-columns:1.3fr .9fr;gap:14px}
          .ast-gerencial-filtros{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
          .ast-gerencial-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
          .ast-gerencial-actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:12px 0}
          .ast-mini-list{max-height:320px;overflow:auto}
          @media(max-width:800px){
            .ast-kpis{grid-template-columns:repeat(2,minmax(0,1fr))}
            .module-header{align-items:flex-start}
            .ast-form-grid,.ast-detail,.ast-gerencial-filtros,.ast-gerencial-grid,.ast-gerencial-actions{grid-template-columns:1fr}
            .ast-accessory-row{grid-template-columns:1fr}
          }
        </style>

        <div id="astKpis" class="ast-kpis"></div>

        <div class="ast-tabs">
          <button class="btn-secondary" type="button" onclick="astMostrarLista_()">Painel</button>
          <button class="btn-secondary" type="button" onclick="astAbrirEntrada_()">Nova Entrada</button>
          <button class="btn-secondary" type="button" onclick="astMostrarFase_('terceiros')">Terceiros</button>
          <button class="btn-secondary" type="button" onclick="astMostrarFase_('laboratorio')">Laboratorio</button>
          <button class="btn-secondary" type="button" onclick="astMostrarGerencial_()">Gerencial</button>
        </div>

        <section id="astArea"></section>
      </div>`;

    astCarregarTudo_();
  }

  function astCarregarTudo_() {
    if (!SESSION) return;
    astSetArea_('<div class="empty-state">Carregando modulo de Assistencia Tecnica...</div>');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          astSetArea_('<div class="empty-state">Nao foi possivel carregar o modulo.</div>');
          return;
        }
        AST_STATE.clientes = res.clientes || [];
        AST_STATE.tecnicos = res.tecnicos || [];
        AST_STATE.fornecedores = res.fornecedores || [];
        AST_STATE.dashboard = res.dashboard || {};
        astRenderKpis_();
        astMostrarLista_();
      })
      .withFailureHandler(function(err) {
        astSetArea_('<div class="empty-state">Erro: ' + escapeHtml_(err.message || err) + '</div>');
      })
      .astContexto(SESSION);
  }

  function astRenderKpis_() {
    const d = AST_STATE.dashboard || {};
    const kpis = [
      ["Na assistencia", d.totalAssistencia],
      ["Entradas hoje", d.entradasDia],
      ["Em aberto", d.emAberto],
      ["Atrasados", d.atrasados],
      ["Aguard. diagnostico", d.aguardandoDiagnostico],
      ["Aguard. pecas", d.aguardandoPecas],
      ["Em terceiro", d.emTerceiro],
      ["Prontos entrega", d.prontosEntrega]
    ];
    const el = document.getElementById("astKpis");
    if (!el) return;
    el.innerHTML = kpis.map(function(k) {
      return '<div class="ast-kpi"><small>' + escapeHtml_(k[0]) + '</small><strong>' + escapeHtml_(k[1] || 0) + '</strong></div>';
    }).join("");
  }

  function astMostrarLista_() {
    astSetArea_(`
      <div class="list-card">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
          <input id="astFiltroTexto" class="toolbar-search" placeholder="Buscar protocolo, cliente, equipamento, tecnico..." onkeydown="if(event.key==='Enter') astPesquisar_()">
          <select id="astFiltroStatus">
            <option value="">Todos os status</option>
            <option value="ENTRADA">Entrada</option>
            <option value="TRIAGEM">Triagem</option>
            <option value="DIAGNOSTICO">Diagnostico</option>
            <option value="ORCAMENTO">Orcamento</option>
            <option value="AGUARDANDO_PECAS">Aguardando pecas</option>
            <option value="MANUTENCAO">Manutencao</option>
            <option value="TERCEIROS">Terceiros</option>
            <option value="ENVIADO_PARA_TERCEIRO">Enviado para terceiro</option>
            <option value="TERCEIRO_RECEBIDO_METROLABS">Retorno de terceiro</option>
            <option value="TERCEIRO_ATRASADO">Terceiro atrasado</option>
            <option value="LABORATORIO">Laboratorio</option>
            <option value="ENTRADA_LABORATORIO">Entrada laboratorio</option>
            <option value="LAB_EM_PROCESSO">Lab em processo</option>
            <option value="LAB_AGUARDANDO_CERTIFICADO">Lab aguardando certificado</option>
            <option value="LAB_APROVADO">Lab aprovado</option>
            <option value="LAB_REPROVADO">Lab reprovado</option>
            <option value="PRONTO_ENTREGA">Pronto entrega</option>
            <option value="ENTREGUE">Entregue</option>
          </select>
          <button class="btn-secondary" type="button" onclick="astPesquisar_()">Pesquisar</button>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Protocolo</th><th>Cliente</th><th>Equipamento</th><th>Status</th><th>Tecnico</th><th>Prazo</th><th>Acoes</th></tr></thead>
            <tbody id="astEntradasBody"><tr><td colspan="7" class="empty-state">Carregando entradas...</td></tr></tbody>
          </table>
        </div>
      </div>`);
    astPesquisar_();
  }

  function astPesquisar_() {
    const filtros = {
      TEXTO: getValue_("astFiltroTexto"),
      STATUS: getValue_("astFiltroStatus")
    };
    google.script.run
      .withSuccessHandler(function(res) {
        AST_STATE.entradas = (res && res.items) || [];
        astRenderEntradas_();
      })
      .withFailureHandler(function(err) {
        const body = document.getElementById("astEntradasBody");
        if (body) body.innerHTML = '<tr><td colspan="7" class="empty-state">' + escapeHtml_(err.message || err) + '</td></tr>';
      })
      .astListarEntradas(SESSION, filtros);
  }

  function astRenderEntradas_() {
    const body = document.getElementById("astEntradasBody");
    if (!body) return;
    if (!AST_STATE.entradas.length) {
      body.innerHTML = '<tr><td colspan="7" class="empty-state">Nenhuma entrada encontrada.</td></tr>';
      return;
    }
    body.innerHTML = AST_STATE.entradas.map(function(e) {
      const flag = escapeHtml_(e.BANDEIRA || "AZUL_CINZA");
      return `<tr>
        <td><b>${escapeHtml_(e.PROTOCOLO)}</b></td>
        <td>${escapeHtml_(e.CLIENTE_NOME)}</td>
        <td>${escapeHtml_(e.EQUIPAMENTO_NOME)}<br><small>${escapeHtml_(e.EQUIPAMENTO_SERIE)}</small></td>
        <td><span class="ast-flag ${flag}">${escapeHtml_(e.STATUS)}</span></td>
        <td>${escapeHtml_(e.TECNICO_NOME || "--")}</td>
        <td>${escapeHtml_(e.PRAZO_PROMETIDO || "--")}</td>
        <td><div class="table-actions">
          <button class="btn-info" type="button" onclick="astAbrirDetalhe_('${escapeHtml_(e.ID)}')">Abrir</button>
          <button class="btn-secondary" type="button" onclick="astEtiqueta_('${escapeHtml_(e.ID)}')">Etiqueta</button>
        </div></td>
      </tr>`;
    }).join("");
  }

  function astAbrirEntrada_() {
    AST_STATE.acessorios = [{ DESCRICAO: "", QUANTIDADE: "1", ESTADO: "", OBSERVACAO: "" }];
    astSetArea_(`
      <div class="form-card">
        <h3 class="section-card-title">Dar Entrada em Equipamento</h3>
        <div class="ast-form-grid">
          <div><label>Cliente</label><select id="astCliente" onchange="astClienteChange_()">${astOptionsClientes_()}</select></div>
          <div><label>Unidade</label><select id="astUnidade" onchange="astUnidadeChange_()"><option value="">Selecione o cliente</option></select></div>
          <div class="full"><label>Equipamento</label><select id="astEquipamento"><option value="">Selecione a unidade</option></select></div>
          <div><label><input id="astProvisorio" type="checkbox" onchange="astToggleProvisorio_()"> Cadastro provisorio</label></div>
          <div><label>Numero de serie informado</label><input id="astSerieInformada" placeholder="Serie visivel na chegada"></div>
          <div class="full" id="astProvisorioBox" style="display:none;">
            <div class="ast-form-grid">
              <div><label>Cliente provisorio</label><input id="astClienteProv"></div>
              <div><label>Unidade provisoria</label><input id="astUnidadeProv"></div>
              <div class="full"><label>Equipamento provisorio</label><input id="astEquipProv"></div>
            </div>
          </div>
          <div class="full"><label>Condicao fisica na chegada</label><textarea id="astCondicao" rows="3"></textarea></div>
          <div class="full"><label>Problema relatado</label><textarea id="astProblema" rows="3"></textarea></div>
          <div><label>Prioridade</label><select id="astPrioridade"><option>NORMAL</option><option>BAIXA</option><option>ALTA</option><option>CRITICA</option></select></div>
          <div><label>Prazo prometido</label><input id="astPrazo" type="date"></div>
          <div class="full"><label>Tecnico responsavel</label><select id="astTecnico">${astOptionsTecnicos_()}</select></div>
        </div>

        <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border);">
          <h3 class="section-card-title">Acessorios recebidos</h3>
          <div id="astAcessoriosBox"></div>
          <button class="btn-secondary" type="button" onclick="astAddAcessorio_()">+ Acessorio</button>
          <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-weight:700;">
            <input id="astAcessoriosConferidos" type="checkbox"> Confirmo que os acessorios foram conferidos
          </label>
        </div>

        <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border);">
          <h3 class="section-card-title">Fotos de chegada</h3>
          <input id="astFotoChegada" type="file" accept="image/*" capture="environment">
          <textarea id="astFotoObs" rows="2" placeholder="Observacao da foto"></textarea>
          <p class="helper-text">A foto pode ser enviada depois da entrada, pela tela de detalhe. Nesta primeira fase o registro da entrada ja gera QR, PDF e etiqueta.</p>
        </div>

        <div class="form-actions">
          <button class="btn-primary" type="button" onclick="astSalvarEntrada_()">Concluir entrada</button>
          <button class="btn-secondary" type="button" onclick="astMostrarLista_()">Cancelar</button>
        </div>
        <div id="astEntradaMsg" class="helper-text"></div>
      </div>`);
    astRenderAcessorios_();
  }

  function astSalvarEntrada_() {
    const msg = document.getElementById("astEntradaMsg");
    if (msg) msg.textContent = "Registrando entrada...";
    const provis = document.getElementById("astProvisorio") && document.getElementById("astProvisorio").checked;
    const payload = {
      CLIENTE_ID: getValue_("astCliente"),
      UNIDADE_ID: getValue_("astUnidade"),
      EQUIPAMENTO_ID: getValue_("astEquipamento"),
      CADASTRO_PROVISORIO: provis ? "S" : "N",
      CLIENTE_PROVISORIO: getValue_("astClienteProv"),
      UNIDADE_PROVISORIA: getValue_("astUnidadeProv"),
      EQUIPAMENTO_PROVISORIO: getValue_("astEquipProv"),
      NUMERO_SERIE_INFORMADO: getValue_("astSerieInformada"),
      CONDICAO_FISICA: getValue_("astCondicao"),
      PROBLEMA_RELATADO: getValue_("astProblema"),
      PRIORIDADE: getValue_("astPrioridade"),
      PRAZO_PROMETIDO: getValue_("astPrazo"),
      TECNICO_ID: getValue_("astTecnico"),
      ACESSORIOS_CONFERIDOS: document.getElementById("astAcessoriosConferidos").checked ? "S" : "N",
      Acessorios: null,
      ACESSORIOS: astLerAcessorios_()
    };
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          if (msg) msg.textContent = (res && res.message) || "Falha ao registrar.";
          return;
        }
        alert("Entrada registrada: " + res.protocolo);
        astMostrarLista_();
      })
      .withFailureHandler(function(err) {
        if (msg) msg.textContent = "Erro: " + (err.message || err);
      })
      .astCriarEntrada(SESSION, payload);
  }

  function astAbrirDetalhe_(id) {
    astSetArea_('<div class="empty-state">Carregando prontuario tecnico...</div>');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          astSetArea_('<div class="empty-state">' + escapeHtml_((res && res.message) || "Nao encontrado.") + '</div>');
          return;
        }
        const e = res.item;
        const docs = res.documentos || [];
        const protocoloDoc = astDocPorTipo_(docs, "COMPROVANTE_ENTRADA_EQUIPAMENTO");
        const etiquetaDoc = astDocPorTipo_(docs, "ETIQUETA_RASTREABILIDADE_AST");
        const whatsappTexto = (res.whatsapp || "");
        astSetArea_(`
          <div class="ast-detail">
            <div class="form-card">
              <h3 class="section-card-title">${escapeHtml_(e.PROTOCOLO)}</h3>
              <p><span class="ast-flag ${escapeHtml_(e.BANDEIRA || "AZUL_CINZA")}">${escapeHtml_(e.STATUS)}</span></p>
              <div class="ast-form-grid">
                <div><label>Cliente</label><div>${escapeHtml_(e.CLIENTE_NOME)}</div></div>
                <div><label>Unidade</label><div>${escapeHtml_(e.UNIDADE_NOME)}</div></div>
                <div class="full"><label>Equipamento</label><div>${escapeHtml_(e.EQUIPAMENTO_NOME)}</div></div>
                <div><label>Serie</label><div>${escapeHtml_(e.EQUIPAMENTO_SERIE)}</div></div>
                <div><label>Tecnico</label><div>${escapeHtml_(e.TECNICO_NOME || "--")}</div></div>
                <div class="full"><label>Problema</label><div>${escapeHtml_(e.PROBLEMA_RELATADO)}</div></div>
                <div class="full"><label>Proxima acao</label><div>${escapeHtml_(e.PROXIMA_ACAO)}</div></div>
              </div>
              <div class="form-actions">
                <select id="astNovoStatus">
                  <option value="TRIAGEM">Triagem</option><option value="DIAGNOSTICO">Diagnostico</option>
                  <option value="ORCAMENTO">Orcamento</option><option value="AGUARDANDO_APROVACAO">Aguardando aprovacao</option>
                  <option value="AGUARDANDO_PECAS">Aguardando pecas</option><option value="MANUTENCAO">Manutencao</option>
                  <option value="TESTE">Teste</option><option value="LABORATORIO">Laboratorio</option><option value="ENTRADA_LABORATORIO">Entrada laboratorio</option><option value="LAB_EM_PROCESSO">Lab em processo</option><option value="LAB_AGUARDANDO_CERTIFICADO">Lab aguardando certificado</option><option value="LAB_APROVADO">Lab aprovado</option><option value="LAB_REPROVADO">Lab reprovado</option>
                  <option value="TERCEIROS">Terceiros</option><option value="ENVIADO_PARA_TERCEIRO">Enviado para terceiro</option><option value="TERCEIRO_RECEBIDO_METROLABS">Retorno de terceiro</option><option value="TERCEIRO_ATRASADO">Terceiro atrasado</option><option value="PRONTO_ENTREGA">Pronto entrega</option>
                  <option value="ENTREGUE">Entregue</option><option value="SEM_REPARO">Sem reparo</option><option value="CANCELADO">Cancelado</option>
                </select>
                <input id="astProximaAcao" placeholder="Proxima acao">
                <button class="btn-primary" type="button" onclick="astAtualizarStatus_('${escapeHtml_(e.ID)}')">Atualizar status</button>
              </div>
              <div class="form-actions">
                <select id="astTrocaTecnico">${astOptionsTecnicos_(e.TECNICO_ID)}</select>
                <input id="astMotivoTroca" placeholder="Motivo obrigatorio da troca">
                <button class="btn-secondary" type="button" onclick="astTrocarTecnico_('${escapeHtml_(e.ID)}')">Trocar tecnico</button>
              </div>
            </div>
            <div class="list-card">
              <h3 class="section-card-title">QR, documentos e etiqueta</h3>
              <img src="${escapeHtml_(e.QR_URL)}" style="width:160px;max-width:100%;border:1px solid var(--border);border-radius:8px;">
              <p class="helper-text">${escapeHtml_(e.URL_PUBLICA)}</p>
              <div class="form-actions" style="align-items:center;">
                <select id="astEtiquetaTam">
                  <option value="MEDIA">Media / Niimbot B21</option>
                  <option value="PEQUENA">Pequena</option>
                  <option value="A4">A4</option>
                </select>
              </div>
              <div class="form-actions" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;">
                <button class="btn-secondary" type="button" onclick="astVerQR_('${escapeHtml_(e.ID)}','${escapeHtml_(e.URL_PUBLICA)}')">Ver QR</button>
                <button class="btn-secondary" type="button" onclick="astEtiqueta_('${escapeHtml_(e.ID)}')">Imprimir etiqueta</button>
                <button class="btn-secondary" type="button" onclick="astBaixarEtiquetaPdf_('${escapeHtml_(e.ID)}')">Baixar etiqueta PDF</button>
                <button class="btn-secondary" type="button" onclick="astAbrirProtocolo_('${escapeHtml_(e.ID)}','${escapeHtml_(protocoloDoc.LINK_ARQUIVO || e.DOCUMENTO_ENTRADA_LINK || "")}')">Ver protocolo PDF</button>
                <button class="btn-secondary" type="button" onclick="astBaixarProtocolo_('${escapeHtml_(e.ID)}','${escapeHtml_(protocoloDoc.DOWNLOAD_URL || e.DOCUMENTO_ENTRADA_DOWNLOAD || protocoloDoc.LINK_ARQUIVO || e.DOCUMENTO_ENTRADA_LINK || "")}')">Baixar protocolo</button>
                <button class="btn-secondary" type="button" onclick="astCopiarWhats_('${escapeHtml_(e.ID)}')">Copiar mensagem WhatsApp</button>
                <button class="btn-secondary" type="button" onclick="astAbrirWhats_('${escapeHtml_(e.ID)}')">Abrir WhatsApp</button>
                <button class="btn-secondary" type="button" onclick="astAbrirValidacao_('${escapeHtml_(e.ID)}','${escapeHtml_(protocoloDoc.URL_VALIDACAO || e.URL_PUBLICA || "")}')">Abrir validacao publica</button>
              </div>
              <textarea id="astWhatsappTexto" style="display:none;">${escapeHtml_(whatsappTexto)}</textarea>
              <p class="helper-text">Etiqueta PDF mais recente: ${escapeHtml_(etiquetaDoc.LINK_ARQUIVO || "--")}</p>
              <h3 class="section-card-title">Movimentacoes</h3>
              <div>${astMovimentosHtml_(res.movimentos || [])}</div>
            </div>
          </div>
          ${astTecnicoHtml_(e, res)}`);
      })
      .withFailureHandler(function(err) {
        astSetArea_('<div class="empty-state">Erro: ' + escapeHtml_(err.message || err) + '</div>');
      })
      .astObterEntrada(SESSION, id);
  }

  function astAtualizarStatus_(id) {
    google.script.run.withSuccessHandler(function(res) {
      alert((res && res.message) || "Status atualizado.");
      astAbrirDetalhe_(id);
    }).astAtualizarStatus(SESSION, id, getValue_("astNovoStatus"), "Atualizacao pelo painel da Assistencia Tecnica.", getValue_("astProximaAcao"));
  }

  function astTrocarTecnico_(id) {
    google.script.run.withSuccessHandler(function(res) {
      alert((res && res.message) || "Tecnico atualizado.");
      astAbrirDetalhe_(id);
    }).astTrocarTecnico(SESSION, id, getValue_("astTrocaTecnico"), getValue_("astMotivoTroca"));
  }

  function astEtiqueta_(id) {
    const tamanho = getValue_("astEtiquetaTam") || "MEDIA";
    google.script.run.withSuccessHandler(function(res) {
      if (!res || !res.success) return alert("Nao foi possivel gerar etiqueta.");
      const w = window.open("", "_blank");
      w.document.open();
      w.document.write(res.html);
      w.document.close();
      w.print();
    }).astGerarEtiqueta(SESSION, id, tamanho);
  }

  function astBaixarEtiquetaPdf_(id) {
    const tamanho = getValue_("astEtiquetaTam") || "MEDIA";
    google.script.run.withSuccessHandler(function(res) {
      if (!res || !res.success) return alert((res && res.message) || "Nao foi possivel gerar etiqueta PDF.");
      window.open(res.downloadUrl || res.pdfUrl, "_blank");
      astAbrirDetalhe_(id);
    }).astGerarEtiquetaPdf(SESSION, id, tamanho);
  }

  function astVerQR_(id, url) {
    astRegistrarAcaoSilenciosa_(id, "QR_VISUALIZAR", "QR/rastreabilidade aberto pela tela interna.");
    window.open(url, "_blank");
  }

  function astAbrirProtocolo_(id, url) {
    if (!url) return alert("Protocolo PDF ainda nao disponivel.");
    astRegistrarAcaoSilenciosa_(id, "PROTOCOLO_ABRIR", "Protocolo PDF aberto.");
    window.open(url, "_blank");
  }

  function astBaixarProtocolo_(id, url) {
    if (!url) return alert("Protocolo PDF ainda nao disponivel.");
    astRegistrarAcaoSilenciosa_(id, "PROTOCOLO_DOWNLOAD", "Download do protocolo solicitado.");
    window.open(url, "_blank");
  }

  function astAbrirValidacao_(id, url) {
    if (!url) return alert("Link de validacao ainda nao disponivel.");
    astRegistrarAcaoSilenciosa_(id, "VALIDACAO_ABRIR", "Validacao publica aberta.");
    window.open(url, "_blank");
  }

  function astCopiarWhats_(id) {
    google.script.run.withSuccessHandler(function(res) {

  function astCopiarTexto_(texto) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(texto || "");
      return;
    }
    const ta = document.createElement("textarea");
    ta.value = texto || "";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }

  function astDocPorTipo_(docs, tipo) {
    const alvo = String(tipo || "").toUpperCase();
    const filtrados = (docs || []).filter(function(d) {

    });
    if (!filtrados.length) return {};
    filtrados.sort(function(a, b) {
      return String(b.CRIADO_EM || "").localeCompare(String(a.CRIADO_EM || ""));
    });
    return filtrados[0] || {};
  }

    return '<div class="list-card"><h3 class="section-card-title">' + escapeHtml_(titulo) + '</h3><div class="table-wrap"><table class="table"><thead><tr>' + campos.map(function(c) { return '<th>' + escapeHtml_(c) + '</th>'; }).join("") + '</tr></thead><tbody>' + linhas + '</tbody></table></div></div>';

  function astGerarPdfGerencial_(tipo) {
    const filtros = astFiltrosGerenciais_();
    if (tipo === "prontuario") {
      if (!filtros.ENTRADA_ID) return alert("Informe o ID da entrada para gerar o prontuario do equipamento.");
      google.script.run.withSuccessHandler(astAbrirPdfGerencial_).astGerarProntuarioEquipamento(SESSION, filtros.ENTRADA_ID);
      return;
    }
    if (tipo === "cliente") google.script.run.withSuccessHandler(astAbrirPdfGerencial_).astGerarRelatorioCliente(SESSION, filtros);
    if (tipo === "executivo") google.script.run.withSuccessHandler(astAbrirPdfGerencial_).astGerarRelatorioExecutivo(SESSION, filtros);
    if (tipo === "produtividade") google.script.run.withSuccessHandler(astAbrirPdfGerencial_).astGerarRelatorioProdutividadeTecnicos(SESSION, filtros);
    if (tipo === "atrasados") google.script.run.withSuccessHandler(astAbrirPdfGerencial_).astGerarRelatorioAtrasados(SESSION, filtros);
    if (tipo === "conformidade") google.script.run.withSuccessHandler(astAbrirPdfGerencial_).astGerarRelatorioConformidadeDocumental(SESSION, filtros);
  }

  function astAbrirPdfGerencial_(res) {
    if (!res || !res.success) return alert((res && res.message) || "Falha ao gerar PDF gerencial.");
    window.open(res.downloadUrl || res.pdfUrl, "_blank");
    astAtualizarDashboardGerencial_();
  }

  function astUploadAnexoArquivo_(inputId, payload, done) {
    const input = document.getElementById(inputId);
    const file = input && input.files && input.files[0];
    if (!file) {
      done(null);
      return;
    }
    const reader = new FileReader();
    reader.onload = function(ev) {
      const base64 = String((ev.target && ev.target.result) || "").split(",").pop();
      google.script.run.withSuccessHandler(function(res) {
        done(res);
      }).withFailureHandler(function(err) {
        alert((err && err.message) || err || "Falha no upload do anexo.");
        done({ success: false });
      }).astUploadAnexo(SESSION, Object.assign({}, payload, {
        NOME_ARQUIVO: file.name,
        MIME_TYPE: file.type || "application/octet-stream",
        BASE64_DATA: base64
      }));
    };
    reader.readAsDataURL(file);
  }

    }).astAnexarEvidenciaLaboratorio(SESSION, labId, payload);
  }

  function astConsolidarLab_(labId) {
    if (!labId) return alert("Registre a entrada de laboratorio primeiro.");
    if (!confirm("Confirmar consolidacao do resultado laboratorial?")) return;
    const payload = {
      CONFORMIDADE: getValue_("astLabResConf"),
      RESULTADO_FINAL: getValue_("astLabResultado"),
      RESUMO_TECNICO: getValue_("astLabResumo"),
      RECOMENDACOES: getValue_("astLabRecomendacoes"),
      RESTRICOES: getValue_("astLabRecomendacoes"),
      VALIDADE_RESULTADO: getValue_("astLabValidade"),
      PROXIMA_CALIBRACAO_SUGERIDA: getValue_("astLabProximaCal"),
      RESPONSAVEL_ID: getValue_("astLabResponsavel"),
      APROVACAO_GESTOR: getValue_("astLabGestor")
    };
    google.script.run.withSuccessHandler(function(res) {
      alert((res && res.message) || "Resultado consolidado.");
    }).astConsolidarResultadoLaboratorio(SESSION, labId, payload);
  }

  function astGerarDocLab_(labId, tipo) {
    if (!labId) return alert("Registre a entrada de laboratorio primeiro.");
    google.script.run.withSuccessHandler(function(res) {
      if (!res || !res.success) return alert((res && res.message) || "Falha ao gerar documento.");
      window.open(res.downloadUrl || res.pdfUrl, "_blank");
    }).astGerarDocumentoLaboratorio(SESSION, labId, tipo);
  }

  function astWhatsLab_(labId) {
    if (!labId) return alert("Registre a entrada de laboratorio primeiro.");
    google.script.run.withSuccessHandler(function(res) {
      if (!res || !res.success) return alert((res && res.message) || "Falha ao gerar WhatsApp.");
      astCopiarTexto_(res.texto);
      alert("Mensagem de laboratorio copiada.");
    }).astObterWhatsappLaboratorio(SESSION, labId, "RESULTADO");
  }
</script>
