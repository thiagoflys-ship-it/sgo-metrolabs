<script>
(function () {
  var MC = {
    tela: "home", osId: null, os: null, os_lista: [], missoes_lista: [],
    checklist_perguntas: [], checklist_respostas: {}, fotos_lista: [],
    materiais_lista: [], assinaturas: [], relato: "", relato_ia: "",
    historico: [], clientes: [], unidades: [], equipamentos: [], tecnicos: [], tipos_os: [], prioridades: [],
    gps_unidade: null, nova_os_questionario: null, _cssInjetado: false, _busy: false, foto_retry: null, _rascunhoRelato: null
  };

  function mc_ses() { return (typeof SESSION !== "undefined") ? SESSION : null; }
  function mc_usr() { return (typeof USER_CONTEXT !== "undefined") ? USER_CONTEXT : null; }
  function mc_esc(v) {
    return typeof escapeHtml_ === "function"
      ? escapeHtml_(v)
      : String(v == null ? "" : v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function mc_fmt(iso) {
    if (!iso) return "--";
    try { var d = new Date(iso); return d.toLocaleDateString("pt-BR") + " " + d.toTimeString().slice(0,5); }
    catch(e) { return String(iso); }
  }
  function mc_cor_status(s) {
    s = (s||"").toUpperCase();
    if (s==="CONCLUIDA"||s==="CONCLUÍDA"||s==="CONCLUIDO"||s==="CONCLUÍDO") return "#057a55";
    if (s==="EM_EXECUCAO"||s==="EM EXECUÇÃO"||s==="EM_ANDAMENTO") return "#1a56db";
    if (s==="CANCELADA"||s==="CANCELADO") return "#dc2626";
    if (s==="PENDENTE"||s==="AGUARDANDO"||s==="ABERTA") return "#c27803";
    return "#6b7280";
  }
  function mc_cor_prior(p) {
    p = (p||"").toUpperCase();
    if (p==="CRITICA"||p==="CRÍTICA") return "#dc2626";
    if (p==="ALTA") return "#f97316";
    if (p==="MEDIA"||p==="MÉDIA") return "#eab308";
    return "#3b82f6";
  }

  // ── ROBUSTEZ ──────────────────────────────
  function mc_tamanhoLegivel_(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  }

  function mc_setBtnBusy_(id, txt) {
    var b = document.getElementById(id); if (!b) return;
    b._origTxt = b.textContent; b.disabled = true; b.style.opacity = "0.6";
    if (txt) b.textContent = txt;
  }

  function mc_resetBtn_(id) {
    var b = document.getElementById(id); if (!b) return;
    b.disabled = false; b.style.opacity = "";
    if (b._origTxt !== undefined) { b.textContent = b._origTxt; delete b._origTxt; }
  }

  function mc_comprimirImagem_(file, opts, cb) {
    var maxW = (opts && opts.maxW) || 1600;
    var qual = (opts && opts.quality) || 0.78;
    var origSize = file.size;
    if (origSize < 600 * 1024) {
      var rd0 = new FileReader();
      rd0.onload = function(e) { cb(null, e.target.result, origSize, origSize); };
      rd0.onerror = function() { cb(new Error("Leitura falhou")); };
      rd0.readAsDataURL(file);
      return;
    }
    var rd = new FileReader();
    rd.onerror = function() { cb(new Error("Leitura falhou")); };
    rd.onload = function(ev) {
      var img = new Image();
      img.onerror = function() { cb(null, ev.target.result, origSize, origSize); };
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        try {
          var cv = document.createElement("canvas");
          cv.width = w; cv.height = h;
          cv.getContext("2d").drawImage(img, 0, 0, w, h);
          var b64 = cv.toDataURL("image/jpeg", qual);
          var sz = Math.round((b64.length - "data:image/jpeg;base64,".length) * 3 / 4);
          cb(null, b64, origSize, sz);
        } catch(ex) { cb(null, ev.target.result, origSize, origSize); }
      };
      img.src = ev.target.result;
    };
    rd.readAsDataURL(file);
  }

  // Rascunho — relato técnico
  var _relatoDbTimer_ = null;
  function mc_salvarRascunhoRelato_() {
    try { if (MC.osId) { var el = document.getElementById("mc2-relato"); if (el) localStorage.setItem("sgo_r_" + MC.osId, el.value); } } catch(e) {}
  }
  function mc_carregarRascunhoRelato_() {
    try { return MC.osId ? (localStorage.getItem("sgo_r_" + MC.osId) || "") : ""; } catch(e) { return ""; }
  }
  function mc_limparRascunhoRelato_() {
    try { if (MC.osId) localStorage.removeItem("sgo_r_" + MC.osId); } catch(e) {}
  }
  function mc_onRelatoInput_() {
    clearTimeout(_relatoDbTimer_);
    _relatoDbTimer_ = setTimeout(mc_salvarRascunhoRelato_, 800);
  }
  function mc_restaurarRascunho_() {
    var el = document.getElementById("mc2-relato"); if (!el) return;
    var r = MC._rascunhoRelato || mc_carregarRascunhoRelato_(); if (!r) return;
    if (el.value && el.value.trim() && el.value !== r) {
      if (!confirm("Substituir o texto atual pelo rascunho salvo?")) return;
    }
    el.value = r; MC.relato = r;
    var box = document.getElementById("mc2-rascunho-box"); if (box) box.style.display = "none";
    mc_toast("Rascunho restaurado");
  }
  function mc_descartarRascunho_() {
    mc_limparRascunhoRelato_(); MC._rascunhoRelato = null;
    var box = document.getElementById("mc2-rascunho-box"); if (box) box.style.display = "none";
  }

  // Rascunho — checklist
  function mc_salvarRascunhoChecklist_() {
    try { if (MC.osId) localStorage.setItem("sgo_cl_" + MC.osId, JSON.stringify(MC.checklist_respostas)); } catch(e) {}
  }
  function mc_carregarRascunhoChecklist_() {
    try { if (!MC.osId) return {}; var raw = localStorage.getItem("sgo_cl_" + MC.osId); return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
  }
  function mc_limparRascunhoChecklist_() {
    try { if (MC.osId) localStorage.removeItem("sgo_cl_" + MC.osId); } catch(e) {}
  }

  // Retentativa de foto
  function mc_tentarNovamenteUpload_() {
    var retry = MC.foto_retry; if (!retry) { mc_toast("Nenhuma foto pendente"); return; }
    var ses = mc_ses(), osId = MC.osId; if (!ses||!osId) { mc_toast("Sessão inválida ou expirada."); return; }
    if (MC._busy) return;
    MC._busy = true;
    mc_setBtnBusy_("mc2-btn-retry", "Reenviando...");
    google.script.run
      .withSuccessHandler(function(r) {
        MC._busy = false;
        if (r&&r.success) {
          mc_toast("✅ Foto reenviada com sucesso");
          MC.fotos_lista.push(r.item||r.foto||{ TIPO:retry.tipo, OBSERVACAO:retry.obs });
          MC.foto_retry = null; mc_renderFotos();
        } else {
          mc_resetBtn_("mc2-btn-retry");
          mc_toast(r?r.message:"Falha ao reenviar. Tente novamente.");
        }
      })
      .withFailureHandler(function() {
        MC._busy = false; mc_resetBtn_("mc2-btn-retry");
        mc_toast("Sem conexão. Tente quando houver sinal.");
      })
      .osFotoUploadBase64(ses, osId, { TIPO:retry.tipo, OBSERVACAO:retry.obs, BASE64_DATA:retry.base64, NOME_ARQUIVO:retry.nome, MIME_TYPE:retry.mime });
  }

  function mc_cancelarRetentativa_() {
    MC.foto_retry = null; mc_renderFotos();
  }

      ".mc2-ok{background:#057a55;color:#fff;}",
      ".mc2-red{background:#c81e1e;color:#fff;}",
      ".mc2-warn{background:#c27803;color:#fff;}",
      ".mc2-ghost{background:#f1f5f9;color:#334155;}",
      ".mc2-sm{min-height:44px;font-size:14px;padding:8px 12px;border-radius:8px;}",

      ".mc2-val{font-size:15px;color:#0f172a;font-weight:600;line-height:1.3;}",

      ".mc2-ta:focus{outline:none;border-color:#1a56db;}",
      ".mc2-sel{width:100%;min-height:48px;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:16px;box-sizing:border-box;font-family:inherit;background:#fff;color:#0f172a;}",
      ".mc2-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}",
      ".mc2-gbtn{min-height:62px;font-size:13px;line-height:1.3;padding:10px 8px;border-radius:10px;}",
      ".mc2-q-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:10px;}",
      ".mc2-q-txt{font-size:15px;color:#0f172a;font-weight:600;line-height:1.4;margin-bottom:12px;}",
      ".mc2-q-obrig{color:#dc2626;font-size:12px;font-weight:700;margin-left:4px;}",
      ".mc2-q-row{display:flex;gap:8px;}",
      ".mc2-qb{flex:1;min-height:44px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:#f8fafc;color:#334155;}",

      ".mc2-nao{background:#fee2e2!important;border-color:#dc2626!important;color:#dc2626!important;}",

      ".mc2-aerr{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}",

      ".mc2-spin{width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#1a56db;border-radius:50%;animation:mc2spin .7s linear infinite;}",

      ".mc2-empty-ico{font-size:40px;margin-bottom:12px;}",
      ".mc2-canvas{border:2px solid #e2e8f0;border-radius:10px;background:#fff;touch-action:none;display:block;max-width:100%;}",
      ".mc2-gap8{height:8px;} .mc2-gap16{height:16px;} .mc2-gap20{height:20px;}"
    ].join("");
    document.head.appendChild(s);
  }

  function mc_toast(msg, dur) {
    var t = document.getElementById("mc2-toast");
    if (!t) {
      t = document.createElement("div");
      t.id = "mc2-toast";
      t.style.cssText = "position:fixed;bottom:calc(24px + env(safe-area-inset-bottom, 0px));left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:90vw;text-align:center;transition:opacity .3s;font-family:'Segoe UI',Arial,sans-serif;";
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = "1";
    clearTimeout(t._t);
    t._t = setTimeout(function () { t.style.opacity = "0"; }, dur || 2400);
  }

  function mc_div() { return document.getElementById("conteudo"); }

  function mc_ir(tela, extra) {
    MC.tela = tela;
    if (extra) { Object.keys(extra).forEach(function(k){ MC[k] = extra[k]; }); }
    mc_render();
  }

  function mc_render() {
    mc_css();
    var m = {
      "home": mc_renderHome, "cliente": mc_renderCliente, "unidade": mc_renderUnidade,
      "equipamento": mc_renderEquipamento, "nova-os": mc_renderNovaOS, "documentos": mc_renderDocumentos,
      "minhas-os": mc_renderMinhasOS, "detalhe-os": mc_renderDetalheOS, "checklist": mc_renderChecklist,
      "fotos": mc_renderFotos, "materiais": mc_renderMateriais, "relato": mc_renderRelato,
      "assinatura": mc_renderAssinatura, "finalizar": mc_renderFinalizar, "historico": mc_renderHistorico,
      "minhas-missoes": mc_renderMinhasMissoes, "cartao-flash": mc_renderCartaoFlash
    };
    (m[MC.tela] || mc_renderHome)();
  }

  function mc_topbar(titulo, voltar) {
    var u = mc_usr();
    var n = u ? mc_esc(u.nome || u.usuario || "") : "";
    return '<div class="mc2-top">' +
      '<div><div class="mc2-top-title">SGO+ Campo <span style="font-size:10px;background:rgba(255,255,255,.18);padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.3px;vertical-align:middle;">v2</span></div><div class="mc2-top-sub">' + n + '</div></div>' +
      '<div class="mc2-top-r">' +
      (voltar ? '<button class="mc2-btn-top" onclick="' + mc_esc(voltar) + '">← Voltar</button>' : '') +
      '<button class="mc2-btn-top mc2-btn-top-red" onclick="if(confirm(\'Sair do SGO+?\'))logout()">Sair</button>' +
      '</div></div>';
  }

  function mc_loading(titulo, voltar) {
    var div = mc_div(); if (!div) return;
    div.innerHTML = '<div class="mc2">' + mc_topbar(titulo, voltar) +
      '<div class="mc2-spin-wrap"><div class="mc2-spin"></div>' +
      '<div style="color:#64748b;font-size:14px;font-weight:600;">Carregando...</div></div></div>';
  }

  // ── HOME ──────────────────────────────────
  function mc_renderHome() {
    var div = mc_div(); if (!div) return;
    var u = mc_usr();
    var n = u ? (u.nome || u.usuario || "Técnico") : "Técnico";
    var h = new Date().getHours();
    var g = h < 12 ? "Bom dia" : h < 18 ? "Boa tarde" : "Boa noite";
    div.innerHTML = '<div class="mc2">' + mc_topbar() +
      '<div class="mc2-body">' +
      '<div style="margin-bottom:20px;"><div style="font-size:22px;font-weight:900;color:#0f172a;">' + mc_esc(g) + ', ' + mc_esc(n.split(" ")[0]) + ' 👋</div>' +
      '<div style="font-size:13px;color:#64748b;margin-top:4px;">Interface exclusiva de campo</div></div>' +
      _navCard("📋","Minhas O.S.","Ordens atribuídas a você","mc_iniciarMinhasOS()") +
      _navCard("🗓️","Minhas Missões","Agenda e missões do dia","mc_iniciarMinhasMissoes()") +
      _navCard("➕","Nova O.S.","Criar tarefa em campo","mc_iniciarNovaOS()") +
      _navCard("💳","Cartão Flash","Prestar conta de gasto","mc_iniciarCartaoFlash()") +
      _navCard("🏢","Cadastrar Cliente","Entrada rápida de cliente","mc_iniciarCliente()") +
      _navCard("📍","Cadastrar Unidade","Unidade com GPS e endereço","mc_iniciarUnidade()") +
      _navCard("🔬","Cadastrar Equipamento","Equipamento vinculado à unidade","mc_iniciarEquipamento()") +
      _navCard("📁","Documentos","Consulta rápida e validação","mc_iniciarDocumentos()") +
      _navCard("📷","Ler QR Code","Identificar equipamento","mc_lerQRCode()") +
      _navCard("🔄","Sincronizar","Atualizar dados","mc_sincronizar()") +
      _navCard("🖥️","Gestão Completa","Abrir versão desktop","mc_abrirGestaoCompleta()") +
      '<div class="mc2-nav" style="border-color:#fee2e2;" onclick="if(confirm(\'Sair do SGO+?\'))logout()">' +
        '<div class="mc2-nav-ico">🚪</div><div class="mc2-nav-txt"><div class="mc2-nav-title" style="color:#dc2626;">Sair</div><div class="mc2-nav-sub">Encerrar sessão</div></div><div>›</div></div>' +
      '<div style="text-align:center;padding:20px 0 8px;font-size:11px;color:#cbd5e1;font-weight:600;">METROLABS SGO+ Campo v2.0</div>' +
      '</div></div>';
  }

  function _navCard(ico, title, sub, onclick) {
    return '<div class="mc2-nav" onclick="' + mc_esc(onclick) + '">' +
      '<div class="mc2-nav-ico">' + ico + '</div>' +
      '<div class="mc2-nav-txt"><div class="mc2-nav-title">' + title + '</div><div class="mc2-nav-sub">' + sub + '</div></div>' +
      '<div style="color:#cbd5e1;font-size:18px;">›</div></div>';
  }

  function mc_lerQRCode() {
    mc_toast("Use a câmera do dispositivo para ler o QR Code do equipamento");
  }

  function mc_sincronizar() {
    var ses = mc_ses(); if (!ses) { mc_toast("Sessão inválida"); return; }
    mc_toast("Sincronizando...");
    google.script.run
      .withSuccessHandler(function () { mc_toast("✅ Sincronizado"); })
      .withFailureHandler(function () { mc_toast("Falha ao sincronizar"); })
      .getPublicConfig();
  }


  // ── CADASTROS RÁPIDOS E NOVA O.S. ─────────
  function mc_val(id) {
    var el = document.getElementById(id);
    return el ? String(el.value || "").trim() : "";
  }

  function mc_set(id, v) {
    var el = document.getElementById(id);

    var ses = mc_ses(), tipo = mc_val("mc2-os-tipo"), eqId = mc_val("mc2-os-equip"), raw = MC._opcoes_os_raw || {};
    var box = document.getElementById("mc2-os-questionario");
    MC.nova_os_questionario = null;
    if (!tipo || !eqId) { if (box) box.style.display = "none"; return; }
    var eq = (raw.equipamentos || []).filter(function(e){ return String(e.ID) === String(eqId); })[0] || {};
    var tipoEqp = eq.TIPO || eq.EQUIPAMENTO_TIPO || "GERAL";
    if (box) { box.style.display = "block"; box.textContent = "Buscando questionário sugerido..."; }
    if (!ses || !google || !google.script || !google.script.run || !google.script.run.checklistModeloPorTipoOSTipoEquipamento) {
      if (box) box.textContent = "Questionário será vinculado pelo backend, se configurado.";
      return;
    }
    google.script.run

        .withSuccessHandler(function (r) {
          MC.checklist_perguntas = (r&&r.success) ? (r.templates||r.itens||r.items||[]) : [];
          if (MC.osId && Object.keys(MC.checklist_respostas).length === 0) {
            google.script.run
              .withSuccessHandler(function (r2) {
                if (r2&&r2.success) {
                  var mapa = {}, lista = r2.respostas||r2.items||[];
                  if (Array.isArray(lista)) { lista.forEach(function(it){ var pid=it.PERGUNTA_ID||it.TEMPLATE_ID; if(pid&&it.RESPOSTA) mapa[pid]=it.RESPOSTA; }); }
                  else if (lista && typeof lista==="object") { mapa = lista; }
                  if (Object.keys(mapa).length === 0) { var draft = mc_carregarRascunhoChecklist_(); if (Object.keys(draft).length > 0) mapa = draft; }
                  MC.checklist_respostas = mapa;
                }
                mc_renderChecklist();
              })
              .withFailureHandler(function () { mc_renderChecklist(); })
              .osChecklistListarRespostas(ses, MC.osId);
          } else { mc_renderChecklist(); }

        .withFailureHandler(function () { MC.checklist_perguntas = []; mc_renderChecklist(); })

  function mc_responder(pid, val) {
    MC.checklist_respostas[pid] = val;
    var card = document.getElementById("mc2q-" + pid); if (!card) return;
    var btns = card.querySelectorAll(".mc2-qb");
    btns.forEach(function(b){ b.className = "mc2-qb"; });
    if (val==="SIM" && btns[0]) btns[0].className = "mc2-qb mc2-sim";
    if (val==="NAO" && btns[1]) btns[1].className = "mc2-qb mc2-nao";
    if (val==="NA"  && btns[2]) btns[2].className = "mc2-qb mc2-na";
    mc_salvarRascunhoChecklist_();
  }

  function mc_salvarChecklist() {
    if (MC._busy) return;
    var pergs = MC.checklist_perguntas || [];
    var falta = pergs.filter(function(p,i) {
      var pid = p.ID||p.id||("p"+i);
      return (p.OBRIGATORIO||p.obrigatorio) && !MC.checklist_respostas[pid];
    });
    if (falta.length) { mc_toast("Responda os itens obrigatórios (*) primeiro"); return; }
    var ses = mc_ses(), osId = MC.osId;
    if (!ses||!osId) { mc_toast("Sessão expirada. Faça login novamente."); return; }
    MC._busy = true;
    mc_setBtnBusy_("mc2-btn-check-salvar", "Salvando...");
    var respostasArray = Object.keys(MC.checklist_respostas).map(function(pid) {
      return { PERGUNTA_ID: pid, TEMPLATE_ID: pid, RESPOSTA: MC.checklist_respostas[pid] };
    });
    google.script.run
      .withSuccessHandler(function (r) {
        MC._busy = false; mc_resetBtn_("mc2-btn-check-salvar");
        if (r&&r.success) { mc_limparRascunhoChecklist_(); mc_toast("✅ Checklist salvo com sucesso"); }
        else { mc_toast(r?r.message:"Erro ao salvar checklist. Tente novamente."); }
      })
      .withFailureHandler(function () {
        MC._busy = false; mc_resetBtn_("mc2-btn-check-salvar");
        mc_toast("Falha de conexão. Respostas mantidas localmente.");
      })
      .osChecklistSalvarRespostas(ses, osId, respostasArray);
  }

    if (MC._busy) return;

    var MAX = 15 * 1024 * 1024;
    if (file.size > MAX) {
      mc_toast("Foto muito grande (" + mc_tamanhoLegivel_(file.size) + "). Limite: 15 MB. Tente uma foto com menor resolução.", 4000);

  function _initCanvas() {
    var c = document.getElementById("mc2-canvas"); if (!c) return;
    var dpr = window.devicePixelRatio || 1;
    var cssW = 340, cssH = 140;
    c.width = cssW * dpr; c.height = cssH * dpr;
    c.style.width = cssW + "px"; c.style.height = cssH + "px";
    mc2_ctx = c.getContext("2d");
    mc2_ctx.scale(dpr, dpr);
    mc2_ctx.strokeStyle = "#0f172a"; mc2_ctx.lineWidth = 2.5; mc2_ctx.lineCap = "round";
    function pos(e) {
      var r = c.getBoundingClientRect(), s = e.touches ? e.touches[0] : e;
      return { x: s.clientX - r.left, y: s.clientY - r.top };
    }
    function stop() { mc2_drag = false; }
    c.addEventListener("mousedown", function(e){ mc2_drag=true; var p=pos(e); mc2_ctx.beginPath(); mc2_ctx.moveTo(p.x,p.y); });
    c.addEventListener("mousemove", function(e){ if(!mc2_drag)return; var p=pos(e); mc2_ctx.lineTo(p.x,p.y); mc2_ctx.stroke(); });
    c.addEventListener("mouseup", stop);
    c.addEventListener("mouseleave", stop);
    c.addEventListener("touchstart", function(e){ e.preventDefault(); mc2_drag=true; var p=pos(e); mc2_ctx.beginPath(); mc2_ctx.moveTo(p.x,p.y); },{passive:false});
    c.addEventListener("touchmove", function(e){ e.preventDefault(); if(!mc2_drag)return; var p=pos(e); mc2_ctx.lineTo(p.x,p.y); mc2_ctx.stroke(); },{passive:false});
    c.addEventListener("touchend", stop);
  }

  function mc_limparCanvas() {
    var c = document.getElementById("mc2-canvas");
    if (c && mc2_ctx) {
      mc2_ctx.save();
      mc2_ctx.setTransform(1, 0, 0, 1, 0, 0);
      mc2_ctx.clearRect(0, 0, c.width, c.height);
      mc2_ctx.restore();
    }
  }

  function _canvasVazio(c) {
    var d = c.getContext("2d").getImageData(0,0,c.width,c.height).data;
    for (var i=3;i<d.length;i+=4){ if(d[i]>0) return false; } return true;
  }

  function mc_enviarPrestacaoFlash_() {
    var ses = mc_ses();
    if (!ses) { mc_toast("Sessão inválida. Recarregue e tente novamente."); return; }
    var valor = ((document.getElementById("mcf-valor") || {}).value || "").trim();
    var data = ((document.getElementById("mcf-data") || {}).value || "").trim();
    var finalidade = ((document.getElementById("mcf-finalidade") || {}).value || "").trim();
    if (!valor || parseFloat(valor) <= 0) { mc_toast("Informe o valor do gasto."); return; }
    if (!data) { mc_toast("Informe a data do gasto."); return; }
    if (finalidade.length < 5) { mc_toast("Descreva a finalidade (mínimo 5 caracteres)."); return; }
    var tipo = ((document.getElementById("mcf-tipo") || {}).value || "");
    var os = ((document.getElementById("mcf-os") || {}).value || "").trim();
    var local = ((document.getElementById("mcf-local") || {}).value || "").trim();
    var obs = ((document.getElementById("mcf-obs") || {}).value || "").trim();
    var btn = document.getElementById("mcf-btn-enviar");
    var resultado = document.getElementById("mcf-resultado");
    if (btn) { btn.disabled = true; btn.textContent = "⏳ Enviando..."; btn.style.background = "#92400e"; }
    if (resultado) { resultado.innerHTML = ""; }
    var payload = {
      valor: parseFloat(valor),
      dataGasto: data,
      finalidade: finalidade,
      tipoGasto: tipo,
      osNumero: os,
      local: local,
      observacoes: obs
    };
    google.script.run
      .withSuccessHandler(function(r) {
        if (!r || !r.success) {
          if (btn) { btn.disabled = false; btn.textContent = "💳 Preparar prestação — revisar antes de enviar"; btn.style.background = ""; }
          if (resultado) {
            resultado.innerHTML = '<div class="mc2-alrt mc2-aerr" style="margin-top:12px;">❌ ' + mc_esc((r && r.message) || "Erro ao registrar prestação.") + '</div>';
          }
          return;
        }
        if (btn) { btn.textContent = "✅ Prestação enviada — aguardando comprovante"; }
        if (resultado) {
          resultado.innerHTML =
            '<div class="mc2-alrt mc2-aok" style="margin-top:12px;">' +
            '<strong>✅ Prestação registrada no piloto Flash</strong><br>' +
            'ID: <strong>' + mc_esc(r.lancamentoId || "") + '</strong><br>' +
            'Status: <strong>' + mc_esc(r.statusPrestacao || "PENDENTE_COMPROVANTE") + '</strong><br>' +
            'Valor: <strong>R$ ' + mc_esc(parseFloat(valor).toFixed(2).replace(".", ",")) + '</strong><br>' +
            'Data: <strong>' + mc_esc(data) + '</strong><br>' +
            'Finalidade: <strong>' + mc_esc(finalidade) + '</strong><br>' +
            (os ? 'O.S.: <strong>' + mc_esc(os) + '</strong><br>' : '') +
            '<br><em>⚠️ Piloto controlado. Comprovante pendente — anexar na próxima etapa.</em>' +
            '</div>';
        }
        mc_toast("Prestação registrada. Aguardando comprovante.", 3500);
      })
      .withFailureHandler(function() {
        if (btn) { btn.disabled = false; btn.textContent = "💳 Preparar prestação — revisar antes de enviar"; btn.style.background = ""; }
        if (resultado) {
          resultado.innerHTML = '<div class="mc2-alrt mc2-aerr" style="margin-top:12px;">❌ Falha de conexão. Tente novamente quando houver sinal.</div>';
        }
        mc_toast("Sem conexão. Tente novamente.", 3000);
      })
