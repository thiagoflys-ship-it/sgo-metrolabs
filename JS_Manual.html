// RENDERIZADOR DO MANUAL

function abrirManualModulo_(modulo) {
  var manual = SGO_MANUAIS[modulo];
  if (!manual) {
    alert('Manual não disponível para este módulo.');
    return;
  }

  var existente = document.getElementById('sgo-modal-manual');
  if (existente) existente.remove();

  var html = '<div id="sgo-modal-manual" style="'
    + 'position:fixed;top:0;left:0;right:0;bottom:0;'
    + 'background:rgba(0,0,0,0.55);z-index:99000;'
    + 'display:flex;align-items:center;justify-content:center;'
    + 'padding:16px;box-sizing:border-box;" '
    + 'onclick="if(event.target===this)fecharManualModulo_()">'
    + '<div style="'
    + 'background:#fff;border-radius:12px;width:100%;max-width:680px;'
    + 'max-height:88vh;display:flex;flex-direction:column;'
    + 'box-shadow:0 8px 40px rgba(0,0,0,0.3);overflow:hidden;">'

    // Cabeçalho
    + '<div style="background:linear-gradient(135deg,#0f2d52,#1a4a80);color:#fff;'
    + 'padding:18px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">'
    + '<div><div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">Manual Operacional — SGO+</div>'
    + '<div style="font-size:18px;font-weight:700;">' + (manual.icone || '📖') + ' ' + manual.titulo + '</div></div>'
    + '<button onclick="fecharManualModulo_()" style="'
    + 'background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);'
    + 'color:#fff;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:14px;font-weight:600;"'
    + '>✕ Fechar</button>'
    + '</div>'

    // Conteúdo
    + '<div style="overflow-y:auto;padding:22px;flex:1;">';

  for (var i = 0; i < manual.secoes.length; i++) {
    var sec = manual.secoes[i];
    html += '<div style="margin-bottom:20px;">';
    html += '<div style="font-size:13px;font-weight:700;color:#0f2d52;text-transform:uppercase;'
          + 'letter-spacing:0.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #e9ecef;">'
          + escapeHtml_(sec.titulo) + '</div>';

    if (Array.isArray(sec.conteudo)) {
      html += '<ul style="margin:0;padding-left:18px;">';
      for (var j = 0; j < sec.conteudo.length; j++) {
        html += '<li style="margin-bottom:5px;font-size:14px;color:#333;line-height:1.5;">'
              + escapeHtml_(sec.conteudo[j]) + '</li>';
      }
      html += '</ul>';
    } else {
      html += '<p style="font-size:14px;color:#333;line-height:1.6;margin:0;">'
            + escapeHtml_(sec.conteudo) + '</p>';
    }

    html += '</div>';
  }

  // Rodapé
  html += '<div style="border-top:1px solid #f0f0f0;padding-top:14px;margin-top:8px;'
        + 'font-size:11px;color:#999;text-align:center;">'
        + 'SGO+ METROLABS &nbsp;·&nbsp; Manual Operacional — Piloto v1 &nbsp;·&nbsp; '
        + 'Dúvidas? Informe ao administrador.'
        + '</div>';

  html += '</div></div></div>';

  document.body.insertAdjacentHTML('beforeend', html);

  // Fechar com ESC
  document.addEventListener('keydown', _manualEscHandler_);
}

function _manualEscHandler_(e) {
  if (e.key === 'Escape') { fecharManualModulo_(); }
}

function fecharManualModulo_() {
  var el = document.getElementById('sgo-modal-manual');
  if (el) el.remove();
  document.removeEventListener('keydown', _manualEscHandler_);
}

// Alias para o botão existente no JS_Fin_Cartoes.html
function finAbrirManual() { abrirManualModulo_('fin_cartoes'); }
</script>
