  <script>
    // Atualização interna dos dados do SGO+
    function executarAtualizacaoDados() {
      var btn = document.getElementById("btnAtualizarDados");

      if (!confirm("Atualizar os dados internos do SGO+ agora?\n\nClientes, TAGs e usuários serão verificados.")) {
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Sincronizando...</span>';
      }

      google.script.run
        .withSuccessHandler(function(res) {
          alert((res && (res.mensagem || res.message)) || "Atualização concluída.");
          if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-rotate"></i><span>Atualizar Dados</span>';
          }
        })
        .withFailureHandler(function(err) {
          alert("Erro crítico ao atualizar os dados: " + ((err && err.message) ? err.message : err));
          if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-rotate"></i><span>Tentar Novamente</span>';
          }
        })
        .dispararSincronizacaoTotal();
    }

    // Relógio em tempo real otimizado
    document.addEventListener("DOMContentLoaded", function() {
      var elRelogio = document.getElementById("relogioTopo");
      if (!elRelogio) return;

      function atualizarRelogioTopo_() {
        var agora = new Date();
        var dia = String(agora.getDate()).padStart(2, "0");
        var mes = String(agora.getMonth() + 1).padStart(2, "0");
        var ano = agora.getFullYear();
        var horas = String(agora.getHours()).padStart(2, "0");
        var min = String(agora.getMinutes()).padStart(2, "0");
        var seg = String(agora.getSeconds()).padStart(2, "0");
        elRelogio.innerText = dia + "/" + mes + "/" + ano + ", " + horas + ":" + min + ":" + seg;
      }

      atualizarRelogioTopo_();
      setInterval(atualizarRelogioTopo_, 1000);
    });

  <script>
    window.SGO_QR_STATE = {
      equipamentoId: null,
      processando: false,
      redirecionado: false
    };

    function sgoQrGetEquipamentoId_() {
      try {
        var url = new URL(window.location.href);
        return url.searchParams.get("equipamento") || "";
      } catch (e) {
        try {
          var query = window.location.search || "";
          var params = new URLSearchParams(query);
          return params.get("equipamento") || "";
        } catch (err) {
          return "";
        }
      }
    }

    function sgoQrTemFluxo_() {
      return !!sgoQrGetEquipamentoId_();
    }

    function sgoQrMostrarMensagem_(msg) {
      try { alert(msg); } catch (e) {}
    }

    function sgoQrResetBotaoLogin_() {
      var btn = document.getElementById("btnLogin");
      if (!btn) return;
      btn.innerText = "Entrar";
      btn.disabled = false;
    }

    function sgoQrSetBotaoAcessando_() {
      var btn = document.getElementById("btnLogin");
      if (!btn) return;
      btn.innerText = "Acessando equipamento...";
      btn.disabled = true;
    }

    function sgoQrExecutarAcesso_(sessionId) {
      var equipamentoId = sgoQrGetEquipamentoId_();
      if (!equipamentoId || !sessionId) return;
      if (window.SGO_QR_STATE.processando || window.SGO_QR_STATE.redirecionado) return;

      window.SGO_QR_STATE.equipamentoId = equipamentoId;
      window.SGO_QR_STATE.processando = true;
      sgoQrSetBotaoAcessando_();

      google.script.run
        .withSuccessHandler(function(res) {
          window.SGO_QR_STATE.processando = false;

          if (!res || !res.success) {
            sgoQrMostrarMensagem_((res && res.message) ? res.message : "Acesso negado ao equipamento.");
            sgoQrResetBotaoLogin_();
            return;
          }

          var redirectUrl = String((res.redirectUrl || "")).trim();
          if (!redirectUrl) {
            sgoQrMostrarMensagem_("Link do equipamento não encontrado.");
            sgoQrResetBotaoLogin_();
            return;
          }

          window.SGO_QR_STATE.redirecionado = true;
          window.location.href = redirectUrl;
        })
        .withFailureHandler(function(err) {
          window.SGO_QR_STATE.processando = false;
          sgoQrMostrarMensagem_("Erro ao acessar via QR: " + ((err && err.message) ? err.message : err));
          sgoQrResetBotaoLogin_();
        })
        .qrcodeAcessar(sessionId, equipamentoId);
    }

    function sgoQrLimparSessoesInvalidas_() {
      try {
        sessionStorage.removeItem("SGO_SESSION");
        sessionStorage.removeItem("SGO_SESSION_ID");
        sessionStorage.removeItem("sessionId");
      } catch (e) {}
    }

    function sgoQrValidarSessaoEExecutar_() {
      var equipamentoId = sgoQrGetEquipamentoId_();
      if (!equipamentoId) return;

      var sessionId = "";
      try {
        sessionId = sessionStorage.getItem("SGO_SESSION") ||
          sessionStorage.getItem("SGO_SESSION_ID") ||
          sessionStorage.getItem("sessionId") || "";
      } catch (e) {
        sessionId = "";
      }

      if (!sessionId) return;

      google.script.run
        .withSuccessHandler(function(res) {
          var ok = !!(res && (res.valid || res.success));
          if (!ok) {
            sgoQrLimparSessoesInvalidas_();
            return;
          }
          sgoQrExecutarAcesso_(sessionId);
        })
        .withFailureHandler(function() {
          sgoQrLimparSessoesInvalidas_();
        })
        .validarSessao(sessionId);
    }

    function sgoQrPatchLogin_() {
      if (typeof window.fazerLogin !== "function") return;
      if (window.__SGO_QR_LOGIN_PATCHED__) return;

      var loginOriginal = window.fazerLogin;

      window.fazerLogin = function() {
        var retorno = loginOriginal.apply(this, arguments);
        setTimeout(function() {
          if (sgoQrTemFluxo_()) {
            sgoQrValidarSessaoEExecutar_();
          }
        }, 1000);
        return retorno;
      };

      window.__SGO_QR_LOGIN_PATCHED__ = true;
    }

    function sgoQrBootstrap_() {
      try {
        sgoQrPatchLogin_();
        if (sgoQrTemFluxo_()) {
          sgoQrValidarSessaoEExecutar_();
        }
      } catch (e) {}
    }

    document.addEventListener("DOMContentLoaded", function() {
      setTimeout(sgoQrBootstrap_, 300);
    });
  </script>
